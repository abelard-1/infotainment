<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Command v78</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 10, 10, 0.95);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #5e92f3;
            --summer-cyan: #44ffff;
            --danger: #ff4444;
            --fuel-gold: #fbc02d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background-color: #000;
            height: 100vh; width: 100vw; color: #fff;
            display: grid; 
            grid-template-columns: 750px 1fr; /* Bredare för att rymma stor text */
            grid-template-rows: 180px 1fr 200px;
            gap: 25px; padding: 25px; overflow: hidden;
        }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(40px); border: 2px solid var(--glass-border); border-radius: 45px; position: relative; overflow: hidden; }

        /* HEADER */
        .top-bar { grid-column: 1/3; display: grid; grid-template-columns: 1.2fr 2fr 1fr; align-items: center; padding: 0 50px; }
        #greeting { font-size: 5rem; font-weight: 900; letter-spacing: -2px; }
        #sub-greeting { font-size: 2.2rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }

        /* VÄDER HEADER (200%) */
        #header-hourly { display: flex; justify-content: space-around; padding: 0 40px; }
        .weather-node { text-align: center; line-height: 1.2; }
        .weather-node div:first-child { font-size: 1.4rem; font-weight: 700; opacity: 0.6; }
        .weather-node i { width: 60px !important; height: 60px !important; margin: 10px 0; color: var(--accent); }
        .weather-node div:last-child { font-size: 2.8rem; font-weight: 900; }

        #tom-temp { font-size: 8rem; font-weight: 900; line-height: 1; text-align: right; color: var(--summer-cyan); }

        /* SIDEBAR */
        .sidebar { grid-column: 1/2; grid-row: 2/3; display: grid; grid-template-rows: 1.2fr 1fr 1fr; gap: 25px; }

        /* KALENDER */
        .event-item { display: flex; align-items: center; gap: 30px; padding: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .event-date { min-width: 140px; text-align: center; border-right: 4px solid var(--accent); padding-right: 20px; }
        .event-date div:first-child { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
        .event-date div:last-child { font-size: 3rem; font-weight: 900; }
        .event-summary { font-size: 2.5rem; font-weight: 400; padding-left: 10px; }

        /* LUNCH */
        .lunch-box { padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        #lunch-main { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
        #lunch-veg { font-size: 1.8rem; opacity: 0.7; color: #ccc; }

        /* BENSIN */
        .fuel-box { padding: 40px; display: flex; flex-direction: column; justify-content: space-around; }
        .fuel-row { display: flex; justify-content: space-between; align-items: center; }
        .stn-name { font-size: 2.4rem; font-weight: 900; }
        .stn-price { font-size: 4rem; font-weight: 900; color: var(--fuel-gold); }
        .stn-price span { font-size: 1.5rem; margin-left: 10px; opacity: 0.5; }

        /* MAIN VIDEO */
        .main-content { grid-column: 2/3; grid-row: 2/3; }
        .video-background iframe { width: 100%; height: 100%; transform: scale(1.8); }

        /* FOOTER */
        .footer-left { grid-column: 1/2; grid-row: 3/4; padding: 40px; display: flex; align-items: center; }
        .footer-right { grid-column: 2/3; grid-row: 3/4; display: grid; grid-template-columns: 1fr 350px; gap: 25px; }
        
        .lov-display { display: flex; align-items: center; gap: 60px; padding: 0 40px; }
        .lov-item { text-align: center; }
        .lov-val { font-size: 6rem; font-weight: 900; line-height: 1; }
        .lov-lab { font-size: 1.3rem; font-weight: 900; letter-spacing: 2px; }

        #footer-time { font-size: 7rem; font-weight: 900; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header class="top-bar glass-panel">
    <div>
        <div id="greeting">God dag!</div>
        <div id="sub-greeting">LADDAR...</div>
    </div>
    <div id="header-hourly"></div>
    <div id="tom-temp">--°</div>
</header>

<div class="sidebar">
    <section class="glass-panel" id="calendar-list"></section>
    
    <section class="glass-panel lunch-box">
        <div style="font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-bottom: 15px;">DAGENS LUNCH</div>
        <div id="lunch-main">Hämtar...</div>
        <div id="lunch-veg">...</div>
    </section>

    <section class="glass-panel fuel-box">
        <div class="fuel-row">
            <div class="stn-name">COSTCO BURLÖV</div>
            <div id="price-costco" class="stn-price">--<span>kr/l</span></div>
        </div>
        <div class="fuel-row" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <div class="stn-name">PREEM ALLÉVÄGEN</div>
            <div id="price-preem" class="stn-price">--<span>kr/l</span></div>
        </div>
    </section>
</div>

<main class="main-content glass-panel">
    <div style="position: absolute; inset: 0; pointer-events: none;">
        <iframe src="https://www.youtube.com/embed/P9yjjfKXa6Q?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=P9yjjfKXa6Q" frameborder="0" style="width:100%; height:100%;"></iframe>
    </div>
</main>

<footer class="footer-left glass-panel">
    <div id="news-text" style="font-size: 2.2rem; font-weight: 700; text-transform: uppercase; color: var(--summer-cyan);">Hämtar senaste nytt...</div>
</footer>

<div class="footer-right">
    <div class="glass-panel lov-display">
        <div class="lov-item">
            <div id="count-easter" class="lov-val" style="color: var(--fuel-gold);">--</div>
            <div class="lov-lab">PÅSKLOV</div>
        </div>
        <div class="lov-item">
            <div id="count-summer" class="lov-val" style="color: var(--summer-cyan);">--</div>
            <div class="lov-lab">SOMMARLOV</div>
        </div>
        <div id="history-fact" style="font-size: 1.5rem; margin-left: 40px; opacity: 0.8; border-left: 2px solid #333; padding-left: 30px;">...</div>
    </div>
    <div class="glass-panel" id="footer-time">00:00</div>
</div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';

    function update() {
        const now = new Date();
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('sub-greeting').innerText = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        
        const easter = new Date('2026-03-30');
        const summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateLunch() {
        try {
            const now = new Date();
            let checkDate = new Date();
            if (now.getHours() >= 14) checkDate.setDate(now.getDate() + 1);
            const dateStr = checkDate.toISOString().split('T')[0];
            const menuID = "762f275e-8686-4f40-8f96-a45e00949f2b";
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://mpi.mashie.com/api/v1/pubmenus/${menuID}/weeks?fromDate=${dateStr}&toDate=${dateStr}`)}`);
            const data = await res.json();
            const menu = JSON.parse(data.contents);
            if (menu[0]?.Days[0]?.Meals) {
                document.getElementById('lunch-main').innerText = menu[0].Days[0].Meals[0].Name;
                document.getElementById('lunch-veg').innerText = menu[0].Days[0].Meals[1]?.Name || "";
                document.getElementById('lunch-main').style.color = "#fff";
            } else {
                document.getElementById('lunch-main').innerText = "INGEN SKOLLUNCH / LOV";
                document.getElementById('lunch-main').style.color = "var(--danger)";
                document.getElementById('lunch-veg').innerText = "Kontrollera läsårstiderna";
            }
        } catch(e) {}
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&daily=temperature_2m_max&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            document.getElementById('tom-temp').innerText = Math.round(d.daily.temperature_2m_max[1]) + '°';
            let h = '';
            for(let i=2; i<=8; i+=2) {
                const idx = nowH + i;
                const icon = d.hourly.weathercode[idx] <= 2 ? (d.hourly.weathercode[idx] === 0 ? 'sun' : 'cloud-sun') : 'cloud-rain';
                h += `<div class="weather-node"><div>${new Date(d.hourly.time[idx]).getHours()}:00</div><i data-lucide="${icon}"></i><div>${Math.round(d.hourly.temperature_2m[idx])}°</div></div>`;
            }
            document.getElementById('header-hourly').innerHTML = h; lucide.createIcons();
        } catch(e) {}
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            if (d.items) {
                document.getElementById('calendar-list').innerHTML = d.items.slice(0, 3).map(e => {
                    const s = new Date(e.start.dateTime || e.start.date);
                    return `<div class="event-item"><div class="event-date"><div>${s.toLocaleDateString('sv-SE',{weekday:'short'}).toUpperCase()}</div><div>${e.start.dateTime ? s.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) : 'HELDAG'}</div></div><div class="event-summary">${e.summary}</div></div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function updateFuel() {
        const base = 17.34;
        document.getElementById('price-preem').innerHTML = `${(base - 0.25).toFixed(2)}<span>kr/l</span>`;
        document.getElementById('price-costco').innerHTML = `${(base - 2.20).toFixed(2)}<span>kr/l</span>`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); updateWeather(); updateCalendar(); updateLunch(); updateFuel();
        setInterval(update, 1000);
        setInterval(updateWeather, 1800000);
        setInterval(updateCalendar, 600000);
        lucide.createIcons();
    });
</script>
</body>
</html>
