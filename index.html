<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Command v87</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel='stylesheet' type='text/css' href='https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/maps.css'>
    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/maps-web.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 10, 10, 0.9);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #5e92f3;
            --summer-cyan: #44ffff;
            --fuel-gold: #fbc02d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background-color: #000;
            height: 100vh; width: 100vw; color: #fff;
            display: grid; grid-template-columns: 520px 1fr;
            grid-template-rows: 150px 1fr 130px;
            gap: 20px; padding: 20px; overflow: hidden;
        }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 35px; overflow: hidden; position: relative; }

        /* HEADER */
        .top-bar { grid-column: 1/3; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        #greeting { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }
        #sub-greeting { font-size: 1.5rem; color: var(--accent); font-weight: 400; }
        #tom-temp { font-size: 4rem; font-weight: 900; color: var(--summer-cyan); }

        /* SIDEBAR */
        .sidebar { grid-column: 1/2; grid-row: 2/3; display: grid; grid-template-rows: 1fr 220px 220px; gap: 20px; }
        
        /* KALENDER */
        .event-item { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .event-item.is-today { 
            background: rgba(94, 146, 243, 0.15); 
            border: 2px solid var(--accent); 
            border-radius: 25px; margin: 5px;
            box-shadow: 0 0 15px rgba(94, 146, 243, 0.3);
        }

        /* LUNCH - NU SOM IFRAME FÖR ATT FIXA MATILDA */
        .lunch-container { position: relative; background: #fff; border-radius: 25px; }
        .lunch-container iframe { width: 100%; height: 100%; border: none; border-radius: 25px; }
        .lunch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 40px; background: var(--glass-bg); display: flex; align-items: center; padding-left: 20px; font-weight: 900; font-size: 0.8rem; color: var(--summer-cyan); z-index: 5; }

        /* TRAFFIC */
        #map { width: 100%; height: 100%; }

        /* MAIN / SLIDESHOW */
        .main-content { grid-column: 2/3; grid-row: 2/3; position: relative; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s; }
        .slide.active { opacity: 1; }

        /* FOOTER */
        .footer-left { grid-column: 1/2; grid-row: 3/4; display: flex; align-items: center; padding: 0 30px; font-size: 1.2rem; font-weight: 700; color: var(--summer-cyan); text-transform: uppercase; }
        .footer-right { grid-column: 2/3; grid-row: 3/4; display: grid; grid-template-columns: 1fr 200px; gap: 20px; }
        .lov-box { display: flex; align-items: center; justify-content: space-around; padding: 0 20px; }
        .lov-item { text-align: center; }
        .lov-val { font-size: 3rem; font-weight: 900; line-height: 1; color: var(--fuel-gold); }
        .lov-lab { font-size: 0.7rem; font-weight: 900; opacity: 0.6; }
        #footer-time { display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: 900; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header class="top-bar glass-panel">
    <div>
        <div id="greeting">God dag!</div>
        <div id="sub-greeting">Laddar datum...</div>
    </div>
    <div style="text-align: right;">
        <div style="font-size: 0.8rem; opacity: 0.5;">IMORGON</div>
        <div id="tom-temp">--°</div>
    </div>
</header>

<div class="sidebar">
    <section class="glass-panel" id="calendar-list" style="padding: 10px;"></section>
    
    <section class="glass-panel">
        <div id="map"></div>
    </section>

    <section class="glass-panel lunch-container">
        <div class="lunch-overlay">LUNCHSEDEL STAFFANSTORP</div>
        <iframe src="https://menu.matildaplatform.com/embed?displayMode=Week&distributorId=67ebb44bea58e3e60ce63da0"></iframe>
    </section>
</div>

<main class="main-content glass-panel">
    <div class="slide active" id="slide1"></div>
    <div class="slide" id="slide2"></div>
</main>

<footer class="footer-left glass-panel">
    <div id="news-text">Hämtar nyheter...</div>
</footer>

<div class="footer-right">
    <div class="glass-panel lov-box">
        <div class="lov-item">
            <div id="count-easter" class="lov-val">--</div>
            <div class="lov-lab">PÅSKLOV</div>
        </div>
        <div class="lov-item">
            <div id="count-summer" class="lov-val" style="color: var(--summer-cyan);">--</div>
            <div class="lov-lab">SOMMARLOV</div>
        </div>
        <div id="history-fact" style="font-size: 0.9rem; max-width: 250px; opacity: 0.8; border-left: 1px solid #333; padding-left: 15px;">...</div>
    </div>
    <div class="glass-panel" id="footer-time">00:00</div>
</div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';

    // BILDSPEL
    let currentSlide = 1;
    function updateSlideshow() {
        const nextSlide = currentSlide === 1 ? 2 : 1;
        const activeEl = document.getElementById(`slide${currentSlide}`);
        const nextEl = document.getElementById(`slide${nextSlide}`);
        const topics = ['nature', 'landscape', 'architecture', 'space'];
        const topic = topics[Math.floor(Math.random() * topics.length)];
        nextEl.style.backgroundImage = `url('https://source.unsplash.com/1600x900/?${topic}&sig=${Math.random()}')`;
        setTimeout(() => { activeEl.classList.remove('active'); nextEl.classList.add('active'); currentSlide = nextSlide; }, 1000);
    }

    // NYHETER
    async function updateNews() {
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.svt.se/nyheter/rss.xml');
            const data = await res.json();
            let idx = 0;
            setInterval(() => {
                document.getElementById('news-text').innerText = data.items[idx].title;
                idx = (idx + 1) % data.items.length;
            }, 10000);
        } catch(e) {}
    }

    // KALENDER
    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const today = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = d.items.slice(0, 4).map(e => {
                const s = new Date(e.start.dateTime || e.start.date);
                const isToday = s.toDateString() === today;
                return `<div class="event-item ${isToday ? 'is-today' : ''}">
                    <div style="min-width: 70px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 10px;">
                        <div style="font-size: 0.7rem; color: var(--accent); font-weight: 900;">${isToday ? 'IDAG' : s.toLocaleDateString('sv-SE', {weekday:'short'}).toUpperCase()}</div>
                        <div style="font-size: 1.2rem; font-weight: 900;">${e.start.dateTime ? s.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG'}</div>
                    </div>
                    <div style="font-size: 1.1rem; padding-left: 10px;">${e.summary}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    // TID OCH NEDRÄKNING
    function updateTime() {
        const now = new Date();
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('sub-greeting').innerText = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((new Date('2026-03-30') - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((new Date('2026-06-12') - now) / 86400000));
    }

    // VÄDER
    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&daily=temperature_2m_max&timezone=auto');
            const d = await res.json();
            document.getElementById('tom-temp').innerText = Math.round(d.daily.temperature_2m_max[1]) + '°';
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateTime(); updateCalendar(); updateNews(); updateWeather(); updateSlideshow();
        setInterval(updateTime, 1000);
        setInterval(updateCalendar, 600000);
        setInterval(updateSlideshow, 60000);
        
        // TomTom karta (Använd din nyckel här)
        if(typeof tt !== 'undefined') {
            tt.map({ key: 'DIN_NYCKEL', container: 'map', center: [13.21, 55.64], zoom: 11, style: 'https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/styles/night.json' });
        }
    });
</script>
</body>
</html>
