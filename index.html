<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v88</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* VÄNSTER SIDA - INFO */
        .info-panel {
            flex: 0 0 40%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
        }

        #greeting { font-size: 6rem; font-weight: 900; line-height: 0.9; letter-spacing: -3px; margin-bottom: 10px; }
        #date-sub { font-size: 2.5rem; font-weight: 400; color: var(--accent); margin-bottom: 30px; }

        .section-label { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 15px; }

        /* KALENDER */
        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .event-card.today { border-color: var(--accent); box-shadow: 0 0 30px rgba(94,146,243,0.2); }
        .event-time { font-size: 2.5rem; font-weight: 900; min-width: 140px; border-right: 4px solid var(--accent); }
        .event-title { font-size: 2.2rem; font-weight: 400; padding-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* VÄDER */
        .weather-row { display: flex; gap: 20px; justify-content: space-between; }
        .weather-box { 
            background: rgba(255,255,255,0.05); 
            padding: 25px; 
            border-radius: 25px; 
            flex: 1; 
            text-align: center; 
        }
        .weather-box i { width: 50px; height: 50px; color: var(--accent); margin: 10px 0; }
        .weather-temp { font-size: 2.8rem; font-weight: 900; }
        .weather-hour { font-size: 1.2rem; opacity: 0.6; font-weight: 700; }

        /* HÖGER SIDA - MEDIA */
        .media-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .video-container {
            flex: 1;
            background: #000;
            position: relative;
        }
        .video-container iframe {
            position: absolute; width: 100%; height: 100%; border: none;
        }

        /* COUNTDOWN FOOTER */
        .countdown-bar {
            height: 200px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 50px;
            border-top: 1px solid var(--border);
        }
        .count-item { text-align: center; }
        .count-num { font-size: 6rem; font-weight: 900; line-height: 1; }
        .count-lab { font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; opacity: 0.5; }
        #clock { font-size: 7rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -4px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <header>
            <div id="greeting">God dag!</div>
            <div id="date-sub">Laddar...</div>
        </header>

        <section>
            <div class="section-label">Nästa händelser</div>
            <div id="calendar-list">
                </div>
        </section>

        <section>
            <div class="section-label">Väderprognos</div>
            <div id="weather-list" class="weather-row">
                </div>
        </section>
        
        <div style="margin-top: auto;">
            <div class="section-label">Historisk notis</div>
            <div id="history-fact" style="font-size: 1.5rem; opacity: 0.8; line-height: 1.4;">...</div>
        </div>
    </div>

    <div class="media-panel">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/P9yjjfKXa6Q?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=P9yjjfKXa6Q" allow="autoplay"></iframe>
        </div>

        <div class="countdown-bar">
            <div class="count-item">
                <div id="clock">00:00</div>
            </div>
            <div class="count-item">
                <div id="count-easter" class="count-num" style="color: var(--easter);">--</div>
                <div class="count-lab">PÅSKLOV</div>
            </div>
            <div class="count-item">
                <div id="count-summer" class="count-num" style="color: var(--summer);">--</div>
                <div class="count-lab">SOMMARLOV</div>
            </div>
        </div>
    </div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';

    function update() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('date-sub').innerText = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        
        // Nedräkning
        const easter = new Date('2026-03-30');
        const summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const today = new Date().toDateString();
            
            document.getElementById('calendar-list').innerHTML = d.items.slice(0, 2).map(e => {
                const s = new Date(e.start.dateTime || e.start.date);
                const isToday = s.toDateString() === today;
                const timeStr = e.start.dateTime ? s.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG';
                return `
                    <div class="event-card ${isToday ? 'today' : ''}">
                        <div class="event-time">${isToday ? 'IDAG' : timeStr}</div>
                        <div class="event-title">${e.summary}</div>
                    </div>`;
            }).join('');
        } catch(e) { console.log("Kalender-fel"); }
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            let html = '';
            
            // Visa nu, +3h och imorgon kl 12
            const points = [nowH, nowH + 3, nowH + 24];
            points.forEach((idx, i) => {
                const temp = Math.round(d.hourly.temperature_2m[idx]);
                const code = d.hourly.weathercode[idx];
                const label = i === 2 ? "Imorgon" : (new Date(d.hourly.time[idx]).getHours() + ":00");
                const icon = code <= 2 ? 'sun' : 'cloud-rain';
                html += `
                    <div class="weather-box">
                        <div class="weather-hour">${label}</div>
                        <i data-lucide="${icon}"></i>
                        <div class="weather-temp">${temp}°</div>
                    </div>`;
            });
            document.getElementById('weather-list').innerHTML = html;
            lucide.createIcons();
        } catch(e) {}
    }

    async function updateHistory() {
        try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
            const e = r.events[Math.floor(Math.random()*r.events.length)];
            document.getElementById('history-fact').innerHTML = `<b>${e.year}:</b> ${e.text}`;
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); updateCalendar(); updateWeather(); updateHistory();
        setInterval(update, 1000);
        setInterval(updateCalendar, 600000);
        setInterval(updateWeather, 1800000);
        lucide.createIcons();
    });
</script>
</body>
</html>
