<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v93</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* VÄNSTER SIDA - INFO */
        .info-panel {
            flex: 0 0 42%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            gap: 45px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
        }

        #greeting { font-size: 6.5rem; font-weight: 900; line-height: 0.85; letter-spacing: -4px; margin-bottom: 5px; }
        #date-sub { font-size: 2.8rem; font-weight: 300; color: var(--accent); margin-bottom: 20px; text-transform: capitalize; }

        .section-label { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }

        /* KALENDER */
        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 35px;
            padding: 35px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { 
            border-color: var(--accent); 
            box-shadow: 0 0 40px rgba(94,146,243,0.15);
            animation: pulse-border 3s infinite;
        }
        @keyframes pulse-border {
            0% { border-color: var(--accent); }
            50% { border-color: rgba(94,146,243,0.4); }
            100% { border-color: var(--accent); }
        }

        .event-date-box {
            min-width: 140px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        .ev-day-name { font-size: 1.1rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.8rem; font-weight: 900; line-height: 1.1; }
        .ev-time { font-size: 1.4rem; opacity: 0.7; font-weight: 700; margin-top: 5px; }

        .event-title { font-size: 2.5rem; font-weight: 400; flex: 1; line-height: 1.2; }

        /* VÄDER */
        .weather-row { display: flex; gap: 20px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 30px; 
            border-radius: 30px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-box i { width: 60px; height: 60px; color: var(--accent); margin: 15px 0; }
        .weather-temp { font-size: 3.2rem; font-weight: 900; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        /* HÖGER SIDA - MEDIA */
        .media-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .video-container { flex: 1; background: #000; position: relative; margin-top: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* COUNTDOWN FOOTER */
        .countdown-bar {
            height: 220px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }
        
        .countdown-wrapper { display: flex; align-items: center; gap: 30px; }
        .vertical-label { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            font-size: 0.9rem; 
            font-weight: 900; 
            letter-spacing: 2px; 
            opacity: 0.4;
            color: #fff;
        }

        .count-item { text-align: center; }
        .count-num { font-size: 6.5rem; font-weight: 900; line-height: 1; }
        .count-lab { font-size: 1.3rem; font-weight: 900; letter-spacing: 5px; opacity: 0.4; margin-top: 10px; }
        
        #clock { font-size: 5.25rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -3px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <header>
            <div id="greeting">Hej!</div>
            <div id="date-sub">Laddar...</div>
        </header>

        <section>
            <div class="section-label">Kommande i kalendern</div>
            <div id="calendar-list"></div>
        </section>

        <section>
            <div class="section-label">Väder i Staffanstorp</div>
            <div id="weather-list" class="weather-row"></div>
        </section>
        
        <div style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 30px;">
            <div class="section-label">Dagens historiska fakta</div>
            <div id="history-fact" style="font-size: 1.6rem; opacity: 0.8; line-height: 1.5; font-weight: 300;">...</div>
        </div>
    </div>

    <div class="media-panel">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/CZaqKhVLJxA?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=CZaqKhVLJxA" allow="autoplay"></iframe>
        </div>

        <div class="countdown-bar">
            <div class="countdown-wrapper">
                <div class="vertical-label">DAGAR KVAR TILL:</div>
                <div style="display: flex; gap: 60px;">
                    <div class="count-item">
                        <div id="count-easter" class="count-num" style="color: var(--easter);">--</div>
                        <div class="count-lab">PÅSKLOV</div>
                    </div>
                    <div class="count-item">
                        <div id="count-summer" class="count-num" style="color: var(--summer);">--</div>
                        <div class="count-lab">SOMMARLOV</div>
                    </div>
                </div>
            </div>
            <div class="count-item">
                <div id="clock">00:00</div>
            </div>
        </div>
    </div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';

    function update() {
        const now = new Date();
        const hour = now.getHours();
        
        let greetingText = "Hej!";
        if (hour >= 6 && hour < 10) greetingText = "God morgon!";
        else if (hour >= 10 && hour < 18) greetingText = "God dag!";
        else if (hour >= 18 && hour < 23) greetingText = "God kväll!";
        else greetingText = "God natt!";
        
        document.getElementById('greeting').innerText = greetingText;
        document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        
        // Uppdaterad rad för headern
        const dateStr = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('date-sub').innerText = "Idag är det " + dateStr;
        
        const easter = new Date('2026-03-30');
        const summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            
            document.getElementById('calendar-list').innerHTML = d.items.slice(0, 2).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                const isToday = start.toDateString() === todayStr;
                const dayName = start.toLocaleDateString('sv-SE', { weekday: 'short' });
                const dateNum = start.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
                const timeStr = e.start.dateTime ? start.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG';

                return `
                    <div class="event-card ${isToday ? 'today' : ''}">
                        <div class="event-date-box">
                            <div class="ev-day-name">${isToday ? 'IDAG' : dayName}</div>
                            <div class="ev-date-num">${dateNum}</div>
                            <div class="ev-time">${timeStr}</div>
                        </div>
                        <div class="event-title">${e.summary}</div>
                    </div>`;
            }).join('');
        } catch(e) {}
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            let html = '';
            const points = [nowH, nowH + 3, nowH + 24];
            points.forEach((idx, i) => {
                const temp = Math.round(d.hourly.temperature_2m[idx]);
                const code = d.hourly.weathercode[idx];
                const label = i === 2 ? "Imorgon" : (new Date(d.hourly.time[idx]).getHours() + ":00");
                let icon = 'sun';
                if(code >= 3) icon = 'cloud';
                if(code >= 51) icon = 'cloud-rain';
                if(code >= 71) icon = 'snowflake';
                html += `<div class="weather-box"><div class="weather-hour">${label}</div><i data-lucide="${icon}"></i><div class="weather-temp">${temp}°</div></div>`;
            });
            document.getElementById('weather-list').innerHTML = html;
            lucide.createIcons();
        } catch(e) {}
    }

    async function updateHistory() {
        try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
            const e = r.events[Math.floor(Math.random()*r.events.length)];
            document.getElementById('history-fact').innerHTML = `<b style="color:var(--accent)">År ${e.year}:</b> ${e.text}`;
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); updateCalendar(); updateWeather(); updateHistory();
        setInterval(update, 1000);
        setInterval(updateCalendar, 600000);
        setInterval(updateWeather, 1800000);
        setInterval(updateHistory, 3600000);
    });
</script>
</body>
</html>
