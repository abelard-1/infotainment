<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v182 (Kortkalender & Fredagsmys-Fix)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.3);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
            --bday-color: #D4AF37; 
            --worldcup: #4ade80; 
            --holiday: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            transition: background-color 1s ease, color 1s ease;
        }

        /* --- TEST-KNAPPAR --- */
        #test-buttons {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 10002;
            display: flex;
            gap: 10px;
        }
        .test-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            transition: background 0.3s;
        }
        .test-btn:hover { background: rgba(255,255,255,0.2); }

        /* --- NATT-DIMMER --- */
        #night-dimmer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to top right, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.65) 100%);
            pointer-events: none;
            z-index: 9999; 
            opacity: 0;
            transition: opacity 4s ease;
        }
        #night-dimmer.active { opacity: 1; }

        /* --- NATT-LÄGE (HELSKÄRM) --- */
        #night-mode-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #020111 0%, #0a0a1a 100%);
            z-index: 10000; 
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #night-stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }

        #nm-moon {
            position: absolute;
            top: calc(50% - 10.5rem); 
            left: calc(50% + 19rem); 
            width: 10rem;
            height: 10rem;
            color: #fde16e; 
            opacity: 1; 
            z-index: 1;
            animation: moon-wander 90s infinite ease-in-out; 
            will-change: transform; 
        }

        @keyframes moon-wander {
            0%   { transform: translate(-50%, -50%) translate(0vw, 0vh) rotate(-10deg); }
            12%  { transform: translate(-50%, -50%) translate(-20vw, 15vh) rotate(0deg); }
            25%  { transform: translate(-50%, -50%) translate(-50vw, -10vh) rotate(10deg); }
            37%  { transform: translate(-50%, -50%) translate(-70vw, 20vh) rotate(20deg); }
            50%  { transform: translate(-50%, -50%) translate(-45vw, -30vh) rotate(5deg); }
            62%  { transform: translate(-50%, -50%) translate(-15vw, 25vh) rotate(-15deg); }
            75%  { transform: translate(-50%, -50%) translate(-60vw, 35vh) rotate(-5deg); }
            87%  { transform: translate(-50%, -50%) translate(-30vw, -20vh) rotate(-12deg); }
            100% { transform: translate(-50%, -50%) translate(0vw, 0vh) rotate(-10deg); }
        }

        @keyframes micro-shift {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(12px, 8px); }
            50% { transform: translate(4px, 16px); }
            75% { transform: translate(-8px, 6px); }
            100% { transform: translate(0px, 0px); }
        }

        .anti-burn-in { animation: micro-shift 180s infinite ease-in-out; }

        #nm-main-text {
            position: relative;
            z-index: 2; font-size: clamp(6rem, 12vw, 15rem); line-height: 1;
            font-weight: 900; text-align: center; letter-spacing: -2px; color: #7b8b9e;
            text-shadow: 0px 0px 30px rgba(123, 139, 158, 0.2); background: none;
        }

        #nm-footer {
            position: absolute;
            bottom: 40px; right: 60px; z-index: 2; display: flex; gap: 40px;
            align-items: center; background: rgba(10, 10, 15, 0.5); padding: 20px 40px;
            border-radius: 30px; border: 1px solid rgba(123, 139, 158, 0.1);
        }

        #nm-clock { font-size: 3.5rem; font-weight: 900; color: #5a6675; font-variant-numeric: tabular-nums; }
        #nm-weather { display: flex; align-items: center; gap: 15px; font-size: 3rem; font-weight: 900; color: #5a6675; }
        #nm-weather svg { width: 50px; height: 50px; }

        /* --- FÖDELSEDAGS-SKÄRMEN (HELSKÄRM) --- */
        #birthday-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 8000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }

        #birthday-screen img.bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.25; z-index: 1;
        }

        #bday-main-text {
            position: relative;
            z-index: 2; font-size: clamp(6rem, 12vw, 15rem); line-height: 1;
            font-weight: 900; text-align: center; letter-spacing: -2px;
            background: linear-gradient(180deg, #FFDF00 0%, #D4AF37 50%, #996515 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 40px rgba(255, 215, 0, 0.4));
        }

        #bday-footer {
            position: absolute;
            bottom: 40px; right: 60px; z-index: 2; display: flex; gap: 40px;
            align-items: center; background: rgba(20, 20, 20, 0.7); padding: 20px 40px;
            border-radius: 30px; border: 1px solid rgba(255, 215, 0, 0.2); backdrop-filter: blur(10px);
        }

        #bday-clock { font-size: 3.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
        #bday-weather { display: flex; align-items: center; gap: 15px; font-size: 3rem; font-weight: 900; color: #D4AF37; }
        #bday-weather svg { width: 50px; height: 50px; }

        /* VÄDER-OVERLAY */
        #weather-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        /* --- STABILISERAD LAYOUT --- */
        .info-panel {
            width: 48vw; flex: none; 
            padding: 100px 60px 20px 60px;
            display: flex; flex-direction: column;
            gap: 15px; 
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%); position: relative; z-index: 20; overflow: hidden;    
            transition: background 1s ease, border-color 1s ease;
        }

        .media-panel { width: 52vw; flex: none; display: flex; flex-direction: column; position: relative; z-index: 20; }

        header {
            width: 100%; height: 140px; min-height: 140px; max-height: 140px; flex: none;        
            display: flex; flex-direction: column; justify-content: flex-end; perspective: 2000px; padding-bottom: 10px;
        }

        #greeting { font-size: 7rem; font-weight: 900; line-height: 1; letter-spacing: -4px; white-space: nowrap; transition: color 2s ease; }

        /* FREDAGS-FÄRGER (Bugfix för osynlig text) */
        #greeting.friday-mode {
            animation: text-color-shift 8s linear infinite;
        }
        #greeting.friday-mode .wiggle-mark { color: inherit; text-shadow: inherit; }
        
        @keyframes text-color-shift {
            0% { color: #ff007f; text-shadow: 0 0 20px rgba(255, 0, 127, 0.4); }
            25% { color: #ffaa33; text-shadow: 0 0 20px rgba(255, 170, 51, 0.4); }
            50% { color: #4ade80; text-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
            75% { color: #5e92f3; text-shadow: 0 0 20px rgba(94, 146, 243, 0.4); }
            100% { color: #ff007f; text-shadow: 0 0 20px rgba(255, 0, 127, 0.4); }
        }

        .char-span {
            display: inline-block;
            transform-origin: center center;
            animation: charFlipIn 0.8s ease both; transform-style: preserve-3d; z-index: 1;
        }

        @keyframes charFlipIn {
            0% { transform: rotateX(-90deg); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        .char-span.out { animation: charFlipOut 0.5s ease-in both; }
        @keyframes charFlipOut { 0% { transform: rotateX(0deg); opacity: 1; } 100% { transform: rotateX(90deg); opacity: 0; } }

        #greeting.god-natt { color: #666; }
        #greeting.god-natt .wiggle-mark { color: #666; }
        #greeting.birthday { color: #ffaa33; text-shadow: 0 0 20px rgba(255, 170, 51, 0.4); }

        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center; animation: intensive-wiggle 60s infinite;
            color: #fff; transition: color 2s ease;
        }
        #greeting.birthday .wiggle-mark { color: #ffaa33; }

        @keyframes intensive-wiggle {
            0%, 98% { transform: translate(0,0) rotate(0deg); }
            98.4% { transform: translate(2px, -2px) rotate(15deg); }
            98.8% { transform: translate(-2px, -2px) rotate(-15deg); }
            99.2% { transform: translate(2px, 0) rotate(10deg); }
            99.6% { transform: translate(-1px, 0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .moon-icon { display: inline-block; margin-left: 10px; color: #666; }
        .moon-icon svg { width: 0.8em; height: 0.8em; vertical-align: baseline; }

        #date-sub { 
            font-size: 1.9rem; font-weight: 900; 
            margin-bottom: 35px;
            letter-spacing: 0px;
            position: relative;
            top: 15px; 
            transition: color 2s ease;
        }
        #date-sub.god-natt { color: #666; }

        .section-label { 
            font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); margin-bottom: 10px; display: flex; align-items: center;
            transition: color 1s ease;
        }

        .live-dot {
            width: 10px; height: 10px; background-color: #ff3333; border-radius: 50%; display: inline-block; margin-right: 12px; animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        /* --- NY BILJETT-KALENDER --- */
        .event-card {
            border: 2px solid var(--border); 
            border-radius: 30px;
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: row; 
            align-items: stretch; 
            padding: 0; 
            overflow: hidden; 
            background: transparent;
            transition: border-color 1s ease, box-shadow 1s ease;
        }
        .event-card.today { border-color: var(--accent); border-width: 3px; } 

        .ev-date-col {
            width: 25%; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border);
            transition: background 1s ease, border-color 1s ease;
        }

        .ev-title-col {
            width: 75%; 
            background: var(--glass); 
            padding: 20px 30px;
            display: flex;
            align-items: center;
            font-size: 2.2rem; 
            font-weight: 400; 
            font-style: italic;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            transition: background 1s ease;
        }

        .ev-date { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
        .ev-time { font-size: 1.6rem; font-weight: 700; color: var(--accent); margin-top: 5px; }

        .weather-row { display: flex; gap: 15px; margin-bottom: 12px; }
        .weather-box { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 25px; flex: 1; text-align: center; border: 1px solid var(--border); transition: background 1s ease, border-color 1s ease; }
        .weather-icon-wrapper { display: inline-block; margin: 10px 0; animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .weather-box i, .weather-box svg { width: 100px !important; height: 100px !important; color: var(--accent); display: block; margin: 0 auto; }
        .weather-box i[data-lucide="sun"], .weather-box svg.lucide-sun { color: #ffb703 !important; }
        .weather-temp { font-size: 3.8rem; font-weight: 900; margin-top: 5px; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        #weather-summary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px 25px;
            font-size: 1.7rem;
            line-height: 1.5;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            transition: background 1s ease, border-color 1s ease, color 1s ease;
        }
        #weather-summary strong { font-weight: 700; color: var(--accent); }

        .video-container { 
            width: 100%; aspect-ratio: 16 / 9; flex: none; background: #000; position: relative; overflow: hidden; 
        }
        .video-container iframe { 
            position: absolute; top: -20%; left: 0; width: 100%; height: 140%; border: none; pointer-events: none; z-index: 1; 
        }

        .countdown-bar { 
            padding: 35px 60px; background: #0a0a0a; display: flex; flex-direction: column; 
            justify-content: center; gap: 10px; border-top: 1px solid var(--border); transition: background 1s ease, border-color 1s ease;
        }
        
        .countdown-wrapper { 
            display: flex; align-items: center; justify-content: flex-start; width: 100%; 
        }

        #clock { 
            position: absolute; bottom: 35px; right: 60px; font-size: 3.4rem; font-weight: 900; 
            font-variant-numeric: tabular-nums; color: #d8d8d8; text-align: right; z-index: 30; transition: color 1s ease;
        }

        .news-bar { 
            background: #0a0a0a; padding: 35px 60px; padding-right: 200px; border-top: 1px solid var(--border); 
            min-height: 140px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 10px; transition: background 1s ease, border-color 1s ease;
        }
        
        #news-text { font-size: 1.8rem; opacity: 0.8; line-height: 1.4; font-weight: 300; transition: opacity 0.5s; }
        
        /* --- DAGLÄGE (APPLE-STIL) --- */
        body.day-mode { background-color: #f5f5f7; color: #1d1d1f; }
        body.day-mode .info-panel { background: linear-gradient(135deg, #ffffff 0%, #f2f2f7 100%); border-right: 1px solid rgba(0,0,0,0.1); }
        body.day-mode .countdown-bar, body.day-mode .news-bar { background: #ffffff; border-top: 1px solid rgba(0,0,0,0.1); }
        body.day-mode .event-card { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        body.day-mode .event-card.today { border-color: var(--accent); border-width: 4px; }
        body.day-mode .ev-date-col { background: rgba(0,0,0,0.04); border-right: 1px solid rgba(0,0,0,0.1); }
        body.day-mode .ev-title-col { background: rgba(255,255,255,0.8); color: #2c3e50; }
        body.day-mode .ev-date { color: rgba(0,0,0,0.6); }
        body.day-mode .weather-box, body.day-mode #weather-summary { background: #f5f5f7; border: 1px solid rgba(0,0,0,0.05); color: #1d1d1f; }
        body.day-mode .section-label { color: #86868b; }
        body.day-mode #clock { color: #1d1d1f; }
        body.day-mode .wiggle-mark { color: #1d1d1f; }
        body.day-mode .test-btn { background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.2); color: #1d1d1f; }
        body.day-mode .test-btn:hover { background: rgba(0,0,0,0.15); }
        body.day-mode #count-summer { color: #00a0dc !important; }
        body.day-mode #count-easter { color: #d97706 !important; }
        body.day-mode #count-worldcup { color: #16a34a !important; }
        body.day-mode #count-bday { color: #b8860b !important; }
        body.day-mode #count-holiday { color: #059669 !important; } 
    </style>
</head>
<body>

    <div id="test-buttons">

        { date: '2026-05-27', label: 'EID<br>AL-ADHA' },
        { date: '2026-06-25', label: 'ASHURA<br>DAY' },
        { date: '2026-10-31', label: 'ALLA<br>HELGONS' },
        { date: '2026-12-24', label: 'JULAFTON<br>🎅' },
        { date: '2027-02-08', label: 'RAMADAN<br>STARTAR' }
    ];

    const greetingsTranslations = [
        { m: "God morgon", d: "God dag", e: "God kväll", n: "God natt" },
        { m: "Good morning", d: "Good afternoon", e: "Good evening", n: "Good night" },
        { m: "Guten Morgen", d: "Guten Tag", e: "Guten Abend", n: "Gute Nacht" },
        { m: "Buenos días", d: "Buenas tardes", e: "Buenas noches", n: "Buenas noches" },
        { m: "Bonjour", d: "Bonjour", e: "Bonsoir", n: "Bonne nuit" }
    ];
    let currentLangIndex = 0;
    let currentRenderedGreeting = "";
    
    let lastRealWeatherCode = 0;
    let celebrationActive = false;
    let birthdayInterval = null; 
    let continuousInterval = null; 
    
    let currentTempStr = "--°";
    let currentIconHtml = "";
    
    let isRealDaytime = false; 

    let isNightModeForced = false;
    let isBdayModeForced = false;
    let isFridayModeForced = false;
    let forcedWeatherMode = 'auto'; 
    let isDayModeForced = false; 

    document.getElementById('test-day-btn').addEventListener('click', () => {
        isDayModeForced = !isDayModeForced;
        if(isDayModeForced) document.body.classList.add('day-mode');
        else update(); 
    });

    document.getElementById('test-night-btn').addEventListener('click', () => {
        isNightModeForced = !isNightModeForced;
        update();
    });

    document.getElementById('test-bday-btn').addEventListener('click', () => {
        isBdayModeForced = !isBdayModeForced;
        update();
    });
    
    document.getElementById('test-friday-btn').addEventListener('click', () => {
        isFridayModeForced = !isFridayModeForced;
        update();
    });

    document.getElementById('test-weather-btn').addEventListener('click', (e) => {
        if (forcedWeatherMode === 'auto') { forcedWeatherMode = 'rain'; e.target.innerText = 'Väder: Regn'; } 
        else if (forcedWeatherMode === 'rain') { forcedWeatherMode = 'snow'; e.target.innerText = 'Väder: Snö'; } 
        else { forcedWeatherMode = 'auto'; e.target.innerText = 'Väder: Auto'; }
        updateWeatherOverlay(lastRealWeatherCode);
    });

    function initStars() {
        const container = document.getElementById('night-stars');
        container.innerHTML = ''; 
        for(let i=0; i<100; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = Math.random() * 3 + 2.5; 
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.opacity = Math.random() * 0.2 + 0.8;
            let glow = Math.random() * 4 + 2; 
            star.style.boxShadow = `0 0 ${glow}px rgba(255, 255, 255, 0.9)`;
            container.appendChild(star);
        }
    }

    const randomColor = () => {
        const colors = ['#FFDF00', '#D4AF37', '#ffffff', '#ff6666', '#ff00ff', '#44ffff'];
        return colors[Math.floor(Math.random() * colors.length)];
    };

    const fireworkExplosion = () => {
        confetti({
            particleCount: randomInRange(50, 75), spread: randomInRange(150, 360), 
            startVelocity: randomInRange(20, 40), ticks: 150, gravity: 0.8, scalar: randomInRange(2, 3), 
            origin: { x: randomInRange(0.1, 0.9), y: randomInRange(0.2, 0.6) },
            colors: [randomColor(), randomColor()], zIndex: 10001
        });
    };

    const triggerCelebration = () => {
        if (celebrationActive) return;
        celebrationActive = true;
        if (birthdayInterval) clearInterval(birthdayInterval);
        if (continuousInterval) clearInterval(continuousInterval);

        continuousInterval = setInterval(() => {
            if (!celebrationActive) return; 
            confetti({
                particleCount: 1, startVelocity: 0, ticks: 400,
                origin: { x: Math.random(), y: -0.1 }, colors: [randomColor()],
                gravity: randomInRange(0.4, 0.6), scalar: randomInRange(1.6, 2.4), drift: randomInRange(-0.5, 0.5), zIndex: 10000 
            });
        }, 100);

        birthdayInterval = setInterval(() => {
            if (!celebrationActive) { clearInterval(birthdayInterval); return; }
            fireworkExplosion();
        }, 5000); 
    };

    const stopCelebration = () => {
        celebrationActive = false;
        if (birthdayInterval) clearInterval(birthdayInterval);
        if (continuousInterval) clearInterval(continuousInterval);
        if (typeof confetti !== 'undefined' && typeof confetti.reset === 'function') confetti.reset();
    };

    const randomInRange = (min, max) => Math.random() * (max - min) + min;

    const wrapTextInSpans = (text) => {
        return text.split('').map(char => {
            const delay = Math.floor(Math.random() * 400); 
            return `<span class="char-span" style="animation-delay: ${delay}ms">${char === ' ' ? '&nbsp;' : char}</span>`;
        }).join('');
    };

    function update() {
        const now = new Date();
        const hour = now.getHours();
        const dayOfWeek = now.getDay(); 
        
        const greetingEl = document.getElementById('greeting');
        const dateSubEl = document.getElementById('date-sub');
        const iframe = document.getElementById('bg-video');
        const bdayScreen = document.getElementById('birthday-screen');
        const nightScreen = document.getElementById('night-mode-screen');
        
        const isFridayMode = (dayOfWeek === 5 && hour >= 15 && hour < 23) || isFridayModeForced;
        const todayStrForBday = String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        let isBirthday = false;
        let bdayName = "";

        if (birthdays[todayStrForBday] || isBdayModeForced) {
            isBirthday = true;
            bdayName = birthdays[todayStrForBday] || "TESTNAMN";
        }

        let phase = (hour >= 6 && hour < 10) ? "m" : (hour >= 10 && hour < 18) ? "d" : (hour >= 18 && hour < 23) ? "e" : "n";
        
        if (!isDayModeForced && !isBirthday && phase !== "n") {
            if (isRealDaytime) document.body.classList.add('day-mode');
            else document.body.classList.remove('day-mode');
        }

        const nightDimmer = document.getElementById('night-dimmer');
        if (phase === "n" && !isBirthday) { nightDimmer.classList.add('active'); } else { nightDimmer.classList.remove('active'); }

        const showNightMode = (hour >= 23 || hour < 6) || isNightModeForced;

        if (isBirthday) {
            nightScreen.style.display = 'none';
            if (!celebrationActive) {
                triggerCelebration();
                bdayScreen.style.display = 'flex';
                document.getElementById('bday-main-text').innerHTML = `GRATTIS<br>${bdayName.toUpperCase()}!`;
                document.getElementById('weather-overlay').innerHTML = '';
                if(iframe.src && iframe.src !== 'about:blank') { iframe.src = 'about:blank'; iframe.style.display = 'none'; }
            }
            document.getElementById('bday-clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
            return; 
        } 
        else if (showNightMode) {
            if (celebrationActive) stopCelebration();
            bdayScreen.style.display = 'none';
            nightScreen.style.display = 'flex';
            document.getElementById('nm-clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('nm-weather').innerHTML = `${currentIconHtml} <span>${currentTempStr}</span>`;
            if(iframe.src && iframe.src !== 'about:blank') { iframe.src = 'about:blank'; iframe.style.display = 'none'; }
            return; 
        } 
        else {
            nightScreen.style.display = 'none';
            if (celebrationActive) {
                stopCelebration(); bdayScreen.style.display = 'none'; updateWeatherOverlay(lastRealWeatherCode);
            }
            
            let targetVideoId = isFridayMode ? FRIDAY_VIDEO_ID : DEFAULT_VIDEO_ID;
            let targetVideoSrc = `https://www.youtube.com/embed/${targetVideoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=${targetVideoId}`;
            
            if(iframe.src === 'about:blank' || iframe.src === '') { 
                iframe.src = targetVideoSrc; 
                iframe.style.display = 'block'; 
            } else if (!iframe.src.includes(targetVideoId)) {
                iframe.src = targetVideoSrc;
            }

            let greetingKey = isFridayMode ? `friday-${currentLangIndex}` : `lang-${currentLangIndex}-${phase}`;
            
            if (currentRenderedGreeting !== greetingKey) {
                currentRenderedGreeting = greetingKey;
                greetingEl.classList.remove('birthday', 'god-natt', 'friday-mode');
                let greetingBase = "";
                let rawTextForSizing = "";
                
                if (isFridayMode) { 
                    greetingBase = "TREVLIG HELG";
                    rawTextForSizing = "TREVLIG HELG!"; 
                    greetingEl.classList.add('friday-mode'); 
                } else { 
                    greetingBase = (greetingsTranslations[currentLangIndex] || greetingsTranslations[0])[phase]; 
                    greetingBase = greetingBase.charAt(0).toUpperCase() + greetingBase.slice(1);
                    rawTextForSizing = greetingBase + (phase === "n" ? "" : "!"); 
                } 
                const wrappedText = wrapTextInSpans(greetingBase);
                const suffixDelay = Math.floor(Math.random() * 400); 
                
                if(phase === "n" && !isFridayMode) { 
                    greetingEl.classList.add('god-natt'); 
                    dateSubEl.classList.add('god-natt');
                    greetingEl.innerHTML = `${wrappedText}<span class="char-span" style="animation-delay: ${suffixDelay}ms"><span class="moon-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span></span>`;
                } else { 
                    dateSubEl.classList.remove('god-natt'); 
                    greetingEl.innerHTML = `${wrappedText}<span class="char-span" style="animation-delay: ${suffixDelay}ms"><span class="wiggle-mark">!</span></span>`;
                } 
                if (rawTextForSizing.length > 11) greetingEl.style.fontSize = `${Math.max(3, 77 / rawTextForSizing.length)}rem`; 
                else greetingEl.style.fontSize = '7rem';
            } 
            
            document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}); 
            
            if (unDays[todayStrForBday]) { 
                document.getElementById('date-sub').innerText = "FN-dag: " + unDays[todayStrForBday];
            } else { 
                let fallbackText = "Idag är det " + now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
                document.getElementById('date-sub').innerText = fallbackText.charAt(0).toUpperCase() + fallbackText.slice(1); 
            } 
            
            const easter = new Date('2026-03-30'), summer = new Date('2026-06-12'), worldcup = new Date('2026-06-11');
            document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000)); 
            document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
            document.getElementById('count-worldcup').innerText = Math.max(0, Math.ceil((worldcup - now) / 86400000)); 
            
            const currentYear = now.getFullYear(); 
            const todayForMath = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let minDiff = Infinity; 
            let nextBdayName = ""; 
            for (const [dateString, name] of Object.entries(birthdays)) { 
                const [month, day] = dateString.split('-');
                let bdate = new Date(currentYear, parseInt(month) - 1, parseInt(day)); 
                if (bdate < todayForMath) bdate.setFullYear(currentYear + 1);
                const diff = bdate - todayForMath; 
                if (diff < minDiff) { 
                    minDiff = diff; nextBdayName = name;
                } 
            } 
            document.getElementById('count-bday').innerText = Math.ceil(minDiff / 86400000); 
            const nameUppercase = nextBdayName.toUpperCase(); 
            document.getElementById('label-bday').innerHTML = `${nameUppercase.endsWith('S') ? nameUppercase : nameUppercase + 'S'}<br>FÖDELSEDAG`;
            
            let minHolDiff = Infinity; let nextHolLabel = "";
            for (const hol of majorHolidays) {
                let hdate = new Date(hol.date);
                if (hdate >= todayForMath) {
                    const diff = hdate - todayForMath;
                    if (diff < minHolDiff) { minHolDiff = diff; nextHolLabel = hol.label; }
                }
            }
            document.getElementById('count-holiday').innerText = Math.ceil(minHolDiff / 86400000);
            document.getElementById('label-holiday').innerHTML = nextHolLabel;
        }
    }

    async function fetchNews() {
        try {
            const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.svt.se/nyheter/rss.xml');
            const data = await response.json();
            textNewsItems = data.items.map(i => i.title);
            if(textNewsItems.length === 0) textNewsItems = ["Inga nyheter kunde laddas."];
            displayNextNews();
        } catch (e) {
            console.error('Nyhetsfel:', e);
        }
    }

    function displayNextNews() {
        if (textNewsItems.length === 0) return; 
        const newsTextEl = document.getElementById('news-text'); 
        newsTextEl.style.opacity = 0;
        setTimeout(() => { 
            newsTextEl.innerText = textNewsItems[textNewsIndex]; 
            newsTextEl.style.opacity = 1; 
            textNewsIndex = (textNewsIndex + 1) % textNewsItems.length; 
        }, 500);
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime&maxResults=3`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = (d.items || []).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                const end = new Date(e.end.dateTime || e.end.date);
                
                let timeText = "Heldag";
                if (e.start.dateTime) timeText = `kl. ${start.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'})}`;
                
                let dayName = start.toLocaleDateString('sv-SE', {weekday: 'short'}); 
                dayName = dayName.charAt(0).toUpperCase() + dayName.slice(1).replace('.', '');
                let monthName = start.toLocaleDateString('sv-SE', {month: 'short'}).replace('.', '');
                
                let dateString = `${dayName} ${start.getDate()} ${monthName}`;
                
                return `
                    <div class="event-card ${start.toDateString() === todayStr ? 'today' : ''}">
                        <div class="ev-date-col">
                            <div class="ev-date">${dateString}</div>
                            <div class="ev-time">${timeText}</div>
                        </div>
                        <div class="ev-title-col">
                            ${e.summary}
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) { console.error('Kalenderfel:', e); }
    }

    function getWeatherSwedishDesc(code) { 
        const weatherCodes = { 
            0: "klart", 1: "övervägande klart", 2: "halvklart", 3: "mulet", 45: "dimma", 48: "frysande dimma", 
            51: "lätt duggregn", 53: "måttligt duggregn", 55: "tätt duggregn", 56: "lätt frysande duggregn", 57: "kraftigt frysande duggregn", 
            61: "lätt regn", 63: "måttligt regn", 65: "kraftigt regn", 66: "lätt underkylt regn", 67: "kraftigt underkylt regn", 
            71: "lätt snöfall", 73: "måttligt snöfall", 75: "kraftigt snöfall", 77: "snökorn", 80: "lätta regnskurar", 
            81: "måttliga regnskurar", 82: "kraftiga regnskurar", 85: "lätta snöbyar", 86: "kraftiga snöbyar", 
            95: "åska", 96: "åska med hagel", 99: "kraftig åska" 
        };
        return weatherCodes[code] || "varierande väder"; 
    } 
    
    async function updateWeather() { 
        try { 
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&current=is_day&hourly=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,precipitation_sum,wind_speed_10m_max&wind_speed_unit=ms&timezone=auto');
            const d = await res.json(); 
            isRealDaytime = (d.current.is_day === 1); 
            const nowH = new Date().getHours(); 
            const currentCode = d.hourly.weathercode[nowH]; 
            lastRealWeatherCode = currentCode; 
            currentTempStr = Math.round(d.hourly.temperature_2m[nowH]) + "°"; 
            
            const wIcon = code => { 
                if (code === 0) return isRealDaytime ? 'sun' : 'moon'; 
                if (code <= 3) return 'cloud'; 
                if (code <= 67 || code >= 80) return 'cloud-rain'; 
                if (code <= 77 || code === 85 || code === 86) return 'snowflake'; 
                return 'cloud'; 
            }; 
            currentIconHtml = `<i data-lucide="${wIcon(currentCode)}"></i>`; 
            
            let listHtml = ''; 
            for (let i = 0; i < 3; i++) { 
                const h = nowH + (i * 3); 
                if (d.hourly.time[h]) { 
                    const t = Math.round(d.hourly.temperature_2m[h]); 
                    const c = d.hourly.weathercode[h]; 
                    const timeStr = i === 0 ? "NU" : new Date(d.hourly.time[h]).toLocaleTimeString('sv-SE', {hour: '2-digit', minute:'2-digit'}); 
                    listHtml += `<div class="weather-box"><div class="weather-hour">${timeStr}</div><div class="weather-icon-wrapper"><i data-lucide="${wIcon(c)}"></i></div><div class="weather-temp">${t}°</div></div>`; 
                } 
            } 
            document.getElementById('weather-list').innerHTML = listHtml; 
            updateWeatherOverlay(currentCode); 
            
            const todayMaxTemp = Math.round(d.daily.temperature_2m_max[0]); 
            const todayRain = d.daily.precipitation_sum[0]; 
            const todayWind = d.daily.wind_speed_10m_max[0]; 
            const laterCode = d.hourly.weathercode[nowH + 5] !== undefined ? d.hourly.weathercode[nowH + 5] : currentCode; 
            const currentDesc = getWeatherSwedishDesc(currentCode), laterDesc = getWeatherSwedishDesc(laterCode);
            
            let summaryText = ""; 
            if (currentDesc === laterDesc) summaryText = `Just nu är det <strong>${currentDesc}</strong> och det ser ut att hålla i sig. `; 
            else { 
                let timeWord = (nowH >= 18) ? "under natten/morgondagen" : "senare under dagen";
                summaryText = `Just nu är det <strong>${currentDesc}</strong>, men ${timeWord} väntas <strong>${laterDesc}</strong>. `;
            } 
            summaryText += `Dagens maxtemperatur når upp mot <strong>${todayMaxTemp}°</strong>. `;
            if (todayRain > 0.5) summaryText += `Räkna med totalt ca <strong>${todayRain} mm</strong> nederbörd under dygnet. `;
            else summaryText += `Ingen nämnvärd nederbörd väntas. `; 
            
            if (todayWind > 10) summaryText += `Dessutom blåsigt med vindbyar upp mot <strong>${Math.round(todayWind)} m/s</strong>.`;
            else if (todayWind > 5) summaryText += `Måttliga vindar upp mot <strong>${Math.round(todayWind)} m/s</strong>.`; 
            else summaryText += `Överlag <strong>svaga vindar</strong>.`;
            
            document.getElementById('weather-summary').innerHTML = summaryText; 
            lucide.createIcons(); 
        } catch(e) { console.error("Väderfel", e); }
    }

    function updateWeatherOverlay(code) {
        const container = document.getElementById('weather-overlay');
        container.innerHTML = '';
        
        let type = 'none';
        if (forcedWeatherMode === 'rain' || [51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) type = 'rain';
        else if (forcedWeatherMode === 'snow' || [71,73,75,77,85,86].includes(code)) type = 'snow';

        if (type === 'none') return;
        
        const count = type === 'rain' ? 80 : 40;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.background = '#fff';
            p.style.opacity = type === 'rain' ? '0.3' : '0.6';
            p.style.width = type === 'rain' ? '2px' : '6px';
            p.style.height = type === 'rain' ? '15px' : '6px';
            p.style.borderRadius = type === 'snow' ? '50%' : '0';
            p.style.left = `${Math.random() * 100}vw`;
            p.style.top = '-100px';
            p.style.pointerEvents = 'none';
            p.style.willChange = 'transform';
            
            const duration = type === 'rain' ? (0.5 + Math.random() * 0.5) : (2 + Math.random() * 3);
            p.animate([
                { transform: `translateY(0) ${type === 'snow' ? 'translateX(0)' : ''}` },
                { transform: `translateY(110vh) ${type === 'snow' ? 'translateX(50px)' : ''}` }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                delay: -Math.random() * 5000
            });
            container.appendChild(p);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initStars(); update(); updateCalendar(); updateWeather(); fetchNews(); lucide.createIcons();
        setInterval(update, 1000); 
        setInterval(updateCalendar, 600000); 
        setInterval(updateWeather, 300000); 
        setInterval(fetchNews, 3600000); 
        
        setInterval(() => {
            if (celebrationActive || isNightModeForced || new Date().getHours() >= 23 || new Date().getHours() < 6) return; 
            const spans = document.getElementById('greeting').querySelectorAll('.char-span');
            let maxDelay = 0;
            spans.forEach(span => {
                const randomDelay = Math.floor(Math.random() * 400); 
                if (randomDelay > maxDelay) maxDelay = randomDelay;
                span.style.animationDelay = `${randomDelay}ms`; 
                span.classList.add('out');
            });
            setTimeout(() => {
                spans.forEach(span => span.classList.remove('out'));
            }, maxDelay + 600);
        }, 30000);
    });

</script>
