<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v123</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* VÄDER-OVERLAY */
        #weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .info-panel {
            flex: 0 0 48%; 
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            position: relative;
            z-index: 20;
        }

        header {
            max-width: 100%; /* Säkerställer att boxen håller sig inom panelen */
        }

        #greeting { 
            font-size: 7rem; 
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -4px; 
            white-space: nowrap; 
            text-transform: lowercase; 
            /* Mjuk animering av både färg och storlek när texten skalas */
            transition: color 2s ease, font-size 0.4s ease;
        }
        #greeting::first-letter { text-transform: uppercase; }

        #greeting.god-natt { color: #666; }
        #greeting.god-natt .wiggle-mark { color: #666; }
        
        /* Födelsedagshälsning - Orange */
        #greeting.birthday { color: #ffaa33; text-shadow: 0 0 20px rgba(255, 170, 51, 0.4); }

        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center;
            animation: intensive-wiggle 3s infinite;
            color: #fff; /* Standardfärg: Vit */
            transition: color 2s ease;
        }
        
        /* Utropstecknet blir orange när det är födelsedag */
        #greeting.birthday .wiggle-mark { color: #ffaa33; }

        @keyframes intensive-wiggle {
            0%, 70% { transform: translate(0,0) rotate(0deg); }
            75% { transform: translate(2px, -2px) rotate(15deg); }
            80% { transform: translate(-2px, -2px) rotate(-15deg); }
            85% { transform: translate(2px, 0) rotate(10deg); }
            90% { transform: translate(-1px, 0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .moon-icon {
            display: inline-block;
            margin-left: 10px;
            color: #666;
        }
        .moon-icon svg {
            width: 0.8em;
            height: 0.8em;
            vertical-align: baseline;
        }

        #date-sub { 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: var(--accent); 
            margin-bottom: 5px;
            text-transform: lowercase; 
        }
        #date-sub::first-letter { text-transform: uppercase; }

        .section-label { 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); 
            margin-bottom: 10px; 
            display: flex;
            align-items: center;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { border-color: var(--accent); }

        .event-date-box {
            min-width: 140px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        
        .ev-day-name { font-size: 1.3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.5rem; font-weight: 900; line-height: 1.1; } 
        .ev-time { font-size: 1.7rem; opacity: 0.8; font-weight: 700; margin-top: 8px; } 
        .event-title { font-size: 2.6rem; font-weight: 400; flex: 1; line-height: 1.2; }

        .weather-row { display: flex; gap: 15px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 25px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-icon-wrapper {
            display: inline-block;
            margin: 10px 0;
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .weather-box i, .weather-box svg { 
            width: 100px !important; 
            height: 100px !important; 
            color: var(--accent); 
            display: block; 
            margin: 0 auto; 
        }

        .weather-box i[data-lucide="sun"], 
        .weather-box svg.lucide-sun {
            color: #ffb703 !important;
        }

        .weather-temp { font-size: 3.8rem; font-weight: 900; margin-top: 5px; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        .media-panel { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 20; }
        
        /* YOUTUBE-VIDEO */
        .video-container { 
            flex: 1; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
        }
        
        .video-container iframe { 
            position: absolute; 
            top: -25%; 
            left: 0; 
            width: 100%; 
            height: 150%; 
            border: none; 
            pointer-events: none;
        }

        .countdown-bar {
            height: 200px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }

        .countdown-wrapper { display: flex; align-items: center; gap: 30px; }
        .vertical-label { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            font-size: 1.2rem;
            font-weight: 900; 
            letter-spacing: 2px; 
            opacity: 0.4;
        }

        #clock { font-size: 4.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        .news-bar {
            background: #0a0a0a;
            padding: 25px 60px;
            border-top: 1px solid var(--border);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #news-text { 
            font-size: 1.5rem; 
            opacity: 0.8; 
            line-height: 1.4; 
            font-weight: 300; 
            transition: opacity 0.5s; 
        }
        
        .particle {
            position: absolute;
            background: #fff;
            pointer-events: none;
            opacity: 0.6;
        }

        /* TILLFÄLLIG TESTKNAPP */
        #test-bday-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: var(--easter);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>

    <div class="info-panel">
        <header>

    <div class="media-panel">
        
        <div class="video-container">

                        <div id="count-summer" style="font-size: 5.5rem; font-weight: 900; color: var(--summer);">--</div>
                        <div style="font-size: 1.35rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900; line-height: 1.1;">SOMMAR-<br>LOV</div>
                    </div>
                </div>
            </div>
            <div id="clock">00:00</div>
        </div>
        
        <div class="news-bar">
            <div class="section-label" style="margin-bottom: 5px;">
                <span class="live-dot"></span> Senaste Nytt (Al Jazeera)
            </div>
            <div id="news-text">Laddar nyheter...</div>
        </div>
    </div>
