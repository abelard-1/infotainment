<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v134</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* --- FÖDELSEDAGS-SKÄRMEN (HELSKÄRM) --- */
        #birthday-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 8000; 
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #birthday-screen img.bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.25;
            z-index: 1;
        }

        #bday-main-text {
            position: relative;
            z-index: 2;
            font-size: clamp(6rem, 12vw, 15rem);
            line-height: 1;
            font-weight: 900;
            text-align: center;
            letter-spacing: -2px;
            /* Guld-effekt - Nu helt statisk för Chromecast-prestanda */
            background: linear-gradient(180deg, #FFDF00 0%, #D4AF37 50%, #996515 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 40px rgba(255, 215, 0, 0.4));
        }

        #bday-footer {
            position: absolute;
            bottom: 40px;
            right: 60px;
            z-index: 2;
            display: flex;
            gap: 40px;
            align-items: center;
            background: rgba(20, 20, 20, 0.7);
            padding: 20px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        #bday-clock { font-size: 3.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
        #bday-weather { display: flex; align-items: center; gap: 15px; font-size: 3rem; font-weight: 900; color: #D4AF37; }
        #bday-weather svg { width: 50px; height: 50px; }
        /* -------------------------------------- */

        /* VÄDER-OVERLAY */
        #weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .info-panel {
            flex: 0 0 48%; 
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            position: relative;
            z-index: 20;
        }

        header {
            max-width: 100%;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            perspective: 2000px; 
            padding-bottom: 10px;
        }

        #greeting { 
            font-size: 7rem; 
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -4px; 
            white-space: nowrap; 
            transition: color 2s ease;
        }

        .char-span {
            display: inline-block;
            transform-origin: center center;
            animation: charFlipIn 0.8s ease both;
            transform-style: preserve-3d;
            z-index: 1;
        }

        @keyframes charFlipIn {
            0% { transform: rotateX(-90deg); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        .char-span.out {
            animation: charFlipOut 0.5s ease-in both;
        }

        @keyframes charFlipOut {
            0% { transform: rotateX(0deg); opacity: 1; }
            100% { transform: rotateX(90deg); opacity: 0; }
        }

        #greeting.god-natt { color: #666; }
        #greeting.god-natt .wiggle-mark { color: #666; }
        
        #greeting.birthday { color: #ffaa33; text-shadow: 0 0 20px rgba(255, 170, 51, 0.4); }

        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center;
            animation: intensive-wiggle 60s infinite;
            color: #fff; 
            transition: color 2s ease;
        }
        
        #greeting.birthday .wiggle-mark { color: #ffaa33; }

        @keyframes intensive-wiggle {
            0%, 98% { transform: translate(0,0) rotate(0deg); }
            98.4% { transform: translate(2px, -2px) rotate(15deg); }
            98.8% { transform: translate(-2px, -2px) rotate(-15deg); }
            99.2% { transform: translate(2px, 0) rotate(10deg); }
            99.6% { transform: translate(-1px, 0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .moon-icon { display: inline-block; margin-left: 10px; color: #666; }
        .moon-icon svg { width: 0.8em; height: 0.8em; vertical-align: baseline; }

        #date-sub { 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: var(--accent); 
            margin-bottom: 5px;
            text-transform: lowercase; 
        }
        #date-sub::first-letter { text-transform: uppercase; }

        .section-label { 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); 
            margin-bottom: 10px; 
            display: flex;
            align-items: center;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { border-color: var(--accent); }

        .event-date-box {
            min-width: 140px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        
        .ev-day-name { font-size: 1.3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.5rem; font-weight: 900; line-height: 1.1; } 
        .ev-time { font-size: 1.7rem; opacity: 0.8; font-weight: 700; margin-top: 8px; } 
        .event-title { font-size: 2.6rem; font-weight: 400; flex: 1; line-height: 1.2; }

        .weather-row { display: flex; gap: 15px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 25px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-icon-wrapper {
            display: inline-block;
            margin: 10px 0;
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .weather-box i, .weather-box svg { 
            width: 100px !important; 
            height: 100px !important; 
            color: var(--accent); 
            display: block; 
            margin: 0 auto; 
        }

        .weather-box i[data-lucide="sun"], 
        .weather-box svg.lucide-sun { color: #ffb703 !important; }
        .weather-temp { font-size: 3.8rem; font-weight: 900; margin-top: 5px; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        .media-panel { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 20; }
        
        .video-container { 
            flex: 1; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
        }

        .video-container iframe { 
            position: absolute; 
            top: -25%; 
            left: 0; 
            width: 100%; 
            height: 150%; 
            border: none; 
            pointer-events: none;
            z-index: 1;
        }

        .countdown-bar {
            height: 200px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }

        .countdown-wrapper { display: flex; align-items: center; gap: 30px; }
        .vertical-label { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            font-size: 1.2rem;
            font-weight: 900; 
            letter-spacing: 2px; 
            opacity: 0.4;
        }

        #clock { font-size: 4.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        .news-bar {
            background: #0a0a0a;
            padding: 25px 60px;
            border-top: 1px solid var(--border);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #news-text { 
            font-size: 1.5rem; 
            opacity: 0.8; 
            line-height: 1.4; 
            font-weight: 300; 
            transition: opacity 0.5s; 
        }
        
        .particle {
            position: absolute;
            background: #fff;
            pointer-events: none;
            opacity: 0.6;
        }

        #test-bday-btn {
            position: fixed;
            bottom: 20px;
            left: 20px; 
            z-index: 9999;
            background: var(--easter);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="birthday-screen">
        <img class="bg-image" src="https://images.unsplash.com/photo-1530103862676-de3c9da59c8b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" alt="Födelsedagsbakgrund">
        
        <div id="bday-main-text">GRATTIS<br>NAMN!</div>
        
        <div id="bday-footer">
            <div id="bday-weather">Laddar...</div>
            <div id="bday-clock">00:00</div>
        </div>
    </div>

    <div id="weather-overlay"></div>

    <button id="test-bday-btn" onclick="testBirthdayToggle()">Testa Födelsedag 🎉</button>

    <div class="info-panel">
        <header>
            <div id="greeting">Laddar...</div>
            <div id="date-sub">Laddar...</div>
        </header>

        <section>
            <div class="section-label">Kalender</div>
            <div id="calendar-list"></div>
        </section>

        <section>
            <div class="section-label">Väder i Staffanstorp</div>
            <div id="weather-list" class="weather-row"></div>
        </section>
    </div>

    <div class="media-panel">
        <div class="video-container">
            <iframe id="bg-video" 
                data-src="https://www.youtube.com/embed/gCNeDWCI0vo?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=gCNeDWCI0vo" 
                src="https://www.youtube.com/embed/gCNeDWCI0vo?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=gCNeDWCI0vo" 
                allow="autoplay">
            </iframe>
        </div>

        <div class="countdown-bar">
            <div class="countdown-wrapper">
                <div class="vertical-label">DAGAR KVAR TILL</div>
                <div style="display: flex; gap: 50px;">
                    <div style="text-align: center;">
                        <div id="count-easter" style="font-size: 5.5rem; font-weight: 900; color: var(--easter);">--</div>
                        <div style="font-size: 1.35rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900; line-height: 1.1;">PÅSK-<br>LOV</div>
                    </div>
                    <div style="text-align: center;">
                        <div id="count-summer" style="font-size: 5.5rem; font-weight: 900; color: var(--summer);">--</div>
                        <div style="font-size: 1.35rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900; line-height: 1.1;">SOMMAR-<br>LOV</div>
                    </div>
                </div>
            </div>
            <div id="clock">00:00</div>
        </div>
        
        <div class="news-bar">
            <div class="section-label" style="margin-bottom: 5px;">
                <span class="live-dot"></span> Senaste Nytt (Al Jazeera)
            </div>
            <div id="news-text">Laddar nyheter...</div>
        </div>
    </div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw'; 
    const CAL_ID = 'rezgarhayder@gmail.com';
    
    let textNewsItems = [];
    let textNewsIndex = 0;

    const birthdays = {
        "03-23": "Jakob",
        "04-08": "Rezgar",
        "05-27": "Julia",
        "07-15": "Olivia",
        "07-29": "Jakob",
        "01-02": "Asia"
    };

    const greetingsTranslations = [
        { m: "God morgon", d: "God dag", e: "God kväll", n: "God natt" },
        { m: "Good morning", d: "Good afternoon", e: "Good evening", n: "Good night" },
        { m: "Guten Morgen", d: "Guten Tag", e: "Guten Abend", n: "Gute Nacht" }
    ];
    let currentLangIndex = 0;
    
    let currentRenderedGreeting = "";
    let forceTestBirthday = false;
    
    let celebrationActive = false;
    let birthdayInterval = null; 
    let animationFrameId = null;
    
    let currentTempStr = "--°";
    let currentIconHtml = "";

    function randomColor() {
        var colors = ['#FFDF00', '#D4AF37', '#ffffff', '#ff6666', '#ff00ff', '#44ffff'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function fireworkExplosion() {
        confetti({
            particleCount: randomInRange(100, 150), 
            spread: randomInRange(150, 360), 
            startVelocity: randomInRange(20, 40), 
            ticks: 150, 
            gravity: 0.8, 
            scalar: randomInRange(1, 1.5), 
            origin: { x: randomInRange(0.1, 0.9), y: randomInRange(0.2, 0.6) },
            colors: [randomColor(), randomColor()], 
            zIndex: 10001
        });
    }

    function triggerCelebration() {
        if (celebrationActive) return;
        celebrationActive = true;

        if (birthdayInterval) clearInterval(birthdayInterval);

        (function frame() {
            if (!celebrationActive) return; 

            confetti({
                particleCount: 1, 
                startVelocity: 0, 
                ticks: 400,
                origin: { x: Math.random(), y: -0.1 },
                colors: [randomColor()],
                gravity: randomInRange(0.4, 0.6), 
                scalar: randomInRange(0.8, 1.2), 
                drift: randomInRange(-0.5, 0.5),
                zIndex: 10000 
            });

            animationFrameId = requestAnimationFrame(frame);
        }());

        birthdayInterval = setInterval(function() {
            if (!celebrationActive) {
                clearInterval(birthdayInterval);
                return;
            }
            fireworkExplosion();
        }, 10000); 
    }

    function stopCelebration() {
        celebrationActive = false;
        if (birthdayInterval) clearInterval(birthdayInterval);
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (typeof confetti !== 'undefined' && typeof confetti.reset === 'function') {
            confetti.reset();
        }
    }

    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    function wrapTextInSpans(text) {
        return text.split('').map(char => {
            const delay = Math.floor(Math.random() * 400); 
            return `<span class="char-span" style="animation-delay: ${delay}ms">${char === ' ' ? '&nbsp;' : char}</span>`;
        }).join('');
    }

    function testBirthdayToggle() {
        forceTestBirthday = !forceTestBirthday;
        const btn = document.getElementById('test-bday-btn');
        
        if (forceTestBirthday) {
            btn.innerText = "Stäng av Test 🛑";
            btn.style.background = "#ff6666";
        } else {
            btn.innerText = "Testa Födelsedag 🎉";
            btn.style.background = "var(--easter)";
        }
        update(); 
    }

    function update() {
        const now = new Date();
        const hour = now.getHours();
        const greetingEl = document.getElementById('greeting');
        const iframe = document.getElementById('bg-video');
        const bdayScreen = document.getElementById('birthday-screen');
        
        const todayStrForBday = String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        let isBirthday = false;
        let bdayName = "";

        if (birthdays[todayStrForBday]) {
            isBirthday = true;
            bdayName = birthdays[todayStrForBday];
        }

        if (forceTestBirthday) {
            isBirthday = true;
            bdayName = "Jakob"; 
        }

        if (isBirthday) {
            if (!celebrationActive) {
                triggerCelebration();
                bdayScreen.style.display = 'flex';
                document.getElementById('bday-main-text').innerHTML = `GRATTIS<br>${bdayName.toUpperCase()}!`;
                
                if(iframe.src && iframe.src !== 'about:blank') {
                    iframe.src = 'about:blank'; 
                    iframe.style.display = 'none';
                }
            }
            const timeStr = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('bday-clock').innerText = timeStr;
            
        } else {
            if (celebrationActive) {
                stopCelebration();
                bdayScreen.style.display = 'none';
                if(iframe.src === 'about:blank' || iframe.src === '') {
                    iframe.src = iframe.getAttribute('data-src'); 
                    iframe.style.display = 'block';
                }
            }
            
            let phase = (hour >= 6 && hour < 10) ? "m" : (hour >= 10 && hour < 18) ? "d" : (hour >= 18 && hour < 23) ? "e" : "n";
            let greetingKey = `lang-${currentLangIndex}-${phase}`;

            if (currentRenderedGreeting !== greetingKey) {
                currentRenderedGreeting = greetingKey;
                greetingEl.classList.remove('birthday');
                
                let greetingBase = (greetingsTranslations[currentLangIndex] || greetingsTranslations[0])[phase];
                
                greetingBase = greetingBase.charAt(0).toUpperCase() + greetingBase.slice(1);
                let rawTextForSizing = greetingBase + (phase === "n" ? "" : "!");
                
                const wrappedText = wrapTextInSpans(greetingBase);
                const suffixDelay = Math.floor(Math.random() * 400); 
                
                if(phase === "n") {
                    greetingEl.classList.add('god-natt');
                    greetingEl.innerHTML = `${wrappedText}<span class="char-span" style="animation-delay: ${suffixDelay}ms"><span class="moon-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span></span>`;
                } else {
                    greetingEl.classList.remove('god-natt');
                    greetingEl.innerHTML = `${wrappedText}<span class="char-span" style="animation-delay: ${suffixDelay}ms"><span class="wiggle-mark">!</span></span>`;
                }

                const textLen = rawTextForSizing.length;
                if (textLen > 11) {
                    const newSize = Math.max(3, 77 / textLen);
                    greetingEl.style.fontSize = `${newSize}rem`;
                } else {
                    greetingEl.style.fontSize = '7rem';
                }
            }
        }

        document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        const dateStr = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('date-sub').innerText = "Idag är det " + dateStr;
        const easter = new Date('2026-03-30'), summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = (d.items || []).slice(0, 2).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                const dayFull = start.toLocaleDateString('sv-SE', {weekday:'long'}).toUpperCase();
                const timeStr = e.start.dateTime ? start.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG';
                return `<div class="event-card ${start.toDateString() === todayStr ? 'today' : ''}">
                    <div class="event-date-box">
                        <div class="ev-day-name">${dayFull}</div>
                        <div class="ev-date-num">${start.getDate()} ${start.toLocaleDateString('sv-SE', {month:'short'})}</div>
                        <div class="ev-time">${timeStr}</div>
                    </div>
                    <div class="event-title">${e.summary}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            const code = d.hourly.weathercode[nowH];
            
            updateWeatherOverlay(code);

            const getIcon = (c) => (c >= 71 ? 'snowflake' : c >= 51 ? 'cloud-rain' : c >= 3 ? 'cloud' : 'sun');
            
            currentTempStr = Math.round(d.hourly.temperature_2m[nowH]) + "°";
            currentIconHtml = `<i data-lucide="${getIcon(code)}"></i>`;
            document.getElementById('bday-weather').innerHTML = `${currentIconHtml} <span>${currentTempStr}</span>`;

            const todayData = d.hourly.temperature_2m.slice(0, 24);
            const todayMax = Math.round(Math.max(...todayData));
            const todayMaxIndex = todayData.indexOf(Math.max(...todayData));
            const todayMaxCode = d.hourly.weathercode[todayMaxIndex];

            const tomorrowData = d.hourly.temperature_2m.slice(24, 48);
            const tomorrowMax = Math.round(Math.max(...tomorrowData));
            const tomorrowMaxIndex = 24 + tomorrowData.indexOf(Math.max(...tomorrowData));
            const tomorrowMaxCode = d.hourly.weathercode[tomorrowMaxIndex];

            document.getElementById('weather-list').innerHTML = `
                <div class="weather-box"><div class="weather-hour">NU</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(code)}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH])}°</div></div>
                <div class="weather-box"><div class="weather-hour">MAX IDAG</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(todayMaxCode)}"></i></div><div class="weather-temp">${todayMax}°</div></div>
                <div class="weather-box"><div class="weather-hour">MAX IMORGON</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(tomorrowMaxCode)}"></i></div><div class="weather-temp">${tomorrowMax}°</div></div>
            `;
            lucide.createIcons();
        } catch(e) {}
    }

    function updateWeatherOverlay(code) {
        const container = document.getElementById('weather-overlay');
        container.innerHTML = '';
        let type = '';
        if (code >= 71) type = 'snow';
        else if (code >= 51) type = 'rain';
        else if (code >= 3) type = 'cloud';
        
        if (!type) return;

        for (let i = 0; i < (type === 'cloud' ? 5 : 50); i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            if (type === 'rain') { p.style.width = '2px'; p.style.height = '15px'; p.style.background = 'rgba(100,150,255,0.4)'; } 
            else if (type === 'snow') { p.style.width = '8px'; p.style.height = '8px'; p.style.borderRadius = '50%'; p.style.filter = 'blur(1px)'; } 
            else { p.style.width = '300px'; p.style.height = '200px'; p.style.background = 'rgba(255,255,255,0.03)'; p.style.borderRadius = '50%'; }
            
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            
            const duration = 2 + Math.random() * 3;
            p.animate([
                { transform: `translateY(-100px) ${type === 'snow' ? 'translateX(0)' : ''}` },
                { transform: `translateY(110vh) ${type === 'snow' ? 'translateX(50px)' : ''}` }
            ], { duration: duration * 1000, iterations: Infinity, delay: -Math.random() * 5000 });
            container.appendChild(p);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); 
        updateCalendar(); 
        updateWeather(); 

        setInterval(update, 1000); 
        setInterval(updateCalendar, 600000); 
        setInterval(updateWeather, 1800000); 
        
        setInterval(() => {
            if (celebrationActive) return; 
            
            const greetingEl = document.getElementById('greeting');
            const spans = greetingEl.querySelectorAll('.char-span');
            
            let maxDelay = 0;
            spans.forEach((span) => {
                const randomDelay = Math.floor(Math.random() * 400); 
                if (randomDelay > maxDelay) maxDelay = randomDelay;
                span.style.animationDelay = `${randomDelay}ms`;
                span.classList.add('out'); 
            });

            setTimeout(() => {
                currentLangIndex = (currentLangIndex + 1) % greetingsTranslations.length;
                update(); 
            }, maxDelay + 550);
            
        }, 10000);
    });
</script>
</body>
</html>
