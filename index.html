<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Command v52 - Celebration Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 10, 10, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #5e92f3;
            --text-main: #ffffff;
            --easter-gold: #ffaa33;
            --summer-cyan: #44ffff;
            --power-green: #44ff88;
            --crypto-orange: #f7931a;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', sans-serif; background-color: #000; margin: 0;
            height: 100vh; width: 100vw; color: var(--text-main);
            display: grid; grid-template-columns: 520px 1fr;
            grid-template-rows: 15vh minmax(0, 1fr) 12vh;
            gap: 15px; padding: 15px; overflow: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--glass-border); border-radius: 30px;
            position: relative; overflow: hidden; z-index: 10;
        }

        /* HEADER LAYOUT */
        .top-bar { grid-column: 1/3; display: grid; grid-template-columns: 550px 1fr 180px; align-items: center; padding: 0 40px; }
        
        #greet-container { display: flex; flex-direction: column; }
        #greeting {
            font-size: 3.2rem; font-weight: 900; letter-spacing: -2px; line-height: 1.1;
            background: linear-gradient(to bottom, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #sub-greeting { font-size: 1.1rem; font-weight: 400; opacity: 0.7; margin-top: 5px; color: var(--accent); }

        #header-hourly { 
            display: flex; justify-content: space-evenly; align-items: center; 
            border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); 
            height: 70%; margin: 0 30px; 
        }

        .weather-node i { width: 32px !important; height: 32px !important; margin: 4px 0; }
        [data-lucide="sun"] { animation: spin 20s linear infinite; color: #ffcc00 !important; }
        [data-lucide="cloud"] { animation: float 6s ease-in-out infinite; color: #b0c4de !important; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* SIDEBAR */
        .sidebar-container { grid-column: 1/2; grid-row: 2/3; display: grid; grid-template-rows: 1fr 240px; gap: 15px; min-height: 0; }
        .event-item { display: flex; align-items: center; gap: 20px; padding: 18px 25px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; }
        .event-item.is-today { background: rgba(94, 146, 243, 0.15); border-color: var(--accent); }

        /* FOOTER CLOCK */
        .footer-clock-box { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; padding-right: 30px; min-width: 250px; }
        #footer-time { font-size: 4rem; font-weight: 900; line-height: 1; margin-bottom: -5px; }
        #footer-date { font-size: 0.9rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        .val-big { font-size: 3.2rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .main-content { position: relative; background: #000; }
        .video-background { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .video-background iframe { width: 100%; height: 100%; transform: scale(1.15); }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<header class="top-bar glass-panel">
    <div id="greet-container">
        <div id="greeting">God dag!</div>
        <div id="sub-greeting">Idag är det tisdag, 24 februari 2026</div>
    </div>
    <div id="header-hourly"></div>
    <div style="text-align: right;">
        <div style="font-size: 0.65rem; opacity: 0.5; font-weight: 900; letter-spacing: 1px;">IMORGON MAX</div>
        <div id="tom-temp" style="font-weight: 900; font-size: 2.8rem; line-height: 1;">--°</div>
    </div>
</header>

<div class="sidebar-container">
    <section class="glass-panel" style="padding: 25px;">
        <div id="custom-calendar-list"></div>
    </section>
    
    <section class="glass-panel" style="padding: 30px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="border-right: 1px solid rgba(255,255,255,0.1); padding-right: 15px;">
                <div style="font-size: 0.65rem; opacity: 0.5; font-weight: 800; margin-bottom: 5px;">ELPRIS SE4</div>
                <div style="display: flex; align-items: baseline;">
                    <div id="power-price" class="val-big" style="color: var(--power-green);">--</div>
                    <span style="font-size: 1rem; opacity: 0.6; margin-left: 5px;">öre</span>
                </div>
            </div>
            <div>
                <div style="font-size: 0.65rem; opacity: 0.5; font-weight: 800; margin-bottom: 5px;">BITCOIN / USD</div>
                <div id="btc-price" class="val-big" style="color: var(--crypto-orange);">--</div>
            </div>
        </div>
    </section>
</div>

<main class="main-content glass-panel">
    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/03pYP2Nmreo?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=03pYP2Nmreo" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
</main>

<div style="grid-column: 1/2; grid-row: 3/4;">
    <footer class="glass-panel" style="height: 100%; display: flex; align-items: center; padding: 0 40px;">
        <div id="news-text" style="font-weight: 600; text-transform: uppercase; font-size: 0.9rem; flex: 1;">LADDAR NYHETER...</div>
    </footer>
</div>

<div style="grid-column: 2/3; grid-row: 3/4; display: flex; gap: 15px;">
    <div class="glass-panel" style="display: flex; gap: 15px; padding: 0 25px; flex: 1;">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 15px;">
            <div style="font-size: 0.55rem; font-weight: 900; color: var(--easter-gold);">PÅSK</div>
            <div id="count-easter" style="font-size: 2.2rem; font-weight: 900;">--</div>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 15px;">
            <div style="font-size: 0.55rem; font-weight: 900; color: var(--summer-cyan);">SOMMAR</div>
            <div id="count-summer" style="font-size: 2.2rem; font-weight: 900;">--</div>
        </div>
        <div id="history-fact" style="font-size: 1rem; flex: 1; display: flex; align-items: center; padding-left: 10px; border-left: 3px solid var(--accent);">Hämtar historik...</div>
    </div>
    
    <div class="glass-panel footer-clock-box">
        <div id="footer-time">00:00</div>
        <div id="footer-date">Tisdag 24 Feb</div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';
    let weatherMode = 'clear';
    let isBirthday = false;

    // FÖDELSEDAGAR (Månad är 0-indexerat, dvs Jan=0, Feb=1)
    const birthdays = [
        { name: "Familjen", month: 1, day: 24 } // TEST: Idag 24 feb
    ];

    // 1. TID, HÄLSNING & CELEBRATION
    function updateTime() {
        const now = new Date();
        const hrs = now.getHours();
        const m = now.getMonth();
        const d = now.getDate();
        
        // Kolla födelsedag
        const bday = birthdays.find(b => b.month === m && b.day === d);
        
        // Footer klocka
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('footer-date').innerText = now.toLocaleDateString('sv-SE', {weekday:'long', day:'numeric', month:'short'});
        
        // Header Hälsning
        let greet = "God dag!";
        if (hrs >= 5 && hrs < 10) greet = "God morgon!";
        else if (hrs >= 18 && hrs < 22) greet = "God kväll!";
        else if (hrs >= 22 || hrs < 5) greet = "God natt!";
        
        if (bday) {
            greet = "Stort grattis!";
            if (!isBirthday) { isBirthday = true; initFX(); }
        }
        
        document.getElementById('greeting').innerText = greet;
        
        // Sub-greeting: "Idag är det fredag, 25 mars 2026"
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        const dateStr = now.toLocaleDateString('sv-SE', options);
        document.getElementById('sub-greeting').innerText = `Idag är det ${dateStr}`;

        // Nedräkning
        document.getElementById('count-easter').innerText = Math.ceil((new Date('2026-03-30') - now) / 86400000);
        document.getElementById('count-summer').innerText = Math.ceil((new Date('2026-06-12') - now) / 86400000);
    }

    // 2. VÄDER & MARKNAD (Samma som v51)
    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&daily=temperature_2m_max&timezone=auto');
            const d = await res.json();
            const nowHour = new Date().getHours();
            const code = d.hourly.weathercode[nowHour];
            weatherMode = (code >= 71) ? 'snow' : (code >= 51 ? 'rain' : 'clear');
            initFX(); 

            document.getElementById('tom-temp').innerText = Math.round(d.daily.temperature_2m_max[1]) + '°';
            let hHtml = '';
            for(let i=1; i<=7; i++) {
                const idx = nowHour + i;
                const icon = d.hourly.weathercode[idx] <= 2 ? (d.hourly.weathercode[idx] === 0 ? 'sun' : 'cloud-sun') : (d.hourly.weathercode[idx] === 3 ? 'cloud' : 'cloud-rain');
                hHtml += `<div class="weather-node" style="text-align:center"><div style="font-size:0.7rem; opacity:0.6;">${new Date(d.hourly.time[idx]).getHours()}:00</div><i data-lucide="${icon}"></i><div>${Math.round(d.hourly.temperature_2m[idx])}°</div></div>`;
            }
            document.getElementById('header-hourly').innerHTML = hHtml; lucide.createIcons();
        } catch(e) {}
    }

    // 3. FX ENGINE (Konfetti + Väder)
    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor(type) {
            this.type = type;
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height;
            this.w = Math.random() * 10 + 5;
            this.h = Math.random() * 10 + 5;
            this.speed = Math.random() * 3 + 2;
            this.color = this.type === 'confetti' ? `hsl(${Math.random()*360}, 100%, 50%)` : 'white';
            this.rot = Math.random() * 360;
            this.rSpeed = Math.random() * 10 - 5;
        }
        update() {
            this.y += (this.type === 'confetti') ? this.speed : (weatherMode === 'rain' ? 15 : 2);
            this.rot += this.rSpeed;
            if (this.y > canvas.height) this.reset();
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rot * Math.PI / 180);
            ctx.fillStyle = this.color;
            if (this.type === 'confetti') ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
            else { ctx.beginPath(); ctx.arc(0,0, (weatherMode==='rain'?1:3), 0, Math.PI*2); ctx.fill(); }
            ctx.restore();
        }
    }

    function initFX() {
        particles = [];
        if (isBirthday) {
            for(let i=0; i<100; i++) particles.push(new Particle('confetti'));
        }
        if (weatherMode !== 'clear') {
            for(let i=0; i<80; i++) particles.push(new Particle('weather'));
        }
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    // 4. RESTEN AV FUNKTIONERNA (Samma som v51)
    async function updateCalendar() { /* Samma som v51 */
        const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
        const d = await res.json();
        if (d.items) {
            document.getElementById('custom-calendar-list').innerHTML = d.items.slice(0, 4).map(event => {
                const start = new Date(event.start.dateTime || event.start.date);
                const isToday = start.toDateString() === new Date().toDateString();
                return `<div class="event-item ${isToday ? 'is-today' : ''}"><div style="min-width: 80px;"><div style="font-size:0.7rem;color:var(--accent)">${isToday ? 'IDAG' : start.toLocaleDateString('sv-SE',{day:'numeric', month:'short'})}</div><div style="font-size:1.5rem;font-weight:900">${event.start.dateTime ? start.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) : 'DAG'}</div></div><div style="font-size:1.2rem;font-weight:300">${event.summary}</div></div>`;
            }).join('');
        }
    }

    async function updateMarkets() {
        try {
            const btc = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd').then(r=>r.json());
            document.getElementById('btc-price').innerText = Math.floor(btc.bitcoin.usd).toLocaleString();
            const pwr = await fetch('https://www.elprisetjustnu.se/api/v1/prices/2026/02-24_SE4.json').then(r=>r.json());
            document.getElementById('power-price').innerText = (pwr[new Date().getHours()].SEK_per_kWh * 100).toFixed(0);
        } catch(e) {}
    }

    async function updateNews() {
        const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.svt.se/nyheter/rss.xml').then(res=>res.json());
        let items = r.items.map(i => i.title), idx = 0;
        setInterval(() => { document.getElementById('news-text').innerText = items[idx]; idx = (idx + 1) % items.length; }, 10000);
    }

    async function updateHistory() {
        const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
        const e = r.events[Math.floor(Math.random()*r.events.length)];
        document.getElementById('history-fact').innerHTML = `<b style="color:var(--accent)">${e.year}:</b> ${e.text}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateTime(); updateWeather(); updateCalendar(); updateNews(); updateHistory(); updateMarkets(); animate();
        setInterval(updateTime, 1000);
        setInterval(updateWeather, 1800000);
        setInterval(updateCalendar, 600000);
        setInterval(updateMarkets, 300000);
    });
</script>
</body>
</html>
