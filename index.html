<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v100</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* VÄDER-OVERLAY */
        #weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .info-panel {
            flex: 0 0 48%; 
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            position: relative;
            z-index: 20;
        }

        #greeting { 
            font-size: 7rem; 
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -4px; 
            white-space: nowrap; 
            text-transform: lowercase; 
        }
        #greeting::first-letter { text-transform: uppercase; }

        /* FIXAT WIGGLE */
        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center;
            animation: intensive-wiggle 3s infinite;
            color: #fff;
        }
        @keyframes intensive-wiggle {
            0%, 70% { transform: translate(0,0) rotate(0deg); }
            75% { transform: translate(2px, -2px) rotate(15deg); }
            80% { transform: translate(-2px, -2px) rotate(-15deg); }
            85% { transform: translate(2px, 0) rotate(10deg); }
            90% { transform: translate(-1px, 0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        #date-sub { 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: var(--accent); 
            margin-bottom: 5px;
            text-transform: lowercase; 
        }
        #date-sub::first-letter { text-transform: uppercase; }

        .section-label { 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); 
            margin-bottom: 10px; 
        }

        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { border-color: var(--accent); }

        .event-date-box {
            min-width: 140px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        .ev-day-name { font-size: 1rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.4rem; font-weight: 900; line-height: 1.1; }

        .weather-row { display: flex; gap: 15px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 25px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-icon-wrapper {
            display: inline-block;
            margin: 10px 0;
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .media-panel { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 20; }
        .video-container { flex: 1; background: #000; position: relative; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .countdown-bar {
            height: 200px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }

        /* DAGAR KVAR VERTIKALT */
        .countdown-wrapper { display: flex; align-items: center; gap: 30px; }
        .vertical-label { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            font-size: 0.8rem; 
            font-weight: 900; 
            letter-spacing: 2px; 
            opacity: 0.4;
        }

        #clock { font-size: 4.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        /* NYHETSANIMATION */
        #news-text { transition: opacity 0.5s; }
        
        /* SNÖ/REGN PARTIKLAR */
        .particle {
            position: absolute;
            background: #fff;
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="weather-overlay"></div>

    <div class="info-panel">
        <header>
            <div id="greeting">Laddar...</div>
            <div id="date-sub">Laddar...</div>
        </header>

        <section>
            <div class="section-label">Kalender</div>
            <div id="calendar-list"></div>
        </section>

        <section>
            <div class="section-label">Väder i Staffanstorp</div>
            <div id="weather-list" class="weather-row"></div>
        </section>
        
        <div style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px;">
            <div class="section-label">Senaste Nytt</div>
            <div id="news-text" style="font-size: 1.4rem; opacity: 0.8; line-height: 1.4; font-weight: 300; min-height: 4em;">Laddar nyheter...</div>
        </div>
    </div>

    <div class="media-panel">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/CZaqKhVLJxA?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=CZaqKhVLJxA" allow="autoplay"></iframe>
        </div>

        <div class="countdown-bar">
            <div class="countdown-wrapper">
                <div class="vertical-label">DAGAR KVAR TILL</div>
                <div style="display: flex; gap: 50px;">
                    <div style="text-align: center;">
                        <div id="count-easter" style="font-size: 5.5rem; font-weight: 900; color: var(--easter);">--</div>
                        <div style="font-size: 0.9rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900;">PÅSKLOV</div>
                    </div>
                    <div style="text-align: center;">
                        <div id="count-summer" style="font-size: 5.5rem; font-weight: 900; color: var(--summer);">--</div>
                        <div style="font-size: 0.9rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900;">SOMMARLOV</div>
                    </div>
                </div>
            </div>
            <div id="clock">00:00</div>
        </div>
    </div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw'; 
    const CAL_ID = 'rezgarhayder@gmail.com';
    let newsItems = [];
    let newsIndex = 0;

    function update() {
        const now = new Date();
        const hour = now.getHours();
        let greetingBase = (hour >= 6 && hour < 10) ? "God morgon" : (hour >= 10 && hour < 18) ? "God dag" : (hour >= 18 && hour < 23) ? "God kväll" : "God natt";
        document.getElementById('greeting').innerHTML = `${greetingBase}<span class="wiggle-mark">!</span>`;
        document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        const dateStr = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('date-sub').innerText = "Idag är det " + dateStr;
        const easter = new Date('2026-03-30'), summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = (d.items || []).slice(0, 2).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                const dayFull = start.toLocaleDateString('sv-SE', {weekday:'long'}).toUpperCase();
                return `<div class="event-card ${start.toDateString() === todayStr ? 'today' : ''}">
                    <div class="event-date-box">
                        <div class="ev-day-name">${dayFull}</div>
                        <div class="ev-date-num">${start.getDate()} ${start.toLocaleDateString('sv-SE', {month:'short'})}</div>
                    </div>
                    <div class="event-title">${e.summary}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            const code = d.hourly.weathercode[nowH];
            
            updateWeatherOverlay(code);

            const getIcon = (c) => (c >= 71 ? 'snowflake' : c >= 51 ? 'cloud-rain' : c >= 3 ? 'cloud' : 'sun');
            document.getElementById('weather-list').innerHTML = `
                <div class="weather-box"><div class="weather-hour">${nowH}:00</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(code)}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH])}°</div></div>
                <div class="weather-box"><div class="weather-hour">${(nowH+3)%24}:00</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[nowH+3])}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH+3])}°</div></div>
                <div class="weather-box"><div class="weather-hour">IMORGON</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[36])}"></i></div><div class="weather-temp">${Math.round(Math.max(...d.hourly.temperature_2m.slice(24, 48)))}°</div></div>
            `;
            lucide.createIcons();
        } catch(e) {}
    }

    function updateWeatherOverlay(code) {
        const container = document.getElementById('weather-overlay');
        container.innerHTML = '';
        let type = '';
        if (code >= 71) type = 'snow';
        else if (code >= 51) type = 'rain';
        else if (code >= 3) type = 'cloud';
        
        if (!type) return;

        for (let i = 0; i < (type === 'cloud' ? 5 : 50); i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            if (type === 'rain') {
                p.style.width = '2px'; p.style.height = '15px'; p.style.background = 'rgba(100,150,255,0.4)';
            } else if (type === 'snow') {
                p.style.width = '8px'; p.style.height = '8px'; p.style.borderRadius = '50%'; p.style.filter = 'blur(1px)';
            } else {
                p.style.width = '300px'; p.style.height = '200px'; p.style.background = 'rgba(255,255,255,0.03)'; p.style.borderRadius = '50%';
            }
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            
            const duration = 2 + Math.random() * 3;
            p.animate([
                { transform: `translateY(-100px) ${type === 'snow' ? 'translateX(0)' : ''}` },
                { transform: `translateY(110vh) ${type === 'snow' ? 'translateX(50px)' : ''}` }
            ], { duration: duration * 1000, iterations: Infinity, delay: -Math.random() * 5000 });
            container.appendChild(p);
        }
    }

    async function fetchNews() {
        try {
            const r = await fetch('https://en.wikipedia.org/api/rest_v1/feed/featured/' + new Date().toISOString().split('T')[0].replace(/-/g, '/')).then(res=>res.json());
            newsItems = r.onthisday.slice(0, 10).map(i => i.text);
            rotateNews();
        } catch(e) { document.getElementById('news-text').innerText = "Kunde inte ladda nyheter."; }
    }

    function rotateNews() {
        if (newsItems.length === 0) return;
        const el = document.getElementById('news-text');
        el.style.opacity = 0;
        setTimeout(() => {
            el.innerText = newsItems[newsIndex];
            el.style.opacity = 0.8;
            newsIndex = (newsIndex + 1) % newsItems.length;
        }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); updateCalendar(); updateWeather(); fetchNews();
        setInterval(update, 1000); 
        setInterval(updateCalendar, 600000); 
        setInterval(updateWeather, 1800000); 
        setInterval(rotateNews, 30000); // Byt nyhet var 30:e sekund
        setInterval(fetchNews, 3600000);
    });
</script>
</body>
</html>
