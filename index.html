<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v127</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* VÄDER-OVERLAY */
        #weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .info-panel {
            flex: 0 0 48%; 
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            position: relative;
            z-index: 20;
        }

        header {
            max-width: 100%;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            /* Ökad perspective för en mer dramatisk 3D-flipp av enskilda tecken */
            perspective: 2000px; 
            padding-bottom: 10px;
        }

        #greeting { 
            font-size: 7rem; 
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -4px; 
            white-space: nowrap; 
            text-transform: lowercase; 
            /* Mjuk autoskalning och färgbyten (flippsköts av animationer nu) */
            transition: color 2s ease, font-size 0.4s ease;
        }
        #greeting::first-letter { text-transform: uppercase; }

        /* --- CSS FÖR BOKSTAVS-FLIPP --- */
        
        /* Standardstil för ett tecken när det är "inne" i vyn */
        .char-span {
            display: inline-block;
            transform-origin: center center;
            opacity: 1;
            /* In-animation: faller mjukt framåt (från -90deg till 0deg) */
            animation: charFlipIn 0.8s ease forwards;
            /* Säkerställer att ingen oönskad clipping sker vid 3D-rotationer */
            transform-style: preserve-3d;
            z-index: 1;
        }

        @keyframes charFlipIn {
            0% { transform: rotateX(-90deg); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        /* Klass som triggas via JS precis innan språkbyte */
        .char-span.out {
            /* Out-animation: fälls intensivt bakåt (från 0deg till 90deg) */
            animation: charFlipOut 0.5s ease-in forwards;
        }

        @keyframes charFlipOut {
            0% { transform: rotateX(0deg); opacity: 1; }
            100% { transform: rotateX(90deg); opacity: 0; }
        }

        /* ------------------------------- */

        #greeting.god-natt { color: #666; }
        #greeting.god-natt .wiggle-mark { color: #666; }
        
        /* Födelsedagshälsning - Orange */
        #greeting.birthday { color: #ffaa33; text-shadow: 0 0 20px rgba(255, 170, 51, 0.4); }

        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center;
            animation: intensive-wiggle 3s infinite;
            color: #fff; /* Standardfärg: Vit */
            transition: color 2s ease;
        }
        
        /* Utropstecknet blir orange när det är födelsedag */
        #greeting.birthday .wiggle-mark { color: #ffaa33; }

        @keyframes intensive-wiggle {
            0%, 70% { transform: translate(0,0) rotate(0deg); }
            75% { transform: translate(2px, -2px) rotate(15deg); }
            80% { transform: translate(-2px, -2px) rotate(-15deg); }
            85% { transform: translate(2px, 0) rotate(10deg); }
            90% { transform: translate(-1px, 0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .moon-icon {
            display: inline-block;
            margin-left: 10px;
            color: #666;
        }
        .moon-icon svg {
            width: 0.8em;
            height: 0.8em;
            vertical-align: baseline;
        }

        #date-sub { 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: var(--accent); 
            margin-bottom: 5px;
            text-transform: lowercase; 
        }
        #date-sub::first-letter { text-transform: uppercase; }

        .section-label { 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); 
            margin-bottom: 10px; 
            display: flex;
            align-items: center;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { border-color: var(--accent); }

        .event-date-box {
            min-width: 140px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        
        .ev-day-name { font-size: 1.3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.5rem; font-weight: 900; line-height: 1.1; } 
        .ev-time { font-size: 1.7rem; opacity: 0.8; font-weight: 700; margin-top: 8px; } 
        .event-title { font-size: 2.6rem; font-weight: 400; flex: 1; line-height: 1.2; }

        .weather-row { display: flex; gap: 15px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 25px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-icon-wrapper {
            display: inline-block;
            margin: 10px 0;
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .weather-box i, .weather-box svg { 
            width: 100px !important; 
            height: 100px !important; 
            color: var(--accent); 
            display: block; 
            margin: 0 auto; 
        }

        .weather-box i[data-lucide="sun"], 
        .weather-box svg.lucide-sun {
            color: #ffb703 !important;
        }

        .weather-temp { font-size: 3.8rem; font-weight: 900; margin-top: 5px; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        .media-panel { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 20; }
        
        /* YOUTUBE-VIDEO */
        .video-container { 
            flex: 1; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
        }
        
        .video-container iframe { 
            position: absolute; 
            top: -25%; 
            left: 0; 
            width: 100%; 
            height: 150%; 
            border: none; 
            pointer-events: none;
        }

        .countdown-bar {
            height: 200px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }

        .countdown-wrapper { display: flex; align-items: center; gap: 30px; }
        .vertical-label { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            font-size: 1.2rem;
            font-weight: 900; 
            letter-spacing: 2px; 
            opacity: 0.4;
        }

        #clock { font-size: 4.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        .news-bar {
            background: #0a0a0a;
            padding: 25px 60px;
            border-top: 1px solid var(--border);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #news-text { 
            font-size: 1.5rem; 
            opacity: 0.8; 
            line-height: 1.4; 
            font-weight: 300; 
            transition: opacity 0.5s; 
        }
        
        .particle {
            position: absolute;
            background: #fff;
            pointer-events: none;
            opacity: 0.6;
        }

        /* TILLFÄLLIG TESTKNAPP */
        #test-bday-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: var(--easter);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="weather-overlay"></div>

    <button id="test-bday-btn" onclick="testBirthday()">Testa Födelsedag 🎉</button>

    <div class="info-panel">
        <header>
            <div id="greeting">Laddar...</div>
            <div id="date-sub">Laddar...</div>
        </header>

        <section>
            <div class="section-label">Kalender</div>
            <div id="calendar-list"></div>
        </section>

        <section>
            <div class="section-label">Väder i Staffanstorp</div>
            <div id="weather-list" class="weather-row"></div>
        </section>
    </div>

    <div class="media-panel">
        
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/gCNeDWCI0vo?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=gCNeDWCI0vo" allow="autoplay"></iframe>
        </div>

        <div class="countdown-bar">
            <div class="countdown-wrapper">
                <div class="vertical-label">DAGAR KVAR TILL</div>
                <div style="display: flex; gap: 50px;">
                    <div style="text-align: center;">
                        <div id="count-easter" style="font-size: 5.5rem; font-weight: 900; color: var(--easter);">--</div>
                        <div style="font-size: 1.35rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900; line-height: 1.1;">PÅSK-<br>LOV</div>
                    </div>
                    <div style="text-align: center;">
                        <div id="count-summer" style="font-size: 5.5rem; font-weight: 900; color: var(--summer);">--</div>
                        <div style="font-size: 1.35rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900; line-height: 1.1;">SOMMAR-<br>LOV</div>
                    </div>
                </div>
            </div>
            <div id="clock">00:00</div>
        </div>
        
        <div class="news-bar">
            <div class="section-label" style="margin-bottom: 5px;">
                <span class="live-dot"></span> Senaste Nytt (Al Jazeera)
            </div>
            <div id="news-text">Laddar nyheter...</div>
        </div>
    </div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw'; 
    const CAL_ID = 'rezgarhayder@gmail.com';
    
    let textNewsItems = [];
    let textNewsIndex = 0;

    // FÖDELSEDAGSDATA (Månad-Dag)
    const birthdays = {
        "03-23": "Jakob",
        "04-08": "Rezgar",
        "05-27": "Julia",
        "07-15": "Olivia",
        "07-29": "Jakob",
        "01-02": "Asia"
    };

    // ÖVERSÄTTNINGSMOTOR FÖR HÄLSNINGAR (18 Språk)
    const greetingsTranslations = [
        { m: "God morgon", d: "God dag", e: "God kväll", n: "God natt" }, // Svenska
        { m: "Good morning", d: "Good afternoon", e: "Good evening", n: "Good night" }, // Engelska
        { m: "Guten Morgen", d: "Guten Tag", e: "Guten Abend", n: "Gute Nacht" }, // Tyska
        { m: "Bonjour", d: "Bonjour", e: "Bonsoir", n: "Bonne nuit" }, // Franska
        { m: "Buenos días", d: "Buenas tardes", e: "Buenas noches", n: "Buenas noches" }, // Spanska
        { m: "Buongiorno", d: "Buon pomeriggio", e: "Buonasera", n: "Buonanotte" }, // Italienska
        { m: "Goedemorgen", d: "Goedemiddag", e: "Goedenavond", n: "Goedenacht" }, // Nederländska
        { m: "Godmorgen", d: "Goddag", e: "Godaften", n: "Godnat" }, // Danska
        { m: "God morgen", d: "God dag", e: "God kveld", n: "God natt" }, // Norska
        { m: "Hyvää huomenta", d: "Hyvää päivää", e: "Hyvää iltaa", n: "Hyvää yötä" }, // Finska
        { m: "Dzień dobry", d: "Dzień dobry", e: "Dobry wieczór", n: "Dobranoc" }, // Polska
        { m: "صباح الخير", d: "طاب يومك", e: "مساء الخير", n: "تصبح على خير" }, // Arabiska
        { m: "Günaydın", d: "İyi günler", e: "İyi akşamlar", n: "İyi geceler" }, // Turkiska
        { m: "Καλημέρα", d: "Καλό μεσημέρι", e: "Καλησπέρα", n: "Καληνύχτα" }, // Grekiska
        { m: "Доброе утро", d: "Добрый день", e: "Добрый вечер", n: "Спокойной ночи" }, // Ryska
        { m: "おはようございます", d: "こんにちは", e: "こんばんは", n: "おやすみなさい" }, // Japanska
        { m: "早上好", d: "下午好", e: "晚上好", n: "晚安" }, // Kinesiska
        { m: "صبح بخیر", d: "روز بخیر", e: "عصر بخیر", n: "شب بخیر" } // Persiska
    ];
    let currentLangIndex = 0;

    let lastCelebratedDate = null;
    let forceTestBirthday = false;
    let birthdayInterval = null; 

    function randomColor() {
        var colors = ['#5e92f3', '#44ffff', '#ffaa33', '#ffffff', '#ff6666', '#ff00ff'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function fireworkExplosion() {
        confetti({
            particleCount: randomInRange(100, 150), 
            spread: randomInRange(150, 360), 
            startVelocity: randomInRange(20, 40), 
            ticks: 150, 
            gravity: 0.8, 
            scalar: randomInRange(1, 1.5), 
            origin: {
                x: randomInRange(0.1, 0.9), 
                y: randomInRange(0.2, 0.6)  
            },
            colors: [randomColor(), randomColor()], 
            zIndex: 10001
        });
    }

    function triggerCelebration() {
        if (birthdayInterval) clearInterval(birthdayInterval);

        var duration = 15 * 1000; 
        var animationEnd = Date.now() + duration;

        (function frame() {
            var timeLeft = animationEnd - Date.now();
            var ticks = Math.max(200, 500 * (timeLeft / duration));

            confetti({
                particleCount: 1, 
                startVelocity: 0, 
                ticks: ticks,
                origin: { x: Math.random(), y: -0.1 },
                colors: [randomColor()],
                gravity: randomInRange(0.4, 0.6), 
                scalar: randomInRange(0.8, 1.2), 
                drift: randomInRange(-0.5, 0.5),
                zIndex: 10000 
            });

            if (timeLeft > 0) {
                requestAnimationFrame(frame);
            }
        }());

        birthdayInterval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) {
                return clearInterval(birthdayInterval);
            }
            fireworkExplosion();
        }, 10000); 
    }

    function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    function testBirthday() {
        forceTestBirthday = true;
        triggerCelebration(); 
        update(); 
        
        setTimeout(() => {
            forceTestBirthday = false;
            if (birthdayInterval) clearInterval(birthdayInterval); 
            update();
        }, 15000); 
    }

    // Verktygsfunktion för att dela upp text i enskilda <span>taggar för bokstavsflipp
    function wrapTextInSpans(text) {
        // Splittar texten till en array av bokstäver
        return text.split('').map(char => {
            // Om det är ett blanksteg, lägg till en osynlig blanktecken så layouten inte går sönder
            return `<span class="char-span">${char === ' ' ? '&nbsp;' : char}</span>`;
        }).join('');
    }

    function update() {
        const now = new Date();
        const hour = now.getHours();
        const greetingEl = document.getElementById('greeting');
        
        const todayStrForBday = String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        let isBirthday = false;
        let bdayName = "";

        if (birthdays[todayStrForBday]) {
            isBirthday = true;
            bdayName = birthdays[todayStrForBday];
        }

        if (forceTestBirthday) {
            isBirthday = true;
            bdayName = "Test Christoffer";
        }

        // Vilken fas på dygnet är vi i?
        let phase = (hour >= 6 && hour < 10) ? "m" : (hour >= 10 && hour < 18) ? "d" : (hour >= 18 && hour < 23) ? "e" : "n";

        if (isBirthday) {
            greetingEl.classList.remove('god-natt');
            greetingEl.classList.add('birthday');
            // För födelsedagar kör vi ingen bokstavsflipp just nu, vi behåller animationerna som de är
            greetingEl.innerHTML = `Grattis ${bdayName}<span class="wiggle-mark">!</span>`;
            
            if (lastCelebratedDate !== todayStrForBday && !forceTestBirthday) {
                lastCelebratedDate = todayStrForBday;
                triggerCelebration(); 
            }
        } else {
            // Hämta rätt fras från aktuellt språk och tid på dygnet
            greetingEl.classList.remove('birthday');
            let greetingBase = greetingsTranslations[currentLangIndex][phase];
            
            // Dela upp texten i enskilda <span> för att kunna flippa bokstäverna seriemässigt
            const wrappedText = wrapTextInSpans(greetingBase);
            
            if(phase === "n") {
                greetingEl.classList.add('god-natt');
                // Lägg till bokstäverna OCH månikonen (som inte flippas)
                greetingEl.innerHTML = `${wrappedText}<span class="moon-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>`;
            } else {
                greetingEl.classList.remove('god-natt');
                // Lägg till bokstäverna OCH utropstecknet (som wigglar men inte flippas)
                greetingEl.innerHTML = `${wrappedText}<span class="wiggle-mark">!</span>`;
            }
        }

        // AUTOSKALA TEXTSTORLEKEN
        const textLen = greetingEl.textContent.length;
        if (textLen > 11) {
            const newSize = Math.max(3, 77 / textLen);
            greetingEl.style.fontSize = `${newSize}rem`;
        } else {
            greetingEl.style.fontSize = '7rem';
        }

        document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        const dateStr = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('date-sub').innerText = "Idag är det " + dateStr;
        const easter = new Date('2026-03-30'), summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = (d.items || []).slice(0, 2).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                const dayFull = start.toLocaleDateString('sv-SE', {weekday:'long'}).toUpperCase();
                const timeStr = e.start.dateTime ? start.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG';
                
                return `<div class="event-card ${start.toDateString() === todayStr ? 'today' : ''}">
                    <div class="event-date-box">
                        <div class="ev-day-name">${dayFull}</div>
                        <div class="ev-date-num">${start.getDate()} ${start.toLocaleDateString('sv-SE', {month:'short'})}</div>
                        <div class="ev-time">${timeStr}</div>
                    </div>
                    <div class="event-title">${e.summary}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            const code = d.hourly.weathercode[nowH];
            
            updateWeatherOverlay(code);

            const getIcon = (c) => (c >= 71 ? 'snowflake' : c >= 51 ? 'cloud-rain' : c >= 3 ? 'cloud' : 'sun');
            
            const todayData = d.hourly.temperature_2m.slice(0, 24);
            const todayMax = Math.round(Math.max(...todayData));
            const todayMaxIndex = todayData.indexOf(Math.max(...todayData));
            const todayMaxCode = d.hourly.weathercode[todayMaxIndex];

            const tomorrowData = d.hourly.temperature_2m.slice(24, 48);
            const tomorrowMax = Math.round(Math.max(...tomorrowData));
            const tomorrowMaxIndex = 24 + tomorrowData.indexOf(Math.max(...tomorrowData));
            const tomorrowMaxCode = d.hourly.weathercode[tomorrowMaxIndex];

            document.getElementById('weather-list').innerHTML = `
                <div class="weather-box"><div class="weather-hour">NU</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(code)}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH])}°</div></div>
                <div class="weather-box"><div class="weather-hour">MAX IDAG</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(todayMaxCode)}"></i></div><div class="weather-temp">${todayMax}°</div></div>
                <div class="weather-box"><div class="weather-hour">MAX IMORGON</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(tomorrowMaxCode)}"></i></div><div class="weather-temp">${tomorrowMax}°</div></div>
            `;
            lucide.createIcons();
        } catch(e) {}
    }

    function updateWeatherOverlay(code) {
        const container = document.getElementById('weather-overlay');
        container.innerHTML = '';
        let type = '';
        if (code >= 71) type = 'snow';
        else if (code >= 51) type = 'rain';
        else if (code >= 3) type = 'cloud';
        
        if (!type) return;

        for (let i = 0; i < (type === 'cloud' ? 5 : 50); i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            if (type === 'rain') {
                p.style.width = '2px'; p.style.height = '15px'; p.style.background = 'rgba(100,150,255,0.4)';
            } else if (type === 'snow') {
                p.style.width = '8px'; p.style.height = '8px'; p.style.borderRadius = '50%'; p.style.filter = 'blur(1px)';
            } else {
                p.style.width = '300px'; p.style.height = '200px'; p.style.background = 'rgba(255,255,255,0.03)'; p.style.borderRadius = '50%';
            }
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            
            const duration = 2 + Math.random() * 3;
            p.animate([
                { transform: `translateY(-100px) ${type === 'snow' ? 'translateX(0)' : ''}` },
                { transform: `translateY(110vh) ${type === 'snow' ? 'translateX(50px)' : ''}` }
            ], { duration: duration * 1000, iterations: Infinity, delay: -Math.random() * 5000 });
            container.appendChild(p);
        }
    }

    async function fetchAlJazeeraTextNews() {
        try {
            let xmlText = "";
            let usingGoogleFallback = false;

            try {
                const url = 'https://www.aljazeera.com/xml/rss/all.xml';
                const res = await fetch(`https://api.allorigins.win&url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if (data.contents && data.contents.includes("<rss")) {
                    xmlText = data.contents;
                } else {
                    throw new Error("Blockerad av Cloudflare");
                }
            } catch (e) {
                usingGoogleFallback = true;
                const fallbackUrl = 'https://news.google.com/rss/search?q=site:aljazeera.com+when:1d&hl=en-US&gl=US&ceid=US:en';
                const res = await fetch(`https://api.allorigins.win&url=${encodeURIComponent(fallbackUrl)}`);
                const data = await res.json();
                xmlText = data.contents;
            }

            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            
            let parsedText = [];
            
            items.forEach(item => {
                let title = item.querySelector("title")?.textContent;
                if (!title) return;
                
                if (usingGoogleFallback) {
                    title = title.replace(/ - Al Jazeera.*/, "");
                }

                parsedText.push(title);
            });

            if (parsedText.length > 0) {
                textNewsItems = parsedText.slice(0, 15);
                const textEl = document.getElementById('news-text');
                if (textEl.innerText.includes("Laddar")) rotateTextNews();
            }
        } catch(e) { 
            console.error("Nyhetsfel (text):", e);
        }
    }

    function rotateTextNews() {
        if (textNewsItems.length === 0) return;
        const el = document.getElementById('news-text');
        el.style.opacity = 0;
        setTimeout(() => {
            el.innerText = textNewsItems[textNewsIndex];
            el.style.opacity = 0.8;
            textNewsIndex = (textNewsIndex + 1) % textNewsItems.length;
        }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); 
        updateCalendar(); 
        updateWeather(); 
        fetchAlJazeeraTextNews();

        setInterval(update, 1000); 
        setInterval(updateCalendar, 600000); 
        setInterval(updateWeather, 1800000); 
        
        setInterval(rotateTextNews, 30000);
        setInterval(fetchAlJazeeraTextNews, 3600000); 
        
        // Rotera språket var 10:e sekund med den nya häftiga seriemässiga bokstavsflippen
        setInterval(() => {
            const todayStrForBday = String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(new Date().getDate()).padStart(2, '0');
            // Kör inte flipp-effekten om det pågår ett födelsedagsfirande
            if (birthdays[todayStrForBday] || forceTestBirthday) return; 

            const greetingEl = document.getElementById('greeting');
            // Hämta alla enskilda bokstavs-spans
            const spans = greetingEl.querySelectorAll('.char-span');

            // 1. Trigga seriemässig out-animation
            // Vi ger varje bokstav en ökande fördröjning
            spans.forEach((span, index) => {
                // Skapa en liten seriemässig fördröjning (60ms per bokstav)
                span.style.animationDelay = `${index * 60}ms`;
                // Lägg till klassen som triggar 'charFlipOut' i CSS
                span.classList.add('out'); 
            });

            // 2. Räkna ut när sista bokstaven har fällts bort och är osynlig
            const delayPerLetter = 60; // Samma som ovan
            const animationDuration = 500; // Från CSS 'out' animation
            // Beräkna total tid = (antal bokstäver * fördröjning) + animationstid
            // Vi lägger till en liten marginal (0.8) för att byta precis innan den är helt osynlig
            const totalFlipOutTime = (spans.length * delayPerLetter) + (animationDuration * 0.8);

            // 3. När sista bokstaven är borta: byt språk och uppdatera texten (vilket triggar 'charFlipIn')
            setTimeout(() => {
                currentLangIndex = (currentLangIndex + 1) % greetingsTranslations.length;
                update(); 
                // update() kommer att rita upp nya bokstavs-spans, och eftersom de inte har 'out'-klassen
                // kommer de automatiskt köra 'charFlipIn' när de läggs till i DOMen.
            }, totalFlipOutTime);
            
        }, 10000);
    });
</script>
