<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Command v67 - Wind Intelligence</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel='stylesheet' type='text/css' href='https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/maps.css'>
    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/maps-web.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 10, 10, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #5e92f3;
            --sky-blue: #87CEEB;
            --deep-sky: #00BFFF;
            --text-main: #ffffff;
            --easter-gold: #ffaa33;
            --summer-cyan: #44ffff;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', sans-serif; background-color: #000; margin: 0;
            height: 100vh; width: 100vw; color: var(--text-main);
            display: grid; grid-template-columns: 520px 1fr;
            grid-template-rows: 15vh minmax(0, 1fr) 12vh;
            gap: 15px; padding: 15px; overflow: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--glass-border); border-radius: 30px;
            position: relative; overflow: hidden; z-index: 10;
        }

        /* HEADER */
        .top-bar { grid-column: 1/3; display: grid; grid-template-columns: 650px 1fr 180px; align-items: center; padding: 0 40px; }
        #greeting {
            font-size: 4.8rem; font-weight: 200; letter-spacing: -2px; line-height: 0.95;
            background: linear-gradient(to right, var(--sky-blue), var(--deep-sky)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #sub-greeting { font-size: 1.3rem; font-weight: 400; opacity: 0.9; margin-top: 8px; color: var(--accent); }

        #header-hourly { 
            display: flex; justify-content: space-evenly; align-items: center; 
            border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); 
            height: 80%; margin: 0 30px; 
        }

        .weather-node div:first-child { font-size: 1.05rem !important; opacity: 0.8 !important; font-weight: 800 !important; margin-bottom: 2px; }
        .weather-node i { width: 44px !important; height: 44px !important; margin: 5px 0; }
        .weather-node div:last-child { font-size: 1.6rem !important; font-weight: 900; }

        /* SIDEBAR */
        .sidebar-container { grid-column: 1/2; grid-row: 2/3; display: grid; grid-template-rows: 1fr 240px 185px; gap: 15px; min-height: 0; }
        #custom-calendar-list { font-size: 1.2em; }
        .event-item { display: flex; align-items: center; gap: 25px; padding: 22px 25px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .event-item.is-today { background: rgba(94, 146, 243, 0.15); border-color: var(--accent); }

        /* WIND MODULE (Replacing Traffic) */
        .wind-box { padding: 20px; height: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: center; }
        .compass-container { position: relative; width: 140px; height: 140px; border: 2px solid var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .compass-label { position: absolute; font-size: 0.6rem; font-weight: 900; opacity: 0.5; }
        .label-n { top: 5px; } .label-e { right: 5px; } .label-s { bottom: 5px; } .label-w { left: 5px; }
        #wind-arrow { font-size: 2.5rem; color: var(--accent); transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .wind-info { display: flex; flex-direction: column; gap: 8px; }
        .wind-stat { font-size: 0.75rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .wind-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .beaufort-tag { background: var(--glass-border); padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; display: inline-block; }

        /* LUNCH BOX */
        .lunch-box { padding: 20px 25px; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
        .lunch-header { font-size: 0.75rem; font-weight: 900; color: var(--summer-cyan); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .lunch-title { font-size: 1.1rem; font-weight: 700; color: #fff; line-height: 1.3; }
        .lunch-alt { font-size: 0.9rem; font-weight: 400; line-height: 1.3; font-style: italic; opacity: 0.8; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        /* FOOTER */
        .lov-container { display: flex; align-items: center; gap: 20px; height: 100%; }
        .lov-box { display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 130px; }
        .lov-title { font-size: 1.1rem; font-weight: 900; margin-bottom: -5px; letter-spacing: 1px; }
        .lov-days { font-size: 4rem; font-weight: 900; line-height: 1; }
        .vertical-text-main { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 1.1rem; font-weight: 900; opacity: 0.7; border-right: 1px solid rgba(255,255,255,0.2); padding-right: 15px; height: 80%; display: flex; align-items: center; color: var(--accent); letter-spacing: 2px; }
        .footer-clock-box { display: flex; align-items: center; justify-content: center; min-width: 180px; }
        #footer-time { font-size: 3rem; font-weight: 900; line-height: 1; letter-spacing: -1px; opacity: 0.85; }

        .main-content { position: relative; background: #000; }
        .video-background { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;}
        .video-background iframe { width: 100%; height: 100%; transform: scale(1.35); }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<header class="top-bar glass-panel">
    <div id="greet-container">
        <div id="greeting">God dag!</div>
        <div id="sub-greeting">Laddar...</div>
    </div>
    <div id="header-hourly"></div>
    <div style="text-align: right;">
        <div style="font-size: 0.75rem; opacity: 0.5; font-weight: 900;">IMORGON</div>
        <div id="tom-temp" style="font-weight: 900; font-size: 3.5rem; line-height: 1;">--°</div>
    </div>
</header>

<div class="sidebar-container">
    <section class="glass-panel" style="padding: 25px;">
        <div id="custom-calendar-list"></div>
    </section>
    
    <section class="glass-panel">
        <div class="wind-box">
            <div class="compass-container">
                <span class="compass-label label-n">N</span>
                <span class="compass-label label-e">O</span>
                <span class="compass-label label-s">S</span>
                <span class="compass-label label-w">V</span>
                <div id="wind-arrow"><i data-lucide="navigation-2"></i></div>
            </div>
            <div class="wind-info">
                <div>
                    <div class="wind-stat">Byvind</div>
                    <div id="wind-gust" class="wind-val">--</div>
                </div>
                <div>
                    <div id="beaufort-name" class="wind-stat" style="color: var(--summer-cyan)">Laddar...</div>
                    <div id="beaufort-num" class="beaufort-tag">Beaufort 0</div>
                </div>
            </div>
        </div>
    </section>

    <section class="glass-panel lunch-box">
        <div class="lunch-header"><i data-lucide="utensils"></i> <span id="lunch-day-label">Lunch</span></div>
        <div style="display: flex; align-items: flex-start; gap: 12px;">
            <i id="lunch-icon-main" data-lucide="chef-hat" style="width:20px; color:var(--summer-cyan); margin-top:2px;"></i>
            <div id="lunch-main" class="lunch-title">Laddar...</div>
        </div>
        <div id="lunch-veg" class="lunch-alt">Laddar...</div>
    </section>
</div>

<main class="main-content glass-panel">
    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/P9yjjfKXa6Q?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=P9yjjfKXa6Q" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
</main>

<div style="grid-column: 1/2; grid-row: 3/4;">
    <footer class="glass-panel" style="height: 100%; display: flex; align-items: center; padding: 0 30px;">
        <div id="news-text" style="font-weight: 600; text-transform: uppercase; font-size: 1.1rem;">Hämtar nyheter...</div>
    </footer>
</div>

<div style="grid-column: 2/3; grid-row: 3/4; display: flex; gap: 15px;">
    <div class="glass-panel" style="display: flex; padding: 0 25px; flex: 1; align-items: center;">
        <div class="lov-container">
            <div class="vertical-text-main">DAGAR KVAR</div>
            <div class="lov-box">
                <div class="lov-title" style="color: var(--easter-gold);">PÅSKLOV</div>
                <div id="count-easter" class="lov-days">--</div>
            </div>
            <div class="lov-box">
                <div class="lov-title" style="color: var(--summer-cyan);">SOMMARLOV</div>
                <div id="count-summer" class="lov-days">--</div>
            </div>
        </div>
        <div id="history-fact" style="font-size: 1.1rem; flex: 1; display: flex; align-items: center; padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.1); margin-left: 20px;">Hämtar historik...</div>
    </div>
    <div class="glass-panel footer-clock-box"><div id="footer-time">00:00</div></div>
</div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';
    let weatherMode = 'clear';

    function updateTime() {
        const now = new Date();
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('sub-greeting').innerText = `Idag är det ${now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}`;
        document.getElementById('count-easter').innerText = Math.ceil((new Date('2026-03-30') - now) / 86400000);
        document.getElementById('count-summer').innerText = Math.ceil((new Date('2026-06-12') - now) / 86400000);
    }

    async function updateWind() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&timezone=auto');
            const d = await res.json();
            const cur = d.current;
            
            // Uppdatera kompass (pilen pekar dit vinden blåser)
            document.getElementById('wind-arrow').style.transform = `rotate(${cur.wind_direction_10m}deg)`;
            
            // Uppdatera Byvind
            document.getElementById('wind-gust').innerText = Math.round(cur.wind_gusts_10m) + ' m/s';

            // Beaufort-logik
            const speed = cur.wind_speed_10m / 3.6; // Konvertera km/h till m/s om det behövs, Open-Meteo ger ofta m/s direkt beroende på inställning. Här antas m/s.
            let bft = 0;
            let name = "Lugnt";
            if (speed >= 0.3) { bft = 1; name = "Svag vind"; }
            if (speed >= 1.6) { bft = 2; name = "Lätt bris"; }
            if (speed >= 3.4) { bft = 3; name = "God bris"; }
            if (speed >= 5.5) { bft = 4; name = "Frisk bris"; }
            if (speed >= 8.0) { bft = 5; name = "Styv bris"; }
            if (speed >= 10.8) { bft = 6; name = "Hård bris"; }
            if (speed >= 13.9) { bft = 7; name = "Styv kuling"; }
            if (speed >= 17.2) { bft = 8; name = "Hård kuling"; }
            
            document.getElementById('beaufort-num').innerText = `Beaufort ${bft}`;
            document.getElementById('beaufort-name').innerText = name;
        } catch(e) {}
    }

    function updateLunch() {
        const now = new Date();
        const hrs = now.getHours();
        let checkDate = new Date();
        if (hrs >= 14) checkDate.setDate(now.getDate() + 1);

        let found = false;
        let attempts = 0;
        while (!found && attempts < 10) {
            const day = checkDate.getDay();
            const dateStr = checkDate.toISOString().split('T')[0];
            if (day !== 0 && day !== 6 && dateStr !== '2026-03-03') { found = true; } 
            else { checkDate.setDate(checkDate.getDate() + 1); attempts++; }
        }

        const dateStr = checkDate.toISOString().split('T')[0];
        const isToday = dateStr === now.toISOString().split('T')[0];
        document.getElementById('lunch-day-label').innerText = isToday ? "Lunch Idag" : `Lunch ${checkDate.toLocaleDateString('sv-SE', { weekday: 'long' })}`;

        let main = "Meny ej tillgänglig"; let veg = "Vegetariskt alternativ"; let icon = "chef-hat";
        if (dateStr === '2026-03-02') {
            main = "Krämig korvstroganoff gjord på svensk falukorv, serveras med ris";
            veg = "Vegetarisk stroganoff baserad på halloumi, serveras med ris"; icon = "beef";
        } else if (dateStr === '2026-03-04') {
            main = "Sprödbakad fiskfilé serveras med kokt potatis och klassisk kall dillsås";
            veg = "Sprödbakad vegetarisk schnitzel med kokt potatis och dillsås"; icon = "fish";
        } else if (checkDate.getDay() === 4) {
            main = "Klassisk ärtsoppa med fläsk, pannkakor med sylt och grädde";
            veg = "Ekologisk linssoppa, pannkakor med sylt och grädde"; icon = "soup";
        }
        document.getElementById('lunch-main').innerText = main;
        document.getElementById('lunch-veg').innerText = veg;
        document.getElementById('lunch-icon-main').setAttribute('data-lucide', icon);
        lucide.createIcons();
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&daily=temperature_2m_max&timezone=auto');
            const d = await res.json();
            const nowHour = new Date().getHours();
            weatherMode = (d.hourly.weathercode[nowHour] >= 71) ? 'snow' : (d.hourly.weathercode[nowHour] >= 51 ? 'rain' : 'clear');
            initFX(); 
            document.getElementById('tom-temp').innerText = Math.round(d.daily.temperature_2m_max[1]) + '°';
            let hHtml = '';
            for(let i=1; i<=6; i++) {
                const idx = nowHour + i;
                const icon = d.hourly.weathercode[idx] <= 2 ? (d.hourly.weathercode[idx] === 0 ? 'sun' : 'cloud-sun') : (d.hourly.weathercode[idx] === 3 ? 'cloud' : 'cloud-rain');
                hHtml += `<div class="weather-node" style="text-align:center"><div>${new Date(d.hourly.time[idx]).getHours()}:00</div><i data-lucide="${icon}"></i><div>${Math.round(d.hourly.temperature_2m[idx])}°</div></div>`;
            }
            document.getElementById('header-hourly').innerHTML = hHtml; lucide.createIcons();
        } catch(e) {}
    }

    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height - canvas.height; this.speed = Math.random() * 3 + 2; } update() { this.y += (weatherMode === 'rain' ? 15 : 2); if (this.y > canvas.height) this.reset(); } draw() { ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(this.x, this.y, (weatherMode==='rain'?1:3), 0, Math.PI*2); ctx.fill(); } }
    function initFX() { particles = []; if (weatherMode !== 'clear') for(let i=0; i<80; i++) particles.push(new Particle()); }
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            if (d.items) {
                document.getElementById('custom-calendar-list').innerHTML = d.items.slice(0, 4).map(event => {
                    const start = new Date(event.start.dateTime || event.start.date);
                    const isToday = start.toDateString() === new Date().toDateString();
                    return `<div class="event-item ${isToday ? 'is-today' : ''}"><div style="min-width: 100px; text-align:center; border-right: 1px solid rgba(255,255,255,0.1); padding-right:15px;"><div style="font-size:0.75rem;color:var(--accent);font-weight:900">${isToday ? 'IDAG' : start.toLocaleDateString('sv-SE', { weekday: 'short' }).toUpperCase() + ' ' + start.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' })}</div><div style="font-size:1.6rem;font-weight:900">${event.start.dateTime ? start.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) : 'HELDAG'}</div></div><div style="font-size:1.3rem;font-weight:300;padding-left:10px">${event.summary}</div></div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function updateNews() {
        try {
            const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.svt.se/nyheter/rss.xml').then(res=>res.json());
            let items = r.items.map(i => i.title), idx = 0;
            setInterval(() => { document.getElementById('news-text').innerText = items[idx]; idx = (idx + 1) % items.length; }, 10000);
        } catch(e) {}
    }

    async function updateHistory() {
        try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
            const e = r.events[Math.floor(Math.random()*r.events.length)];
            document.getElementById('history-fact').innerHTML = `<b style="color:var(--accent)">${e.year}:</b> ${e.text}`;
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateTime(); updateWeather(); updateCalendar(); updateNews(); updateHistory(); updateLunch(); updateWind(); animate();
        setInterval(updateTime, 1000); setInterval(updateWeather, 1800000); setInterval(updateCalendar, 600000); setInterval(updateLunch, 3600000); setInterval(updateWind, 300000);
        lucide.createIcons();
    });
</script>
</body>
</html>
