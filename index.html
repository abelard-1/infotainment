<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v98</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        .info-panel {
            flex: 0 0 42%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            gap: 45px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
        }

        #greeting { 
            font-size: 7rem; 
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -4px; 
            margin-bottom: 5px; 
            white-space: nowrap; 
            display: block;
            text-transform: lowercase; 
        }
        #greeting::first-letter { text-transform: uppercase; }

        /* ROBUST WIGGLE ANIMATION */
        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center;
            animation: fast-wiggle 3s infinite ease-in-out;
        }
        @keyframes fast-wiggle {
            0%, 70% { transform: rotate(0deg); }
            75% { transform: rotate(15deg); }
            80% { transform: rotate(-15deg); }
            85% { transform: rotate(10deg); }
            90% { transform: rotate(-5deg); }
            95%, 100% { transform: rotate(0deg); }
        }

        #date-sub { 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: var(--accent); 
            margin-bottom: 20px; 
            text-transform: lowercase; 
            white-space: nowrap;
        }
        #date-sub::first-letter { text-transform: uppercase; }

        .section-label { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }

        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 35px;
            padding: 35px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { 
            border-color: var(--accent); 
            box-shadow: 0 0 40px rgba(94,146,243,0.15);
            animation: pulse-border 3s infinite;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: var(--accent); }
            50% { border-color: rgba(94,146,243,0.4); }
        }

        .event-date-box {
            min-width: 140px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        .ev-day-name { font-size: 1.1rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.8rem; font-weight: 900; line-height: 1.1; }
        .ev-time { font-size: 1.4rem; opacity: 0.7; font-weight: 700; margin-top: 5px; }
        .event-title { font-size: 2.5rem; font-weight: 400; flex: 1; line-height: 1.2; }

        /* ROBUST SVÄVANDE VÄDERIKONER */
        .weather-row { display: flex; gap: 20px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 30px; 
            border-radius: 30px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-icon-wrapper {
            display: inline-block;
            margin: 15px 0;
            animation: constant-float 5s infinite ease-in-out;
        }
        .weather-box i { 
            width: 60px; 
            height: 60px; 
            color: var(--accent); 
            display: block;
        }
        @keyframes constant-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(4deg); }
        }
        .weather-temp { font-size: 3.2rem; font-weight: 900; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        .media-panel { flex: 1; display: flex; flex-direction: column; }
        .video-container { flex: 1; background: #000; position: relative; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .countdown-bar {
            height: 220px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }
        .countdown-wrapper { display: flex; align-items: center; gap: 30px; }
        .vertical-label { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            font-size: 0.9rem; 
            font-weight: 900; 
            letter-spacing: 2px; 
            opacity: 0.4;
            color: #fff;
        }
        .count-item { text-align: center; }
        .count-num { font-size: 6.5rem; font-weight: 900; line-height: 1; }
        .count-lab { font-size: 1.3rem; font-weight: 900; letter-spacing: 5px; opacity: 0.4; margin-top: 10px; }
        #clock { font-size: 5.25rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -3px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <header>
            <div id="greeting">Laddar...</div>
            <div id="date-sub">Laddar...</div>
        </header>

        <section>
            <div class="section-label">Kommande i kalendern</div>
            <div id="calendar-list"></div>
        </section>

        <section>
            <div class="section-label">Väder i Staffanstorp</div>
            <div id="weather-list" class="weather-row"></div>
        </section>
        
        <div style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 30px;">
            <div class="section-label">Dagens historiska fakta</div>
            <div id="history-fact" style="font-size: 1.6rem; opacity: 0.8; line-height: 1.5; font-weight: 300;">...</div>
        </div>
    </div>

    <div class="media-panel">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/CZaqKhVLJxA?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=CZaqKhVLJxA" allow="autoplay"></iframe>
        </div>

        <div class="countdown-bar">
            <div class="countdown-wrapper">
                <div class="vertical-label">DAGAR KVAR TILL:</div>
                <div style="display: flex; gap: 60px;">
                    <div class="count-item">
                        <div id="count-easter" class="count-num" style="color: var(--easter);">--</div>
                        <div class="count-lab">PÅSKLOV</div>
                    </div>
                    <div class="count-item">
                        <div id="count-summer" class="count-num" style="color: var(--summer);">--</div>
                        <div class="count-lab">SOMMARLOV</div>
                    </div>
                </div>
            </div>
            <div class="count-item">
                <div id="clock">00:00</div>
            </div>
        </div>
    </div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw'; 
    const CAL_ID = 'rezgarhayder@gmail.com';

    function update() {
        const now = new Date();
        const hour = now.getHours();
        let greetingBase = (hour >= 6 && hour < 10) ? "God morgon" : (hour >= 10 && hour < 18) ? "God dag" : (hour >= 18 && hour < 23) ? "God kväll" : "God natt";
        
        // Uppdaterar hälsning med wiggle-klass
        document.getElementById('greeting').innerHTML = `${greetingBase}<span class="wiggle-mark">!</span>`;
        
        document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        const dateStr = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('date-sub').innerText = "Idag är det " + dateStr;
        const easter = new Date('2026-03-30'), summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = (d.items || []).slice(0, 2).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                return `<div class="event-card ${start.toDateString() === todayStr ? 'today' : ''}">
                    <div class="event-date-box">
                        <div class="ev-day-name">${start.toDateString() === todayStr ? 'IDAG' : start.toLocaleDateString('sv-SE', {weekday:'short'})}</div>
                        <div class="ev-date-num">${start.toLocaleDateString('sv-SE', {day:'numeric', month:'short'})}</div>
                        <div class="ev-time">${e.start.dateTime ? start.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG'}</div>
                    </div>
                    <div class="event-title">${e.summary}</div>
                </div>`;
            }).join('');
        } catch(e) { console.error("Kalenderfel:", e); }
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            const tomorrowData = d.hourly.temperature_2m.slice(24, 48);
            const tomorrowMax = Math.round(Math.max(...tomorrowData));
            const getIcon = (c) => (c >= 71 ? 'snowflake' : c >= 51 ? 'cloud-rain' : c >= 3 ? 'cloud' : 'sun');

            let html = `
                <div class="weather-box"><div class="weather-hour">${nowH}:00</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[nowH])}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH])}°</div></div>
                <div class="weather-box"><div class="weather-hour">${(nowH+3)%24}:00</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[nowH+3])}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH+3])}°</div></div>
                <div class="weather-box"><div class="weather-hour">IMORGON (MAX)</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[36])}"></i></div><div class="weather-temp">${tomorrowMax}°</div></div>
            `;
            document.getElementById('weather-list').innerHTML = html;
            lucide.createIcons();
        } catch(e) {}
    }

    async function updateHistory() {
        try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
            const e = r.events[Math.floor(Math.random()*r.events.length)];
            document.getElementById('history-fact').innerHTML = `<b style="color:var(--accent)">År ${e.year}:</b> ${e.text}`;
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); updateCalendar(); updateWeather(); updateHistory();
        setInterval(update, 1000); 
        setInterval(updateCalendar, 600000); 
        setInterval(updateWeather, 1800000); 
        setInterval(updateHistory, 3600000);
    });
</script>
</body>
</html>
