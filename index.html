<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Command v58 - Traffic & Heritage</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 10, 10, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #5e92f3;
            --sky-blue: #87CEEB;
            --deep-sky: #00BFFF;
            --text-main: #ffffff;
            --easter-gold: #ffaa33;
            --summer-cyan: #44ffff;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', sans-serif; background-color: #000; margin: 0;
            height: 100vh; width: 100vw; color: var(--text-main);
            display: grid; grid-template-columns: 520px 1fr;
            grid-template-rows: 15vh minmax(0, 1fr) 12vh;
            gap: 15px; padding: 15px; overflow: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--glass-border); border-radius: 30px;
            position: relative; overflow: hidden; z-index: 10;
        }

        /* HEADER */
        .top-bar { grid-column: 1/3; display: grid; grid-template-columns: 650px 1fr 180px; align-items: center; padding: 0 40px; }
        #greeting {
            font-size: 4.8rem; font-weight: 200; letter-spacing: -2px; line-height: 0.95;
            background: linear-gradient(to right, var(--sky-blue), var(--deep-sky)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #sub-greeting { font-size: 1.3rem; font-weight: 400; opacity: 0.9; margin-top: 8px; color: var(--accent); }

        #header-hourly { 
            display: flex; justify-content: space-evenly; align-items: center; 
            border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); 
            height: 80%; margin: 0 30px; 
        }

        .weather-node i { width: 48px !important; height: 48px !important; margin: 10px 0; }
        .weather-node div:last-child { font-size: 1.6rem !important; font-weight: 900; }

        /* SIDEBAR & TRAFFIC */
        .sidebar-container { grid-column: 1/2; grid-row: 2/3; display: grid; grid-template-rows: 1fr 340px; gap: 15px; min-height: 0; }
        .event-item { display: flex; align-items: center; gap: 20px; padding: 18px 25px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; }
        .event-item.is-today { background: rgba(94, 146, 243, 0.15); border-color: var(--accent); }

        .traffic-box { position: relative; width: 100%; height: 100%; border-radius: 20px; overflow: hidden; display: grid; grid-template-rows: 1fr 80px; }
        .traffic-map { width: 100%; height: 100%; filter: invert(90%) hue-rotate(180deg) contrast(1.2) brightness(0.8); pointer-events: none; }
        .traffic-info { background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-top: 1px solid var(--glass-border); }
        .traffic-label { font-size: 0.7rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .traffic-val { font-size: 1.8rem; font-weight: 900; }

        /* FOOTER LOV-SECTION */
        .lov-container { display: flex; align-items: center; gap: 15px; height: 100%; }
        .lov-box { display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 120px; }
        .lov-title { font-size: 1rem; font-weight: 900; margin-bottom: -5px; letter-spacing: 1px; }
        .lov-days { font-size: 3.8rem; font-weight: 900; line-height: 1; }
        .vertical-text { 
            writing-mode: vertical-rl; transform: rotate(180deg); 
            font-size: 0.8rem; font-weight: 900; opacity: 0.5; 
            border-left: 1px solid rgba(255,255,255,0.2); padding-left: 10px;
            height: 70%; display: flex; align-items: center;
        }

        /* CLOCK & NEWS */
        .footer-clock-box { display: flex; align-items: center; justify-content: flex-end; padding-right: 40px; min-width: 220px; }
        #footer-time { font-size: 5.5rem; font-weight: 900; line-height: 1; letter-spacing: -3px; }
        .news-wrapper { display: flex; align-items: center; gap: 20px; width: 100%; }
        .news-tag { background: var(--accent); color: #000; padding: 6px 15px; border-radius: 10px; font-weight: 900; font-size: 0.9rem; }

        .main-content { position: relative; background: #000; }
        .video-background { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .video-background iframe { width: 100%; height: 100%; transform: scale(1.15); }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<header class="top-bar glass-panel">
    <div id="greet-container">
        <div id="greeting">God dag!</div>
        <div id="sub-greeting">Laddar...</div>
    </div>
    <div id="header-hourly"></div>
    <div style="text-align: right;">
        <div style="font-size: 0.75rem; opacity: 0.5; font-weight: 900;">IMORGON</div>
        <div id="tom-temp" style="font-weight: 900; font-size: 3.5rem; line-height: 1;">--°</div>
    </div>
</header>

<div class="sidebar-container">
    <section class="glass-panel" style="padding: 25px;">
        <div id="custom-calendar-list"></div>
    </section>
    
    <section class="glass-panel" style="padding: 10px;">
        <div class="traffic-box">
            <iframe class="traffic-map" src="https://www.openstreetmap.org/export/embed.html?bbox=13.0645%2C55.6200%2C13.3555%2C55.6750&layer=mapnik" frameborder="0"></iframe>
            <div class="traffic-info">
                <div>
                    <div class="traffic-label">Till Vinstorpsvägen 6</div>
                    <div id="traffic-time" class="traffic-val">12 min</div>
                </div>
                <div style="text-align: right;">
                    <div class="traffic-label">Status</div>
                    <div id="traffic-status" style="color: var(--summer-cyan); font-weight: 900;">Normalt flöde</div>
                </div>
            </div>
        </div>
    </section>
</div>

<main class="main-content glass-panel">
    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/03pYP2Nmreo?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=03pYP2Nmreo" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
</main>

<div style="grid-column: 1/2; grid-row: 3/4;">
    <footer class="glass-panel" style="height: 100%; display: flex; align-items: center; padding: 0 30px;">
        <div class="news-wrapper">
            <div class="news-tag">NYHETER</div>
            <div id="news-text" style="font-weight: 600; text-transform: uppercase; font-size: 1.1rem;">Hämtar nyheter...</div>
        </div>
    </footer>
</div>

<div style="grid-column: 2/3; grid-row: 3/4; display: flex; gap: 15px;">
    <div class="glass-panel" style="display: flex; padding: 0 25px; flex: 1; align-items: center;">
        <div class="lov-container">
            <div class="lov-box">
                <div class="lov-title" style="color: var(--easter-gold);">PÅSKLOV</div>
                <div id="count-easter" class="lov-days">--</div>
            </div>
            <div class="vertical-text">DAGAR KVAR</div>
            <div style="width: 30px;"></div>
            <div class="lov-box">
                <div class="lov-title" style="color: var(--summer-cyan);">SOMMARLOV</div>
                <div id="count-summer" class="lov-days">--</div>
            </div>
            <div class="vertical-text">DAGAR KVAR</div>
        </div>
        <div id="history-fact" style="font-size: 1.1rem; flex: 1; display: flex; align-items: center; padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.1); margin-left: 20px;">Hämtar historik...</div>
    </div>
    
    <div class="glass-panel footer-clock-box">
        <div id="footer-time">00:00</div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';
    let weatherMode = 'clear';
    let isBirthday = false;

    // Födelsedagslista (Jan=0, Feb=1...)
    const birthdays = [{ name: "Test", month: 1, day: 26 }]; 

    function updateTime() {
        const now = new Date();
        const hrs = now.getHours();
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        
        const bday = birthdays.find(b => b.month === now.getMonth() && b.day === now.getDate());
        let greet = "God dag!";
        if (hrs >= 5 && hrs < 10) greet = "God morgon!";
        else if (hrs >= 18 && hrs < 23) greet = "God kväll!";
        else if (hrs >= 23 || hrs < 5) greet = "God natt!";
        
        if (bday) { greet = "Stort grattis!"; if (!isBirthday) { isBirthday = true; initFX(); } }
        document.getElementById('greeting').innerText = greet;
        
        document.getElementById('sub-greeting').innerText = `Idag är det ${now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}`;

        document.getElementById('count-easter').innerText = Math.ceil((new Date('2026-03-30') - now) / 86400000);
        document.getElementById('count-summer').innerText = Math.ceil((new Date('2026-06-12') - now) / 86400000);
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&daily=temperature_2m_max&timezone=auto');
            const d = await res.json();
            const nowHour = new Date().getHours();
            weatherMode = (d.hourly.weathercode[nowHour] >= 71) ? 'snow' : (d.hourly.weathercode[nowHour] >= 51 ? 'rain' : 'clear');
            initFX(); 

            document.getElementById('tom-temp').innerText = Math.round(d.daily.temperature_2m_max[1]) + '°';
            let hHtml = '';
            for(let i=1; i<=6; i++) {
                const idx = nowHour + i;
                const icon = d.hourly.weathercode[idx] <= 2 ? (d.hourly.weathercode[idx] === 0 ? 'sun' : 'cloud-sun') : (d.hourly.weathercode[idx] === 3 ? 'cloud' : 'cloud-rain');
                hHtml += `<div class="weather-node" style="text-align:center"><div style="font-size:0.8rem; opacity:0.6; font-weight:700">${new Date(d.hourly.time[idx]).getHours()}:00</div><i data-lucide="${icon}"></i><div>${Math.round(d.hourly.temperature_2m[idx])}°</div></div>`;
            }
            document.getElementById('header-hourly').innerHTML = hHtml; lucide.createIcons();
        } catch(e) {}
    }

    // TRAFFIC LOGIC (Simulerad realtidsdata baserad på rusningstid)
    function updateTraffic() {
        const now = new Date();
        const hrs = now.getHours();
        const day = now.getDay();
        let baseTime = 11;
        let status = "Normalt flöde";
        let color = "var(--summer-cyan)";

        if (day >= 1 && day <= 5) {
            if ((hrs >= 7 && hrs <= 9) || (hrs >= 15 && hrs <= 17)) {
                baseTime = 16;
                status = "Tung trafik / Kö";
                color = "var(--danger)";
            }
        }
        document.getElementById('traffic-time').innerText = baseTime + " min";
        document.getElementById('traffic-status').innerText = status;
        document.getElementById('traffic-status').style.color = color;
    }

    // PARTICLE FX (Bevarad konfetti & väder)
    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor(type) { this.type = type; this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height;
            this.w = Math.random() * 12 + 6; this.h = Math.random() * 12 + 6;
            this.speed = Math.random() * 3 + 2;
            this.color = this.type === 'confetti' ? `hsl(${Math.random()*360}, 100%, 50%)` : 'white';
            this.rot = Math.random() * 360; this.rSpeed = Math.random() * 10 - 5;
        }
        update() { this.y += (this.type === 'confetti') ? this.speed : (weatherMode === 'rain' ? 15 : 2); this.rot += this.rSpeed; if (this.y > canvas.height) this.reset(); }
        draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot * Math.PI / 180); ctx.fillStyle = this.color; if (this.type === 'confetti') ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h); else { ctx.beginPath(); ctx.arc(0,0, (weatherMode==='rain'?1:3), 0, Math.PI*2); ctx.fill(); } ctx.restore(); }
    }

    function initFX() {
        particles = [];
        if (isBirthday) for(let i=0; i<120; i++) particles.push(new Particle('confetti'));
        if (weatherMode !== 'clear') for(let i=0; i<80; i++) particles.push(new Particle('weather'));
    }

    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }

    // APIs
    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            if (d.items) {
                document.getElementById('custom-calendar-list').innerHTML = d.items.slice(0, 4).map(event => {
                    const start = new Date(event.start.dateTime || event.start.date);
                    const isToday = start.toDateString() === new Date().toDateString();
                    return `<div class="event-item ${isToday ? 'is-today' : ''}"><div style="min-width: 80px;"><div style="font-size:0.7rem;color:var(--accent)">${isToday ? 'IDAG' : start.toLocaleDateString('sv-SE',{day:'numeric', month:'short'})}</div><div style="font-size:1.5rem;font-weight:900">${event.start.dateTime ? start.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) : 'DAG'}</div></div><div style="font-size:1.2rem;font-weight:300">${event.summary}</div></div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function updateNews() {
        try {
            const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.svt.se/nyheter/rss.xml').then(res=>res.json());
            let items = r.items.map(i => i.title), idx = 0;
            setInterval(() => { document.getElementById('news-text').innerText = items[idx]; idx = (idx + 1) % items.length; }, 10000);
        } catch(e) {}
    }

    async function updateHistory() {
        try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
            const e = r.events[Math.floor(Math.random()*r.events.length)];
            document.getElementById('history-fact').innerHTML = `<b style="color:var(--accent)">${e.year}:</b> ${e.text}`;
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateTime(); updateWeather(); updateCalendar(); updateNews(); updateHistory(); updateTraffic(); animate();
        setInterval(updateTime, 1000); 
        setInterval(updateWeather, 1800000); 
        setInterval(updateCalendar, 600000);
        setInterval(updateTraffic, 300000);
    });
</script>
</body>
</html>
