<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Command v84</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 10, 10, 0.95);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #5e92f3;
            --summer-cyan: #44ffff;
            --danger: #ff4444;
            --fuel-gold: #fbc02d;
            --today-glow: rgba(94, 146, 243, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background-color: #000;
            height: 100vh; width: 100vw; color: #fff;
            display: grid; 
            grid-template-columns: 750px 1fr;
            grid-template-rows: 180px 1fr 200px;
            gap: 25px; padding: 25px; overflow: hidden;
        }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(40px); border: 2px solid var(--glass-border); border-radius: 45px; position: relative; overflow: hidden; z-index: 10; }

        .top-bar { grid-column: 1/3; display: grid; grid-template-columns: 1.2fr 2fr 1fr; align-items: center; padding: 0 50px; }
        #greeting { font-size: 5rem; font-weight: 900; letter-spacing: -2px; }
        #sub-greeting { font-size: 2.2rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }

        #header-hourly { display: flex; justify-content: space-around; padding: 0 40px; }
        .weather-node { text-align: center; line-height: 1.2; }
        .weather-node div:first-child { font-size: 1.4rem; font-weight: 700; opacity: 0.6; }
        .weather-node i { width: 60px !important; height: 60px !important; margin: 10px 0; color: var(--accent); }
        .weather-node div:last-child { font-size: 2.8rem; font-weight: 900; }

        #tom-temp { font-size: 8rem; font-weight: 900; line-height: 1; text-align: right; color: var(--summer-cyan); }

        .sidebar { grid-column: 1/2; grid-row: 2/3; display: grid; grid-template-rows: 1.2fr 1fr 1fr; gap: 25px; min-height: 0; }

        .event-item { display: flex; align-items: center; gap: 30px; padding: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); transition: all 0.5s ease; }
        .event-item.is-today { 
            background: rgba(94, 146, 243, 0.1); 
            border: 3px solid var(--accent);
            box-shadow: inset 0 0 20px var(--today-glow);
            border-radius: 25px;
            margin: 5px;
        }
        .event-date { min-width: 140px; text-align: center; border-right: 4px solid var(--accent); padding-right: 20px; }
        .event-date div:first-child { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
        .event-date div:last-child { font-size: 3rem; font-weight: 900; }
        .event-summary { font-size: 2.5rem; font-weight: 400; padding-left: 10px; }

        .lunch-box { padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; overflow: hidden; }
        #lunch-day-title { font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        #lunch-main { font-size: 2.3rem; font-weight: 900; line-height: 1.1; margin-bottom: 8px; color: #fff; }
        #lunch-veg { font-size: 1.5rem; opacity: 0.7; color: #ccc; font-style: italic; }

        .fuel-box { padding: 40px; display: flex; flex-direction: column; justify-content: space-around; }
        .fuel-row { display: flex; justify-content: space-between; align-items: center; }
        .stn-name { font-size: 2.4rem; font-weight: 900; }
        .stn-price { font-size: 4rem; font-weight: 900; color: var(--fuel-gold); }
        .stn-price span { font-size: 1.5rem; margin-left: 10px; opacity: 0.5; }

        .main-content { grid-column: 2/3; grid-row: 2/3; background: #000; position: relative; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out; }
        .slide.active { opacity: 1; }

        .footer-left { grid-column: 1/2; grid-row: 3/4; padding: 40px; display: flex; align-items: center; }
        #news-text { font-size: 2.2rem; font-weight: 700; text-transform: uppercase; color: var(--summer-cyan); transition: opacity 0.5s ease; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .footer-right { grid-column: 2/3; grid-row: 3/4; display: grid; grid-template-columns: 1fr 350px; gap: 25px; }
        .lov-display { display: flex; align-items: center; gap: 60px; padding: 0 40px; }
        .lov-item { text-align: center; }
        .lov-val { font-size: 6rem; font-weight: 900; line-height: 1; }
        .lov-lab { font-size: 1.3rem; font-weight: 900; letter-spacing: 2px; }
        #footer-time { font-size: 7rem; font-weight: 900; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header class="top-bar glass-panel">
    <div>
        <div id="greeting">God dag!</div>
        <div id="sub-greeting">LADDAR...</div>
    </div>
    <div id="header-hourly"></div>
    <div id="tom-temp">--°</div>
</header>

<div class="sidebar">
    <section class="glass-panel" id="calendar-list"></section>
    
    <section class="glass-panel lunch-box">
        <div id="lunch-day-title">SÖKER LUNCH...</div>
        <div id="lunch-main">Hämtar matsedel...</div>
        <div id="lunch-veg"></div>
    </section>

    <section class="glass-panel fuel-box">
        <div class="fuel-row">
            <div class="stn-name">COSTCO BURLÖV</div>
            <div id="price-costco" class="stn-price">--<span>kr/l</span></div>
        </div>
        <div class="fuel-row" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <div class="stn-name">PREEM ALLÉVÄGEN</div>
            <div id="price-preem" class="stn-price">--<span>kr/l</span></div>
        </div>
    </section>
</div>

<main class="main-content glass-panel" id="slideshow-container">
    <div class="slide active" id="slide1"></div>
    <div class="slide" id="slide2"></div>
</main>

<footer class="footer-left glass-panel">
    <div id="news-text">LADDAR NYHETER...</div>
</footer>

<div class="footer-right">
    <div class="glass-panel lov-display">
        <div class="lov-item">
            <div id="count-easter" class="lov-val" style="color: var(--fuel-gold);">--</div>
            <div class="lov-lab">PÅSKLOV</div>
        </div>
        <div class="lov-item">
            <div id="count-summer" class="lov-val" style="color: var(--summer-cyan);">--</div>
            <div class="lov-lab">SOMMARLOV</div>
        </div>
        <div id="history-fact" style="font-size: 1.5rem; margin-left: 40px; opacity: 0.8; border-left: 2px solid #333; padding-left: 30px;">...</div>
    </div>
    <div class="glass-panel" id="footer-time">00:00</div>
</div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';

    // BILDSPEL
    const slideshowImages = ["https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1200&q=80"];
    let currentSlide = 1;
    function updateSlideshow() {
        const nextSlide = currentSlide === 1 ? 2 : 1;
        const activeEl = document.getElementById(`slide${currentSlide}`);
        const nextEl = document.getElementById(`slide${nextSlide}`);
        const newImgUrl = `https://images.unsplash.com/photo-${Math.random() < 0.5 ? '1470071459604-3b5ec3a7fe05' : '1441974231531-c6227db76b6e'}?auto=format&fit=crop&w=1600&q=80&sig=${Math.random()}`;
        nextEl.style.backgroundImage = `url('${newImgUrl}')`;
        setTimeout(() => { activeEl.classList.remove('active'); nextEl.classList.add('active'); currentSlide = nextSlide; }, 1000); 
    }

    // NYHETER
    let headlines = []; let newsIdx = 0;
    async function updateNews() {
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://feeds.bbci.co.uk/news/world/rss.xml')}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            headlines = Array.from(items).map(i => i.querySelector("title").textContent.trim());
            if (headlines.length > 0) displayNextHeadline();
        } catch(e) { document.getElementById('news-text').innerText = "VÄRLDSHÄNDELSER UPPDATERAS..."; }
    }

    function displayNextHeadline() {
        if (headlines.length === 0) return;
        const el = document.getElementById('news-text');
        el.style.opacity = 0;
        setTimeout(() => {
            el.innerText = headlines[newsIdx];
            el.style.opacity = 1;
            newsIdx = (newsIdx + 1) % headlines.length;
        }, 500);
    }

    function update() {
        const now = new Date();
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('sub-greeting').innerText = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        const easter = new Date('2026-03-30'); const summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function fetchWithRetry(url) {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${new Date().getTime()}`);
        if (!res.ok) throw new Error("Proxy fail");
        const data = await res.json();
        return data.contents; 
    }

    // LUNCHMENY
    async function updateLunch() {
        const lunchMain = document.getElementById('lunch-main');
        const lunchVeg = document.getElementById('lunch-veg');
        try {
            const now = new Date(); let checkDate = new Date();
            if (now.getHours() >= 14) checkDate.setDate(now.getDate() + 1);
            const menuID = "762f275e-8686-4f40-8f96-a45e00949f2b";
            const dateStr = checkDate.toISOString().split('T')[0];
            const mashieUrl = `https://mpi.mashie.com/api/v1/pubmenus/${menuID}/weeks?fromDate=${dateStr}&toDate=${dateStr}`;
            const raw = await fetchWithRetry(mashieUrl);
            const weeks = JSON.parse(raw);
            if (weeks && weeks.length > 0 && weeks[0].Days && weeks[0].Days.length > 0) {
                const day = weeks[0].Days[0];
                document.getElementById('lunch-day-title').innerText = now.getHours() >= 14 ? "LUNCH IMORGON" : "LUNCH IDAG";
                lunchMain.innerText = day.Meals[0] ? day.Meals[0].Name : "Ingen meny";
                lunchVeg.innerText = day.Meals[1] ? day.Meals[1].Name : "";
            }
        } catch(e) { lunchMain.innerText = "LUNCH: ANSLUTNINGSFEL"; }
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&daily=temperature_2m_max&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            document.getElementById('tom-temp').innerText = Math.round(d.daily.temperature_2m_max[1]) + '°';
            let h = '';
            for(let i=2; i<=8; i+=2) {
                const idx = nowH + i;
                const icon = d.hourly.weathercode[idx] <= 2 ? (d.hourly.weathercode[idx] === 0 ? 'sun' : 'cloud-sun') : 'cloud-rain';
                h += `<div class="weather-node"><div>${new Date(d.hourly.time[idx]).getHours()}:00</div><i data-lucide="${icon}"></i><div>${Math.round(d.hourly.temperature_2m[idx])}°</div></div>`;
            }
            document.getElementById('header-hourly').innerHTML = h; lucide.createIcons();
        } catch(e) {}
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            if (d.items) {
                const todayStr = new Date().toDateString();
                document.getElementById('calendar-list').innerHTML = d.items.slice(0, 3).map(e => {
                    const s = new Date(e.start.dateTime || e.start.date);
                    const isToday = s.toDateString() === todayStr;
                    return `<div class="event-item ${isToday ? 'is-today' : ''}"><div class="event-date"><div>${s.toLocaleDateString('sv-SE',{weekday:'short'}).toUpperCase()}</div><div>${e.start.dateTime ? s.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) : 'HELDAG'}</div></div><div class="event-summary">${e.summary}</div></div>`;
                }).join('');
            }
        } catch(e) {}
    }

    // DIESELPRISER (FIXAD)
    async function updateFuel() {
        try {
            const html = await fetchWithRetry("https://bensinpriser.nu/stationer/diesel/skane-lan/");
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const rows = Array.from(doc.querySelectorAll("tr"));
            
            // Leta efter Costco Malmö
            const costcoRow = rows.find(r => r.innerText.includes("Costco") && r.innerText.includes("Malmö"));
            if (costcoRow) {
                const priceMatch = costcoRow.innerText.match(/(\d+[,.]\d+)kr/);
                if (priceMatch) document.getElementById('price-costco').innerHTML = `${priceMatch[1]}<span>kr/l</span>`;
            }

            // Leta efter Preem Staffanstorp (Önsvala Allé 2 dyker ofta upp som "Staffanstorp")
            const preemRow = rows.find(r => r.innerText.includes("Preem") && (r.innerText.includes("Staffanstorp") || r.innerText.includes("Önsvala")));
            if (preemRow) {
                const priceMatch = preemRow.innerText.match(/(\d+[,.]\d+)kr/);
                if (priceMatch) document.getElementById('price-preem').innerHTML = `${priceMatch[1]}<span>kr/l</span>`;
            } else {
                // Fallback: Ta första bästa Preem-pris i Skåne om Staffanstorp inte syns på första sidan
                const fallbackRow = rows.find(r => r.innerText.includes("Preem"));
                const priceMatch = fallbackRow.innerText.match(/(\d+[,.]\d+)kr/);
                if (priceMatch) document.getElementById('price-preem').innerHTML = `${priceMatch[1]}<span>kr/l</span>`;
            }
        } catch(e) { console.error("Fuel error:", e); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); updateWeather(); updateCalendar(); updateLunch(); updateFuel(); updateNews();
        document.getElementById('slide1').style.backgroundImage = `url('${slideshowImages[0]}')`;
        setInterval(update, 1000);
        setInterval(updateWeather, 1800000);
        setInterval(updateCalendar, 600000);
        setInterval(updateLunch, 3600000);
        setInterval(updateSlideshow, 60000);
        setInterval(displayNextHeadline, 15000);
        setInterval(updateNews, 1800000);
        setInterval(updateFuel, 3600000);
        lucide.createIcons();
    });
</script>
</body>
</html>
