<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Command v62 - Balanced Layout</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel='stylesheet' type='text/css' href='https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/maps.css'>
    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/maps-web.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(10, 10, 10, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #5e92f3;
            --sky-blue: #87CEEB;
            --deep-sky: #00BFFF;
            --text-main: #ffffff;
            --easter-gold: #ffaa33;
            --summer-cyan: #44ffff;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', sans-serif; background-color: #000; margin: 0;
            height: 100vh; width: 100vw; color: var(--text-main);
            display: grid; grid-template-columns: 520px 1fr;
            grid-template-rows: 15vh minmax(0, 1fr) 12vh;
            gap: 15px; padding: 15px; overflow: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--glass-border); border-radius: 30px;
            position: relative; overflow: hidden; z-index: 10;
        }

        /* HEADER */
        .top-bar { grid-column: 1/3; display: grid; grid-template-columns: 650px 1fr 180px; align-items: center; padding: 0 40px; }
        #greeting {
            font-size: 4.8rem; font-weight: 200; letter-spacing: -2px; line-height: 0.95;
            background: linear-gradient(to right, var(--sky-blue), var(--deep-sky)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #sub-greeting { font-size: 1.3rem; font-weight: 400; opacity: 0.9; margin-top: 8px; color: var(--accent); }

        #header-hourly { 
            display: flex; justify-content: space-evenly; align-items: center; 
            border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); 
            height: 80%; margin: 0 30px; 
        }

        .weather-node i { width: 48px !important; height: 48px !important; margin: 10px 0; }
        .weather-node div:last-child { font-size: 1.6rem !important; font-weight: 900; }

        /* SIDEBAR & TRAFFIC */
        .sidebar-container { grid-column: 1/2; grid-row: 2/3; display: grid; grid-template-rows: 1fr 340px; gap: 15px; min-height: 0; }
        
        /* Kalenderinnehåll 20% större */
        #custom-calendar-list { font-size: 1.2em; }
        .event-item { display: flex; align-items: center; gap: 25px; padding: 22px 25px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .event-item.is-today { background: rgba(94, 146, 243, 0.15); border-color: var(--accent); }

        .traffic-box { position: relative; width: 100%; height: 100%; border-radius: 20px; overflow: hidden; display: grid; grid-template-rows: 1fr 140px; }
        #map { width: 100%; height: 100%; border-radius: 20px 20px 0 0; }
        .traffic-dest-list { background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; padding: 10px 25px; border-top: 1px solid var(--glass-border); gap: 10px; }
        .traffic-row { display: flex; justify-content: space-between; align-items: center; }
        .traffic-label { font-size: 0.7rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .traffic-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
        .traffic-status-text { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }

        /* FOOTER LOV-SECTION */
        .lov-container { display: flex; align-items: center; gap: 20px; height: 100%; }
        .lov-box { display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 130px; }
        .lov-title { font-size: 1.1rem; font-weight: 900; margin-bottom: -5px; letter-spacing: 1px; }
        .lov-days { font-size: 4rem; font-weight: 900; line-height: 1; }
        
        /* Dagar kvar - Nu till vänster, större och endast en gång */
        .vertical-text-main { 
            writing-mode: vertical-rl; transform: rotate(180deg); 
            font-size: 1.1rem; font-weight: 900; opacity: 0.7; 
            border-right: 1px solid rgba(255,255,255,0.2); padding-right: 15px;
            height: 80%; display: flex; align-items: center; color: var(--accent);
            letter-spacing: 2px;
        }

        /* CLOCK 30% MINRE */
        .footer-clock-box { display: flex; align-items: center; justify-content: flex-end; padding-right: 40px; min-width: 180px; }
        #footer-time { font-size: 3.8rem; font-weight: 900; line-height: 1; letter-spacing: -1px; opacity: 0.9; }

        .news-wrapper { display: flex; align-items: center; gap: 20px; width: 100%; }
        .news-tag { background: var(--accent); color: #000; padding: 6px 15px; border-radius: 10px; font-weight: 900; font-size: 0.9rem; }

        .main-content { position: relative; background: #000; }
        .video-background { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;}
        .video-background iframe { width: 100%; height: 100%; transform: scale(1.35); }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<header class="top-bar glass-panel">
    <div id="greet-container">
        <div id="greeting">God dag!</div>
        <div id="sub-greeting">Laddar...</div>
    </div>
    <div id="header-hourly"></div>
    <div style="text-align: right;">
        <div style="font-size: 0.75rem; opacity: 0.5; font-weight: 900;">IMORGON</div>
        <div id="tom-temp" style="font-weight: 900; font-size: 3.5rem; line-height: 1;">--°</div>
    </div>
</header>

<div class="sidebar-container">
    <section class="glass-panel" style="padding: 25px;">
        <div id="custom-calendar-list"></div>
    </section>
    
    <section class="glass-panel" style="padding: 8px;">
        <div class="traffic-box">
            <div id="map"></div>
            <div class="traffic-dest-list">
                <div class="traffic-row">
                    <div>
                        <div class="traffic-label">Lomma (Vinstorpsv.)</div>
                        <div id="traffic-time-lomma" class="traffic-val">-- min</div>
                    </div>
                    <div style="text-align: right;"><div id="status-lomma" class="traffic-status-text">Normalt</div></div>
                </div>
                <div class="traffic-row" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 5px;">
                    <div>
                        <div class="traffic-label">Malmö (Hemsögatan)</div>
                        <div id="traffic-time-malmo" class="traffic-val">-- min</div>
                    </div>
                    <div style="text-align: right;"><div id="status-malmo" class="traffic-status-text">Normalt</div></div>
                </div>
            </div>
        </div>
    </section>
</div>

<main class="main-content glass-panel">
    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/P9yjjfKXa6Q?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=P9yjjfKXa6Q" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
</main>

<div style="grid-column: 1/2; grid-row: 3/4;">
    <footer class="glass-panel" style="height: 100%; display: flex; align-items: center; padding: 0 30px;">
        <div class="news-wrapper">
            <div class="news-tag">NYHETER</div>
            <div id="news-text" style="font-weight: 600; text-transform: uppercase; font-size: 1.1rem;">Hämtar nyheter...</div>
        </div>
    </footer>
</div>

<div style="grid-column: 2/3; grid-row: 3/4; display: flex; gap: 15px;">
    <div class="glass-panel" style="display: flex; padding: 0 25px; flex: 1; align-items: center;">
        <div class="lov-container">
            <div class="vertical-text-main">DAGAR KVAR</div>
            <div class="lov-box">
                <div class="lov-title" style="color: var(--easter-gold);">PÅSKLOV</div>
                <div id="count-easter" class="lov-days">--</div>
            </div>
            <div class="lov-box">
                <div class="lov-title" style="color: var(--summer-cyan);">SOMMARLOV</div>
                <div id="count-summer" class="lov-days">--</div>
            </div>
        </div>
        <div id="history-fact" style="font-size: 1.1rem; flex: 1; display: flex; align-items: center; padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.1); margin-left: 20px;">Hämtar historik...</div>
    </div>
    <div class="glass-panel footer-clock-box"><div id="footer-time">00:00</div></div>
</div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw';
    const CAL_ID = 'rezgarhayder@gmail.com';
    let weatherMode = 'clear';
    let isBirthday = false;

    function initMap() {
        if(typeof tt === 'undefined') return;
        const map = tt.map({
            key: 'DIN_TOMTOM_API_NYCKEL', 
            container: 'map',
            center: [13.15, 55.62],
            zoom: 10,
            style: 'https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.23.0/maps/styles/night.json',
            dragPan: false, scrollZoom: false
        });
        map.on('load', () => { map.showTrafficFlow(); map.showTrafficIncidents(); });
    }

    function updateTime() {
        const now = new Date();
        const hrs = now.getHours();
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        
        let greet = (hrs >= 5 && hrs < 10) ? "God morgon!" : (hrs >= 18 && hrs < 23) ? "God kväll!" : (hrs >= 23 || hrs < 5) ? "God natt!" : "God dag!";
        document.getElementById('greeting').innerText = greet;
        document.getElementById('sub-greeting').innerText = `Idag är det ${now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}`;

        document.getElementById('count-easter').innerText = Math.ceil((new Date('2026-03-30') - now) / 86400000);
        document.getElementById('count-summer').innerText = Math.ceil((new Date('2026-06-12') - now) / 86400000);
    }

    function updateTraffic() {
        const now = new Date();
        const hrs = now.getHours();
        const isRush = (now.getDay() >= 1 && now.getDay() <= 5) && ((hrs >= 7 && hrs <= 9) || (hrs >= 15 && hrs <= 17));
        document.getElementById('traffic-time-lomma').innerText = (isRush ? 18 : 12) + " min";
        document.getElementById('status-lomma').innerText = isRush ? "KÖVARNING" : "GRÖNT";
        document.getElementById('status-lomma').style.color = isRush ? "var(--danger)" : "var(--summer-cyan)";
        document.getElementById('traffic-time-malmo').innerText = (isRush ? 26 : 17) + " min";
        document.getElementById('status-malmo').innerText = isRush ? "TRÖGT" : "GRÖNT";
        document.getElementById('status-malmo').style.color = isRush ? "var(--danger)" : "var(--summer-cyan)";
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&daily=temperature_2m_max&timezone=auto');
            const d = await res.json();
            const nowHour = new Date().getHours();
            weatherMode = (d.hourly.weathercode[nowHour] >= 71) ? 'snow' : (d.hourly.weathercode[nowHour] >= 51 ? 'rain' : 'clear');
            initFX(); 
            document.getElementById('tom-temp').innerText = Math.round(d.daily.temperature_2m_max[1]) + '°';
            let hHtml = '';
            for(let i=1; i<=6; i++) {
                const idx = nowHour + i;
                const icon = d.hourly.weathercode[idx] <= 2 ? (d.hourly.weathercode[idx] === 0 ? 'sun' : 'cloud-sun') : (d.hourly.weathercode[idx] === 3 ? 'cloud' : 'cloud-rain');
                hHtml += `<div class="weather-node" style="text-align:center"><div style="font-size:0.8rem; opacity:0.6; font-weight:700">${new Date(d.hourly.time[idx]).getHours()}:00</div><i data-lucide="${icon}"></i><div>${Math.round(d.hourly.temperature_2m[idx])}°</div></div>`;
            }
            document.getElementById('header-hourly').innerHTML = hHtml; lucide.createIcons();
        } catch(e) {}
    }

    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.reset(); }
        reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height - canvas.height; this.speed = Math.random() * 3 + 2; }
        update() { this.y += (weatherMode === 'rain' ? 15 : 2); if (this.y > canvas.height) this.reset(); }
        draw() { ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(this.x, this.y, (weatherMode==='rain'?1:3), 0, Math.PI*2); ctx.fill(); }
    }

    function initFX() { particles = []; if (weatherMode !== 'clear') for(let i=0; i<80; i++) particles.push(new Particle()); }
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            if (d.items) {
                document.getElementById('custom-calendar-list').innerHTML = d.items.slice(0, 4).map(event => {
                    const start = new Date(event.start.dateTime || event.start.date);
                    const isToday = start.toDateString() === new Date().toDateString();
                    // Lägger till veckodag här
                    const weekday = start.toLocaleDateString('sv-SE', { weekday: 'short' }).toUpperCase();
                    const dateNum = start.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
                    
                    return `
                    <div class="event-item ${isToday ? 'is-today' : ''}">
                        <div style="min-width: 100px; text-align:center; border-right: 1px solid rgba(255,255,255,0.1); padding-right:15px;">
                            <div style="font-size:0.75rem;color:var(--accent);font-weight:900">${isToday ? 'IDAG' : weekday + ' ' + dateNum}</div>
                            <div style="font-size:1.6rem;font-weight:900">${event.start.dateTime ? start.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) : 'HELDAG'}</div>
                        </div>
                        <div style="font-size:1.3rem;font-weight:300;padding-left:10px">${event.summary}</div>
                    </div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function updateNews() {
        try {
            const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.svt.se/nyheter/rss.xml').then(res=>res.json());
            let items = r.items.map(i => i.title), idx = 0;
            setInterval(() => { document.getElementById('news-text').innerText = items[idx]; idx = (idx + 1) % items.length; }, 10000);
        } catch(e) {}
    }

    async function updateHistory() {
        try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
            const e = r.events[Math.floor(Math.random()*r.events.length)];
            document.getElementById('history-fact').innerHTML = `<b style="color:var(--accent)">${e.year}:</b> ${e.text}`;
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateTime(); updateWeather(); updateCalendar(); updateNews(); updateHistory(); updateTraffic(); animate(); initMap();
        setInterval(updateTime, 1000); setInterval(updateWeather, 1800000); setInterval(updateCalendar, 600000); setInterval(updateTraffic, 300000);
    });
</script>
</body>
</html>
