<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v99</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* ÖKAD BREDD FÖR ATT FÅ PLATS MED VÄDRET */
        .info-panel {
            flex: 0 0 48%; 
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 30px; /* Minskad gap för att lyfta allt uppåt */
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
        }

        #greeting { 
            font-size: 7rem; 
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -4px; 
            white-space: nowrap; 
            display: block;
            text-transform: lowercase; 
        }
        #greeting::first-letter { text-transform: uppercase; }

        /* REJÄL WIGGLE-ANIMATION */
        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center;
            animation: super-wiggle 3s infinite ease-in-out;
            color: var(--accent);
        }
        @keyframes super-wiggle {
            0%, 70% { transform: rotate(0deg) scale(1); }
            75% { transform: rotate(20deg) scale(1.1); }
            80% { transform: rotate(-20deg) scale(1.1); }
            85% { transform: rotate(15deg) scale(1.1); }
            90% { transform: rotate(-10deg) scale(1.1); }
            95%, 100% { transform: rotate(0deg) scale(1); }
        }

        #date-sub { 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: var(--accent); 
            margin-bottom: 5px; /* Lyfter upp kalendern */
            text-transform: lowercase; 
            white-space: nowrap;
        }
        #date-sub::first-letter { text-transform: uppercase; }

        .section-label { 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); 
            margin-bottom: 15px; 
        }

        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { 
            border-color: var(--accent); 
            box-shadow: 0 0 40px rgba(94,146,243,0.15);
        }

        .event-date-box {
            min-width: 120px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        .ev-day-name { font-size: 1rem; font-weight: 900; color: var(--accent); }
        .ev-date-num { font-size: 2.4rem; font-weight: 900; line-height: 1.1; }
        .ev-time { font-size: 1.2rem; opacity: 0.7; font-weight: 700; }
        .event-title { font-size: 2.2rem; font-weight: 400; flex: 1; line-height: 1.2; }

        /* VÄDERIKONER SOM SVÄVAR */
        .weather-row { display: flex; gap: 15px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 25px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-icon-wrapper {
            display: inline-block;
            margin: 10px 0;
            animation: constant-float 4s infinite ease-in-out;
        }
        .weather-box i { width: 55px; height: 55px; color: var(--accent); display: block; }
        @keyframes constant-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .weather-temp { font-size: 2.8rem; font-weight: 900; }
        .weather-hour { font-size: 1.1rem; opacity: 0.6; font-weight: 900; }

        .media-panel { flex: 1; display: flex; flex-direction: column; }
        .video-container { flex: 1; background: #000; position: relative; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .countdown-bar {
            height: 200px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }
        .count-num { font-size: 5.5rem; font-weight: 900; line-height: 1; }
        #clock { font-size: 4.5rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -3px; }
    </style>
</head>
<body>

    <div class="info-panel">
        <header>
            <div id="greeting">Laddar...</div>
            <div id="date-sub">Laddar...</div>
        </header>

        <section>
            <div class="section-label">Kalender</div>
            <div id="calendar-list"></div>
        </section>

        <section>
            <div class="section-label">Väder i Staffanstorp</div>
            <div id="weather-list" class="weather-row"></div>
        </section>
        
        <div style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px;">
            <div class="section-label">Historisk fakta</div>
            <div id="history-fact" style="font-size: 1.4rem; opacity: 0.8; line-height: 1.4; font-weight: 300;">...</div>
        </div>
    </div>

    <div class="media-panel">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/CZaqKhVLJxA?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=CZaqKhVLJxA" allow="autoplay"></iframe>
        </div>

        <div class="countdown-bar">
            <div style="display: flex; gap: 50px;">
                <div style="text-align: center;">
                    <div id="count-easter" class="count-num" style="color: var(--easter);">--</div>
                    <div style="font-size: 1rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900;">PÅSKLOV</div>
                </div>
                <div style="text-align: center;">
                    <div id="count-summer" class="count-num" style="color: var(--summer);">--</div>
                    <div style="font-size: 1rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900;">SOMMARLOV</div>
                </div>
            </div>
            <div id="clock">00:00</div>
        </div>
    </div>

<script>
    const API_KEY_CAL = 'AIzaSyAC3QiGhqOM2F2ZrnFq3xWUu6_1bAwOvSw'; 
    const CAL_ID = 'rezgarhayder@gmail.com';

    function update() {
        const now = new Date();
        const hour = now.getHours();
        let greetingBase = (hour >= 6 && hour < 10) ? "God morgon" : (hour >= 10 && hour < 18) ? "God dag" : (hour >= 18 && hour < 23) ? "God kväll" : "God natt";
        document.getElementById('greeting').innerHTML = `${greetingBase}<span class="wiggle-mark">!</span>`;
        document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        const dateStr = now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('date-sub').innerText = "Idag är det " + dateStr;
        const easter = new Date('2026-03-30'), summer = new Date('2026-06-12');
        document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
        document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = (d.items || []).slice(0, 2).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                return `<div class="event-card ${start.toDateString() === todayStr ? 'today' : ''}">
                    <div class="event-date-box">
                        <div class="ev-day-name">${start.toDateString() === todayStr ? 'IDAG' : start.toLocaleDateString('sv-SE', {weekday:'short'})}</div>
                        <div class="ev-date-num">${start.toLocaleDateString('sv-SE', {day:'numeric', month:'short'})}</div>
                        <div class="ev-time">${e.start.dateTime ? start.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG'}</div>
                    </div>
                    <div class="event-title">${e.summary}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            const tomorrowMax = Math.round(Math.max(...d.hourly.temperature_2m.slice(24, 48)));
            const getIcon = (c) => (c >= 71 ? 'snowflake' : c >= 51 ? 'cloud-rain' : c >= 3 ? 'cloud' : 'sun');

            document.getElementById('weather-list').innerHTML = `
                <div class="weather-box"><div class="weather-hour">${nowH}:00</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[nowH])}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH])}°</div></div>
                <div class="weather-box"><div class="weather-hour">${(nowH+3)%24}:00</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[nowH+3])}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH+3])}°</div></div>
                <div class="weather-box"><div class="weather-hour">IMORGON</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[36])}"></i></div><div class="weather-temp">${tomorrowMax}°</div></div>
            `;
            lucide.createIcons();
        } catch(e) {}
    }

    async function updateHistory() {
        try {
            const r = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${new Date().getMonth()+1}/${new Date().getDate()}`).then(res=>res.json());
            const e = r.events[Math.floor(Math.random()*r.events.length)];
            document.getElementById('history-fact').innerHTML = `<b style="color:var(--accent)">År ${e.year}:</b> ${e.text}`;
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        update(); updateCalendar(); updateWeather(); updateHistory();
        setInterval(update, 1000); setInterval(updateCalendar, 600000); setInterval(updateWeather, 1800000); setInterval(updateHistory, 3600000);
    });
</script>
</body>
</html>
