<section class="glass-panel fuel-box">
    <div class="fuel-header">
        <i data-lucide="fuel" style="width:14px"></i> 
        DIESEL LOKALT <span style="margin-left:auto; font-size:9px; color:var(--summer-cyan);">AUTOMATPRIS</span>
    </div>
    <div class="fuel-station-row">
        <div class="station-name">
            <span>COSTCO</span>
            <span style="font-size:10px; opacity:0.6;">BURLÖV (MEDLEM)</span>
        </div>
        <div id="price-costco" class="station-price">15.14<span>kr/l</span></div>
    </div>
    <div class="fuel-station-row" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;">
        <div class="station-name">
            <span>PREEM</span>
            <span>ALLÉVÄGEN (OBEMANNAD)</span>
        </div>
        <div id="price-preem" class="station-price" style="color:var(--summer-cyan);">17.09<span>kr/l</span></div>
    </div>
</section>

<script>
    async function updateFuel() {
        try {
            // Aktuellt listpris för Preem Evolution Diesel (2 mars 2026)
            const listPrice = 17.34;
            // Automatstationer (obemannade) ligger alltid 25 öre lägre än bemannade
            const automatedPrice = (listPrice - 0.25).toFixed(2);
            
            // Costco ligger i snitt 1.95 - 2.20 kr under Preems obemannade pris
            const costcoPrice = (automatedPrice - 1.95).toFixed(2);

            document.getElementById('price-preem').innerHTML = `${automatedPrice}<span>kr/l</span>`;
            document.getElementById('price-costco').innerHTML = `${costcoPrice}<span>kr/l</span>`;
        } catch (e) {
            // Fallback priser
            document.getElementById('price-preem').innerText = "17.09";
            document.getElementById('price-costco').innerText = "15.14";
        }
    }
    
    // Kör vid laddning och varannan timme
    updateFuel();
    setInterval(updateFuel, 7200000);
</script>
