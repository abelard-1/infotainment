<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffanstorp Wall Dashboard v135</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* --- FÖDELSEDAGS-SKÄRMEN (HELSKÄRM) --- */
        #birthday-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 8000; 
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #birthday-screen img.bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.25;
            z-index: 1;
        }

        #bday-main-text {
            position: relative;
            z-index: 2;
            font-size: clamp(6rem, 12vw, 15rem);
            line-height: 1;
            font-weight: 900;
            text-align: center;
            letter-spacing: -2px;
            /* Guld-effekt - Helt statisk för Chromecast-prestanda */
            background: linear-gradient(180deg, #FFDF00 0%, #D4AF37 50%, #996515 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 40px rgba(255, 215, 0, 0.4));
        }

        #bday-footer {
            position: absolute;
            bottom: 40px;
            right: 60px;
            z-index: 2;
            display: flex;
            gap: 40px;
            align-items: center;
            background: rgba(20, 20, 20, 0.7);
            padding: 20px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        #bday-clock { font-size: 3.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
        #bday-weather { display: flex; align-items: center; gap: 15px; font-size: 3rem; font-weight: 900; color: #D4AF37; }
        #bday-weather svg { width: 50px; height: 50px; }
        /* -------------------------------------- */

        /* VÄDER-OVERLAY */
        #weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .info-panel {
            flex: 0 0 48%; 
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            position: relative;
            z-index: 20;
        }

        header {
            max-width: 100%;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            perspective: 2000px; 
            padding-bottom: 10px;
        }

        #greeting { 
            font-size: 7rem; 
            font-weight: 900; 
            line-height: 1; 
            letter-spacing: -4px; 
            white-space: nowrap; 
            transition: color 2s ease;
        }

        .char-span {
            display: inline-block;
            transform-origin: center center;
            animation: charFlipIn 0.8s ease both;
            transform-style: preserve-3d;
            z-index: 1;
        }

        @keyframes charFlipIn {
            0% { transform: rotateX(-90deg); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        .char-span.out {
            animation: charFlipOut 0.5s ease-in both;
        }

        @keyframes charFlipOut {
            0% { transform: rotateX(0deg); opacity: 1; }
            100% { transform: rotateX(90deg); opacity: 0; }
        }

        #greeting.god-natt { color: #666; }
        #greeting.god-natt .wiggle-mark { color: #666; }
        
        #greeting.birthday { color: #ffaa33; text-shadow: 0 0 20px rgba(255, 170, 51, 0.4); }

        .wiggle-mark {
            display: inline-block !important;
            transform-origin: bottom center;
            animation: intensive-wiggle 60s infinite;
            color: #fff; 
            transition: color 2s ease;
        }
        
        #greeting.birthday .wiggle-mark { color: #ffaa33; }

        @keyframes intensive-wiggle {
            0%, 98% { transform: translate(0,0) rotate(0deg); }
            98.4% { transform: translate(2px, -2px) rotate(15deg); }
            98.8% { transform: translate(-2px, -2px) rotate(-15deg); }
            99.2% { transform: translate(2px, 0) rotate(10deg); }
            99.6% { transform: translate(-1px, 0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .moon-icon { display: inline-block; margin-left: 10px; color: #666; }
        .moon-icon svg { width: 0.8em; height: 0.8em; vertical-align: baseline; }

        #date-sub { 
            font-size: 2.8rem; 
            font-weight: 300; 
            color: var(--accent); 
            margin-bottom: 5px;
            text-transform: lowercase; 
        }
        #date-sub::first-letter { text-transform: uppercase; }

        .section-label { 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); 
            margin-bottom: 10px; 
            display: flex;
            align-items: center;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        .event-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .event-card.today { border-color: var(--accent); }

        .event-date-box {
            min-width: 140px;
            text-align: center;
            border-right: 4px solid var(--accent);
            padding-right: 20px;
        }
        
        .ev-day-name { font-size: 1.3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.5rem; font-weight: 900; line-height: 1.1; } 
        .ev-time { font-size: 1.7rem; opacity: 0.8; font-weight: 700; margin-top: 8px; } 
        .event-title { font-size: 2.6rem; font-weight: 400; flex: 1; line-height: 1.2; }

        .weather-row { display: flex; gap: 15px; }
        .weather-box { 
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 25px; 
            flex: 1; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .weather-icon-wrapper {
            display: inline-block;
            margin: 10px 0;
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .weather-box i, .weather-box svg { 
            width: 100px !important; 
            height: 100px !important; 
            color: var(--accent); 
            display: block; 
            margin: 0 auto; 
        }

        .weather-box i[data-lucide="sun"], 
        .weather-box svg.lucide-sun { color: #ffb703 !important; }
        .weather-temp { font-size: 3.8rem; font-weight: 900; margin-top: 5px; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        .media-panel { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 20; }
        
        .video-container { 
            flex: 1; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
        }

        .video-container iframe { 
            position: absolute; 
            top: -25%; 
            left: 0; 
            width: 100%; 
            height: 150%; 
            border: none; 
            pointer-events: none;
            z-index: 1;
        }

        .countdown-bar {
            height: 200px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            border-top: 1px solid var(--border);
        }

        .countdown-wrapper { display: flex; align-items: center; gap: 30px; }
        .vertical-label { 
            writing-mode: vertical-rl; 
            transform: rotate(180deg); 
            font-size: 1.2rem;
            font-weight: 900; 
            letter-spacing: 2px; 
            opacity: 0.4;
        }

        #clock { font-size: 4.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        .news-bar {
            background: #0a0a0a;
            padding: 25px 60px;
            border-top: 1px solid var(--border);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #news-text { 
            font-size: 1.5rem; 
            opacity: 0.8; 
            line-height: 1.4; 
            font-weight: 300; 
            transition: opacity 0.5s; 
        }
        
        .particle {
            position: absolute;
            background: #fff;
            pointer-events: none;
            opacity: 0.6;
        }

        #test-bday-btn {
            position: fixed;
            bottom: 20px;
            left: 20px; 
            z-index: 9999;
            background: var(--easter);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background 0.3s ease;
        }
    </style>
</head>
