    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.3);
            --accent: #5e92f3;
            --summer: #44ffff;
            --easter: #ffaa33;
            --bday-color: #D4AF37; 
            --worldcup: #4ade80; /* Ny sportig grön färg för VM-nedräkningen */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* --- TEST-KNAPPAR --- */
        #test-buttons {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 10002;
            display: flex;
            gap: 10px;
        }
        .test-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            transition: background 0.3s;
        }
        .test-btn:hover { background: rgba(255,255,255,0.2); }

        /* --- NATT-DIMMER --- */
        #night-dimmer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to top right, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.65) 100%);
            pointer-events: none;
            z-index: 9999; 
            opacity: 0;
            transition: opacity 4s ease; 
        }
        #night-dimmer.active { opacity: 1; }
        /* ------------------- */

        /* --- NATT-LÄGE (HELSKÄRM) --- */
        #night-mode-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #020111 0%, #0a0a1a 100%);
            z-index: 10000; 
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #night-stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--max-opacity); transform: scale(1); box-shadow: 0 0 4px rgba(255,255,255,0.5); }
        }

        #nm-moon {
            position: absolute;
            top: calc(50% - 10.5rem); 
            left: calc(50% + 19rem); 
            width: 10rem;
            height: 10rem;
            color: #fde16e; 
            opacity: 1; 
            filter: drop-shadow(0 0 20px rgba(253, 225, 110, 0.8)); 
            z-index: 1; 
            transform: translate(-50%, -50%) rotate(-10deg); 
        }

        @keyframes micro-shift {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(12px, 8px); }
            50% { transform: translate(4px, 16px); }
            75% { transform: translate(-8px, 6px); }
            100% { transform: translate(0px, 0px); }
        }

        .anti-burn-in { animation: micro-shift 180s infinite ease-in-out; }

        #nm-main-text {
            position: relative; z-index: 2; font-size: clamp(6rem, 12vw, 15rem); line-height: 1;
            font-weight: 900; text-align: center; letter-spacing: -2px; color: #7b8b9e; 
            text-shadow: 0px 0px 30px rgba(123, 139, 158, 0.2); background: none; 
        }

        #nm-footer {
            position: absolute; bottom: 40px; right: 60px; z-index: 2; display: flex; gap: 40px;
            align-items: center; background: rgba(10, 10, 15, 0.5); padding: 20px 40px;
            border-radius: 30px; border: 1px solid rgba(123, 139, 158, 0.1);
        }

        #nm-clock { font-size: 3.5rem; font-weight: 900; color: #5a6675; font-variant-numeric: tabular-nums; }
        #nm-weather { display: flex; align-items: center; gap: 15px; font-size: 3rem; font-weight: 900; color: #5a6675; }
        #nm-weather svg { width: 50px; height: 50px; }
        /* -------------------------------------- */

        /* --- FÖDELSEDAGS-SKÄRMEN (HELSKÄRM) --- */
        #birthday-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 8000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }

        #birthday-screen img.bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.25; z-index: 1;
        }

        #bday-main-text {
            position: relative; z-index: 2; font-size: clamp(6rem, 12vw, 15rem); line-height: 1;
            font-weight: 900; text-align: center; letter-spacing: -2px;
            background: linear-gradient(180deg, #FFDF00 0%, #D4AF37 50%, #996515 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 40px rgba(255, 215, 0, 0.4));
        }

        #bday-footer {
            position: absolute; bottom: 40px; right: 60px; z-index: 2; display: flex; gap: 40px;
            align-items: center; background: rgba(20, 20, 20, 0.7); padding: 20px 40px;
            border-radius: 30px; border: 1px solid rgba(255, 215, 0, 0.2); backdrop-filter: blur(10px);
        }

        #bday-clock { font-size: 3.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
        #bday-weather { display: flex; align-items: center; gap: 15px; font-size: 3rem; font-weight: 900; color: #D4AF37; }
        #bday-weather svg { width: 50px; height: 50px; }
        /* -------------------------------------- */

        /* VÄDER-OVERLAY */
        #weather-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        /* --- STABILISERAD LAYOUT --- */
        .info-panel {
            width: 48vw; flex: none; 
            padding: 50px 60px 20px 60px; 
            display: flex; flex-direction: column;
            gap: 15px; 
            border-right: 1px solid var(--border);
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%); position: relative; z-index: 20; overflow: hidden;    
        }

        .media-panel { width: 52vw; flex: none; display: flex; flex-direction: column; position: relative; z-index: 20; }
        /* --------------------------- */

        header {
            width: 100%; height: 140px; min-height: 140px; max-height: 140px; flex: none;        
            display: flex; flex-direction: column; justify-content: flex-end; perspective: 2000px; padding-bottom: 10px;
        }

        #greeting { font-size: 7rem; font-weight: 900; line-height: 1; letter-spacing: -4px; white-space: nowrap; transition: color 2s ease; }

        .char-span {
            display: inline-block; transform-origin: center center;
            animation: charFlipIn 0.8s ease both; transform-style: preserve-3d; z-index: 1;
        }

        @keyframes charFlipIn {
            0% { transform: rotateX(-90deg); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        .char-span.out { animation: charFlipOut 0.5s ease-in both; }
        @keyframes charFlipOut { 0% { transform: rotateX(0deg); opacity: 1; } 100% { transform: rotateX(90deg); opacity: 0; } }

        #greeting.god-natt { color: #666; }
        #greeting.god-natt .wiggle-mark { color: #666; }
        #greeting.birthday { color: #ffaa33; text-shadow: 0 0 20px rgba(255, 170, 51, 0.4); }

        .wiggle-mark {
            display: inline-block !important; transform-origin: bottom center; animation: intensive-wiggle 60s infinite;
            color: #fff; transition: color 2s ease;
        }
        #greeting.birthday .wiggle-mark { color: #ffaa33; }

        @keyframes intensive-wiggle {
            0%, 98% { transform: translate(0,0) rotate(0deg); }
            98.4% { transform: translate(2px, -2px) rotate(15deg); }
            98.8% { transform: translate(-2px, -2px) rotate(-15deg); }
            99.2% { transform: translate(2px, 0) rotate(10deg); }
            99.6% { transform: translate(-1px, 0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .moon-icon { display: inline-block; margin-left: 10px; color: #666; }
        .moon-icon svg { width: 0.8em; height: 0.8em; vertical-align: baseline; }

        #date-sub { 
            font-size: 1.6rem; 
            font-weight: 400; 
            color: #ffd7b5; 
            margin-bottom: 5px; 
            letter-spacing: 1px;
            position: relative;
            top: 15px; 
        }

        .section-label { 
            font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; 
            color: rgba(255,255,255,0.3); margin-bottom: 10px; display: flex; align-items: center;
        }

        .live-dot {
            width: 10px; height: 10px; background-color: #ff3333; border-radius: 50%; display: inline-block; margin-right: 12px; animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        .event-card {
            background: var(--glass); border: 2px solid var(--border); border-radius: 30px;
            padding: 20px 30px; margin-bottom: 12px; display: flex; align-items: center; gap: 25px;
        }
        .event-card.today { border-color: var(--accent); }

        .event-date-box { min-width: 140px; text-align: center; border-right: 4px solid var(--accent); padding-right: 20px; }
        .ev-day-name { font-size: 1.3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .ev-date-num { font-size: 2.5rem; font-weight: 900; line-height: 1.1; } 
        .ev-time { font-size: 1.7rem; opacity: 0.8; font-weight: 700; margin-top: 8px; } 
        .event-title { font-size: 2.6rem; font-weight: 400; flex: 1; line-height: 1.2; }

        .weather-row { display: flex; gap: 15px; margin-bottom: 12px; }
        .weather-box { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 25px; flex: 1; text-align: center; border: 1px solid var(--border); }
        .weather-icon-wrapper { display: inline-block; margin: 10px 0; animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .weather-box i, .weather-box svg { width: 100px !important; height: 100px !important; color: var(--accent); display: block; margin: 0 auto; }
        .weather-box i[data-lucide="sun"], .weather-box svg.lucide-sun { color: #ffb703 !important; }
        .weather-temp { font-size: 3.8rem; font-weight: 900; margin-top: 5px; }
        .weather-hour { font-size: 1.4rem; opacity: 0.6; font-weight: 900; text-transform: uppercase; }

        #weather-summary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px 25px;
            font-size: 1.7rem;
            line-height: 1.5;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
        }
        #weather-summary strong {
            font-weight: 700;
            color: var(--accent);
        }

        .video-container { 
            width: 100%; aspect-ratio: 16 / 9; flex: none; background: #000; position: relative; overflow: hidden; 
        }
        .video-container iframe { 
            position: absolute; top: -20%; left: 0; width: 100%; height: 140%; border: none; pointer-events: none; z-index: 1; 
        }

        .countdown-bar { 
            padding: 35px 60px; background: #0a0a0a; display: flex; flex-direction: column; 
            justify-content: center; gap: 10px; border-top: 1px solid var(--border); 
        }
        
        .countdown-wrapper { 
            display: flex; align-items: center; justify-content: flex-start; width: 100%; 
        }

        #clock { 
            position: absolute;
            bottom: 35px;
            right: 60px;
            font-size: 3.4rem; 
            font-weight: 900; 
            font-variant-numeric: tabular-nums; 
            color: #d8d8d8; 
            text-align: right; 
            z-index: 30; 
        }

        .news-bar { 
            background: #0a0a0a; 
            padding: 35px 60px; 
            padding-right: 200px; 
            border-top: 1px solid var(--border); 
            min-height: 140px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            gap: 10px; 
        }
        
        #news-text { 
            font-size: 1.8rem; 
            opacity: 0.8; 
            line-height: 1.4; 
            font-weight: 300; 
            transition: opacity 0.5s; 
        }
        
        .particle { position: absolute; background: #fff; pointer-events: none; opacity: 0.6; }
    </style>

        "11-16": "Internationella toleransdagen",
        "11-19": "Internationella toalettdagen",
        "11-20": "Internationella barndagen",
        "11-21": "Världsdagen för tv",
        "11-25": "Int. dagen för avskaffande av våld mot kvinnor",
        "12-01": "Världsaidsdagen",
        "12-02": "Int. dagen för avskaffande av slaveri",
        "12-03": "Internationella funktionshindersdagen",
        "12-05": "Internationella dagen för frivilligarbete",
        "12-07": "Internationella dagen för civil luftfart",
        "12-09": "Internationella anti-korruptionsdagen",
        "12-10": "Mänskliga rättigheternas dag",
        "12-11": "Internationella bergsdagen",
        "12-18": "Internationella migrantdagen",
        "12-20": "Internationella dagen för mänsklig solidaritet"
    };

    const greetingsTranslations = [
        { m: "God morgon", d: "God dag", e: "God kväll", n: "God natt" },
        { m: "Good morning", d: "Good afternoon", e: "Good evening", n: "Good night" },
        { m: "Guten Morgen", d: "Guten Tag", e: "Guten Abend", n: "Gute Nacht" },
        { m: "Buenos días", d: "Buenas tardes", e: "Buenas noches", n: "Buenas noches" },
        { m: "Bonjour", d: "Bonjour", e: "Bonsoir", n: "Bonne nuit" },
        { m: "Buongiorno", d: "Buon pomeriggio", e: "Buonasera", n: "Buonanotte" },
        { m: "Bom dia", d: "Boa tarde", e: "Boa noite", n: "Boa noite" },
        { m: "Goedemorgen", d: "Goedemiddag", e: "Goedenavond", n: "Goedenacht" },
        { m: "Godmorgen", d: "Goddag", e: "Godaften", n: "Godnat" },
        { m: "God morgen", d: "God dag", e: "God kveld", n: "God natt" },
        { m: "Hyvää huomenta", d: "Hyvää päivää", e: "Hyvää iltaa", n: "Hyvää yötä" },
        { m: "Góðan morgun", d: "Góðan dag", e: "Gott kvöld", n: "Góða nótt" },
        { m: "Dzień dobry", d: "Dzień dobry", e: "Dobry wieczór", n: "Dobranoc" },
        { m: "Günaydın", d: "İyi günler", e: "İyi akşamlar", n: "İyi geceler" },
        { m: "Καλημέρα", d: "Καλό medσημέρι", e: "Καλησπέρα", n: "Καληνύχτα" },
        { m: "Ohayou", d: "Konnichiwa", e: "Konbanwa", n: "Oyasumi" }
    ];
    let currentLangIndex = 0;
    let currentRenderedGreeting = "";
    
    let lastRealWeatherCode = 0;
    let celebrationActive = false;
    let birthdayInterval = null; 
    let continuousInterval = null; 
    
    let currentTempStr = "--°";
    let currentIconHtml = "";

    let isNightModeForced = false;
    let isBdayModeForced = false;
    let forcedWeatherMode = 'auto'; 

    document.getElementById('test-night-btn').addEventListener('click', () => {
        isNightModeForced = !isNightModeForced;
        update();
    });

    document.getElementById('test-bday-btn').addEventListener('click', () => {
        isBdayModeForced = !isBdayModeForced;
        update();
    });

    document.getElementById('test-weather-btn').addEventListener('click', (e) => {
        if (forcedWeatherMode === 'auto') {
            forcedWeatherMode = 'rain';
            e.target.innerText = 'Väder: Regn';
        } else if (forcedWeatherMode === 'rain') {
            forcedWeatherMode = 'snow';
            e.target.innerText = 'Väder: Snö';
        } else {
            forcedWeatherMode = 'auto';
            e.target.innerText = 'Väder: Auto';
        }
        updateWeatherOverlay(lastRealWeatherCode);
    });

    function initStars() {
        const container = document.getElementById('night-stars');
        for(let i=0; i<100; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
            star.style.setProperty('--delay', (Math.random() * 5) + 's');
            star.style.setProperty('--max-opacity', Math.random() * 0.5 + 0.2);
            container.appendChild(star);
        }
    }

    function randomColor() {
        var colors = ['#FFDF00', '#D4AF37', '#ffffff', '#ff6666', '#ff00ff', '#44ffff'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function fireworkExplosion() {
        confetti({
            particleCount: randomInRange(50, 75), spread: randomInRange(150, 360), 
            startVelocity: randomInRange(20, 40), ticks: 150, gravity: 0.8, scalar: randomInRange(2, 3), 
            origin: { x: randomInRange(0.1, 0.9), y: randomInRange(0.2, 0.6) },
            colors: [randomColor(), randomColor()], zIndex: 10001
        });
    }

    function triggerCelebration() {
        if (celebrationActive) return;
        celebrationActive = true;
        if (birthdayInterval) clearInterval(birthdayInterval);
        if (continuousInterval) clearInterval(continuousInterval);

        continuousInterval = setInterval(function() {
            if (!celebrationActive) return; 
            confetti({
                particleCount: 1, startVelocity: 0, ticks: 400,
                origin: { x: Math.random(), y: -0.1 }, colors: [randomColor()],
                gravity: randomInRange(0.4, 0.6), scalar: randomInRange(1.6, 2.4), drift: randomInRange(-0.5, 0.5), zIndex: 10000 
            });
        }, 100);

        birthdayInterval = setInterval(function() {
            if (!celebrationActive) { clearInterval(birthdayInterval); return; }
            fireworkExplosion();
        }, 5000); 
    }

    function stopCelebration() {
        celebrationActive = false;
        if (birthdayInterval) clearInterval(birthdayInterval);
        if (continuousInterval) clearInterval(continuousInterval);
        if (typeof confetti !== 'undefined' && typeof confetti.reset === 'function') confetti.reset();
    }

    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    function wrapTextInSpans(text) {
        return text.split('').map(char => {
            const delay = Math.floor(Math.random() * 400); 
            return `<span class="char-span" style="animation-delay: ${delay}ms">${char === ' ' ? '&nbsp;' : char}</span>`;
        }).join('');
    }

    function update() {
        const now = new Date();
        const hour = now.getHours();
        const greetingEl = document.getElementById('greeting');
        const iframe = document.getElementById('bg-video');
        const bdayScreen = document.getElementById('birthday-screen');
        const nightScreen = document.getElementById('night-mode-screen');
        
        const todayStrForBday = String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        let isBirthday = false;
        let bdayName = "";

        if (birthdays[todayStrForBday] || isBdayModeForced) {
            isBirthday = true;
            bdayName = birthdays[todayStrForBday] || "TESTNAMN";
        }

        let phase = (hour >= 6 && hour < 10) ? "m" : (hour >= 10 && hour < 18) ? "d" : (hour >= 18 && hour < 23) ? "e" : "n";
        
        const nightDimmer = document.getElementById('night-dimmer');
        if (phase === "n" && !isBirthday) { nightDimmer.classList.add('active'); } else { nightDimmer.classList.remove('active'); }

        const showNightMode = (hour >= 23 || hour < 6) || isNightModeForced;

        if (isBirthday) {
            nightScreen.style.display = 'none';
            if (!celebrationActive) {
                triggerCelebration();
                bdayScreen.style.display = 'flex';
                document.getElementById('bday-main-text').innerHTML = `GRATTIS<br>${bdayName.toUpperCase()}!`;
                document.getElementById('weather-overlay').innerHTML = '';
                
                if(iframe.src && iframe.src !== 'about:blank') {
                    iframe.src = 'about:blank'; 
                    iframe.style.display = 'none';
                }
            }
            document.getElementById('bday-clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
            return; 
        } 
        else if (showNightMode) {
            if (celebrationActive) stopCelebration();
            bdayScreen.style.display = 'none';
            nightScreen.style.display = 'flex';
            
            document.getElementById('nm-clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('nm-weather').innerHTML = `${currentIconHtml} <span>${currentTempStr}</span>`;
            
            if(iframe.src && iframe.src !== 'about:blank') {
                iframe.src = 'about:blank'; 
                iframe.style.display = 'none';
            }
            return; 
        } 
        else {
            nightScreen.style.display = 'none';
            if (celebrationActive) {
                stopCelebration();
                bdayScreen.style.display = 'none';
                updateWeatherOverlay(lastRealWeatherCode);
            }
            
            if(iframe.src === 'about:blank' || iframe.src === '') {
                iframe.src = iframe.getAttribute('data-src'); 
                iframe.style.display = 'block';
            }
            
            let greetingKey = `lang-${currentLangIndex}-${phase}`;
            if (currentRenderedGreeting !== greetingKey) {
                currentRenderedGreeting = greetingKey;
                greetingEl.classList.remove('birthday');
                
                let greetingBase = (greetingsTranslations[currentLangIndex] || greetingsTranslations[0])[phase];
                greetingBase = greetingBase.charAt(0).toUpperCase() + greetingBase.slice(1);
                let rawTextForSizing = greetingBase + (phase === "n" ? "" : "!");
                
                const wrappedText = wrapTextInSpans(greetingBase);
                const suffixDelay = Math.floor(Math.random() * 400); 
                
                if(phase === "n") {
                    greetingEl.classList.add('god-natt');
                    greetingEl.innerHTML = `${wrappedText}<span class="char-span" style="animation-delay: ${suffixDelay}ms"><span class="moon-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span></span>`;
                } else {
                    greetingEl.classList.remove('god-natt');
                    greetingEl.innerHTML = `${wrappedText}<span class="char-span" style="animation-delay: ${suffixDelay}ms"><span class="wiggle-mark">!</span></span>`;
                }

                if (rawTextForSizing.length > 11) {
                    greetingEl.style.fontSize = `${Math.max(3, 77 / rawTextForSizing.length)}rem`;
                } else {
                    greetingEl.style.fontSize = '7rem';
                }
            }

            document.getElementById('clock').innerText = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
            
            if (unDays[todayStrForBday]) {
                document.getElementById('date-sub').innerText = "FN-dag: " + unDays[todayStrForBday];
            } else {
                let fallbackText = "Idag är det " + now.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
                document.getElementById('date-sub').innerText = fallbackText.charAt(0).toUpperCase() + fallbackText.slice(1);
            }
            
            const easter = new Date('2026-03-30'), summer = new Date('2026-06-12'), worldcup = new Date('2026-06-11');
            document.getElementById('count-easter').innerText = Math.max(0, Math.ceil((easter - now) / 86400000));
            document.getElementById('count-summer').innerText = Math.max(0, Math.ceil((summer - now) / 86400000));
            // NYHET: VM-nedräkningen i JS
            document.getElementById('count-worldcup').innerText = Math.max(0, Math.ceil((worldcup - now) / 86400000));

            const currentYear = now.getFullYear();
            const todayForMath = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let minDiff = Infinity; let nextBdayName = "";

            for (const [dateString, name] of Object.entries(birthdays)) {
                const [month, day] = dateString.split('-');
                let bdate = new Date(currentYear, parseInt(month) - 1, parseInt(day));
                if (bdate < todayForMath) bdate.setFullYear(currentYear + 1);
                
                const diff = bdate - todayForMath;
                if (diff < minDiff) { minDiff = diff; nextBdayName = name; }
            }
            
            document.getElementById('count-bday').innerText = Math.ceil(minDiff / 86400000);
            const nameUppercase = nextBdayName.toUpperCase();
            document.getElementById('label-bday').innerHTML = `${nameUppercase.endsWith('S') ? nameUppercase : nameUppercase + "S"}<br>FÖDELSEDAG`;
        }
    }

    async function updateNews() {
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.svt.se/nyheter/rss.xml');
            const data = await res.json();
            if (data.status === 'ok' && data.items && data.items.length > 0) {
                textNewsItems = data.items.map(item => item.title);
                textNewsIndex = 0;
                displayNextNews();
            }
        } catch (e) {}
    }

    function displayNextNews() {
        if (textNewsItems.length === 0) return;
        const newsTextEl = document.getElementById('news-text');
        newsTextEl.style.opacity = 0; 
        setTimeout(() => {
            newsTextEl.innerText = textNewsItems[textNewsIndex];
            newsTextEl.style.opacity = 1; 
            textNewsIndex = (textNewsIndex + 1) % textNewsItems.length;
        }, 500); 
    }

    async function updateCalendar() {
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY_CAL}&timeMin=${new Date().toISOString()}&singleEvents=true&orderBy=startTime`);
            const d = await res.json();
            const todayStr = new Date().toDateString();
            document.getElementById('calendar-list').innerHTML = (d.items || []).slice(0, 2).map(e => {
                const start = new Date(e.start.dateTime || e.start.date);
                return `<div class="event-card ${start.toDateString() === todayStr ? 'today' : ''}">
                    <div class="event-date-box">
                        <div class="ev-day-name">${start.toLocaleDateString('sv-SE', {weekday:'long'}).toUpperCase()}</div>
                        <div class="ev-date-num">${start.getDate()} ${start.toLocaleDateString('sv-SE', {month:'short'})}</div>
                        <div class="ev-time">${e.start.dateTime ? start.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) : 'HELDAG'}</div>
                    </div>
                    <div class="event-title">${e.summary}</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    function getWeatherSwedishDesc(code) {
        if (code === 0) return "övervägande klart väder";
        if (code === 1 || code === 2) return "växlande molnighet";
        if (code === 3) return "mulet väder";
        if (code === 45 || code === 48) return "dimma";
        if (code >= 51 && code <= 55) return "duggregn";
        if (code >= 61 && code <= 65) return "regn";
        if (code >= 71 && code <= 75) return "snöfall";
        if (code >= 80 && code <= 82) return "regnskurar";
        if (code >= 85 && code <= 86) return "snöbyar";
        if (code >= 95) return "åska";
        return "varierande väder";
    }

    async function updateWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.64&longitude=13.21&hourly=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,precipitation_sum,wind_speed_10m_max&wind_speed_unit=ms&timezone=auto');
            const d = await res.json();
            const nowH = new Date().getHours();
            const code = d.hourly.weathercode[nowH];
            
            lastRealWeatherCode = code; 
            updateWeatherOverlay(code); 

            const getIcon = (c) => (c >= 71 ? 'snowflake' : c >= 51 ? 'cloud-rain' : c >= 3 ? 'cloud' : 'sun');
            currentTempStr = Math.round(d.hourly.temperature_2m[nowH]) + "°";
            currentIconHtml = `<i data-lucide="${getIcon(code)}"></i>`;
            
            document.getElementById('bday-weather').innerHTML = `${currentIconHtml} <span>${currentTempStr}</span>`;
            document.getElementById('nm-weather').innerHTML = `${currentIconHtml} <span>${currentTempStr}</span>`;

            const todayData = d.hourly.temperature_2m.slice(0, 24);
            const tomorrowData = d.hourly.temperature_2m.slice(24, 48);

            document.getElementById('weather-list').innerHTML = `
                <div class="weather-box"><div class="weather-hour">NU</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(code)}"></i></div><div class="weather-temp">${Math.round(d.hourly.temperature_2m[nowH])}°</div></div>
                <div class="weather-box"><div class="weather-hour">MAX IDAG</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[todayData.indexOf(Math.max(...todayData))])}"></i></div><div class="weather-temp">${Math.round(Math.max(...todayData))}°</div></div>
                <div class="weather-box"><div class="weather-hour">MAX IMORGON</div><div class="weather-icon-wrapper"><i data-lucide="${getIcon(d.hourly.weathercode[24 + tomorrowData.indexOf(Math.max(...tomorrowData))])}"></i></div><div class="weather-temp">${Math.round(Math.max(...tomorrowData))}°</div></div>
            `;

            const daily = d.daily;
            const todayCode = daily.weathercode[0];
            const todayMaxTemp = Math.round(daily.temperature_2m_max[0]);
            const todayRain = daily.precipitation_sum[0];
            const todayWind = daily.wind_speed_10m_max[0];
            
            let summaryText = `Idag väntas <strong>${getWeatherSwedishDesc(todayCode)}</strong> med en temperatur upp mot <strong>${todayMaxTemp}°</strong>. `;
            
            if (todayRain > 0.5) {
                summaryText += `Räkna med ca <strong>${todayRain} mm</strong> nederbörd. `;
            } else {
                summaryText += `Ingen nämnvärd nederbörd väntas. `;
            }
            
            if (todayWind > 10) {
                summaryText += `Dessutom ganska blåsigt med vindbyar upp mot <strong>${Math.round(todayWind)} m/s</strong>.`;
            } else if (todayWind > 5) {
                summaryText += `Måttliga vindar upp mot <strong>${Math.round(todayWind)} m/s</strong>.`;
            } else {
                summaryText += `Överlag <strong>svaga vindar</strong>.`;
            }
            
            document.getElementById('weather-summary').innerHTML = summaryText;

            lucide.createIcons();
        } catch(e) {}
    }

    function updateWeatherOverlay(code) {
        const container = document.getElementById('weather-overlay');
        container.innerHTML = '';
        if (celebrationActive || isNightModeForced || new Date().getHours() >= 23 || new Date().getHours() < 6) return;
        
        let effectiveCode = code;
        if (forcedWeatherMode === 'rain') effectiveCode = 51;
        if (forcedWeatherMode === 'snow') effectiveCode = 71;

        let type = '';
        if (effectiveCode >= 71) type = 'snow'; 
        else if (effectiveCode >= 51) type = 'rain'; 
        
        if (!type) return;

        let pCount = type === 'rain' ? 150 : 50;
        for (let i = 0; i < pCount; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            if (type === 'rain') { 
                p.style.width = '3px'; p.style.height = '18px'; p.style.background = 'rgba(100,150,255,0.5)'; 
            } else if (type === 'snow') { 
                p.style.width = '8px'; p.style.height = '8px'; p.style.borderRadius = '50%'; p.style.filter = 'blur(1px)'; 
            } 
            
            p.style.left = Math.random() * 100 + 'vw'; p.style.top = Math.random() * 100 + 'vh';
            const duration = 2 + Math.random() * 3;
            p.animate([ { transform: `translateY(-100px) ${type === 'snow' ? 'translateX(0)' : ''}` }, { transform: `translateY(110vh) ${type === 'snow' ? 'translateX(50px)' : ''}` } ], { duration: duration * 1000, iterations: Infinity, delay: -Math.random() * 5000 });
            container.appendChild(p);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initStars();
        update(); updateCalendar(); updateWeather(); updateNews(); 
        lucide.createIcons();
        setInterval(update, 1000); 
        setInterval(updateCalendar, 600000); 
        setInterval(updateWeather, 1800000); 
        setInterval(updateNews, 3600000); 
        setInterval(displayNextNews, 15000);
        
        setInterval(() => {
            if (celebrationActive || isNightModeForced || new Date().getHours() >= 23 || new Date().getHours() < 6) return; 
            const spans = document.getElementById('greeting').querySelectorAll('.char-span');
            let maxDelay = 0;
            spans.forEach((span) => {
                const randomDelay = Math.floor(Math.random() * 400); 
                if (randomDelay > maxDelay) maxDelay = randomDelay;
                span.style.animationDelay = `${randomDelay}ms`;
                span.classList.add('out'); 
            });
            setTimeout(() => {
                currentLangIndex = (currentLangIndex + 1) % greetingsTranslations.length;
                update(); 
            }, maxDelay + 550);
        }, 10000);
    });
</script>
